　何も言わないの？」

黒猫は
窓辺に座り、
外を見ながら答える。
「今は、
　君の番だから」

翌朝、
選考結果が
張り出される。

《この旅人は、
　特別ではない》

旅人は
胸が
少し痛む。

黒猫は
その紙を
一瞥して言う。
「観測は、
　真実じゃない」

「期待と
　不安の
　混ざりものだ」

旅人は
気づく。

見られる側は、
いつも
不完全な像しか
与えられない。

それでも、
立っていなければ
ならない。

旅人は
何も弁明せず、
国を歩き続ける。

誰かの期待を
満たさず、
誰かの失望も
引き取らず。

ただ、
旅人でいる。

国を出るとき、
黒猫が
ようやく言った。
「役割が
　反転しても」

「君は
　君のままで
　いい」

旅人は
深く息を吸い、
観測の外へ
一歩踏み出す。

選ばれなかったことが、
初めて
自由に感じられたまま。`},
  {num:281,title:"『まだ終わっていない気持ちの国』",body:`その国では、
出来事だけが
きれいに片づけられている。

祭りは終わり、
旗は畳まれ、
約束も履行された。

時計は
次の日を指している。

けれど、
人々の胸の中には
終わっていないものが
静かに残っていた。

広場で、
青年が
ベンチに座っている。

仕事は終わった。
話し合いも終わった。
謝罪も受け取った。

それでも、
立ち上がれない。

旅人は
そっと声をかける。
「もう、
　終わったんじゃないの？」

青年は
首を振る。
「出来事は」

「気持ちは、
　まだ」

別の通りでは、
別の人が
引っ越しを終えた家の前に
立っている。

鍵は返した。
荷物もない。

それでも、
何度も
窓を見上げてしまう。

この国では、
そうした立ち止まりを
急かさない。

「終わったんだから」
という言葉は、
ここでは
使われない。

黒猫は
旅人の隣に座り、
静かに言う。
「終わりはね」

「出来事のものとは
　限らない」

夕方、
役所の掲示板には
奇妙な案内が貼られている。

《手続きは完了しました
　お気持ちは
　継続中でも構いません》

旅人は
思わず笑う。
「親切だね」

黒猫は
少しだけ目を細める。
「時間差を
　問題にしないだけ」

夜。
街はいつも通りに
灯りをともす。

進む人もいれば、
同じ場所に
とどまる人もいる。

どちらも
遅れていない。

旅人は
自分の胸に残る
古い感情を思い出す。

終わったはずなのに、
まだ続いているもの。

黒猫は
歩き出しながら言った。
「感情には、
　独自の時計がある」

旅人と黒猫は
出来事の次へ向かいながら、
気持ちが追いつくのを
待つ国を後にする。

終わっていないことを、
責めない世界を
背中に感じながら。`},
  {num:280,title:"『平均を信じすぎた国』",body:`その国の広場には、
大きな掲示板が立っている。

そこには毎日、
新しい数字が書き換えられる。

平均の歩行時間。
平均の睡眠時間。
平均の元気さ。
平均の悲しみ。

人々は
その数字を見てから
一日を始める。

青年は
掲示板を見上げ、
少し肩を落とした。
「今日も、
　平均に届いてない」

旅人は
思わず聞く。
「それって、
　そんなに大事？」

青年は
困ったように笑う。
「大事じゃないと
　思いたいけどね」

「平均より下だと、
　怠けてるみたいで」

別の場所では、
別の人が
同じ掲示板を見て
眉をひそめていた。
「今日は、
　平均より上だ」

「でも、
　もう少し
　休みたい」

平均は、
誰かを責めるための
数字ではない。

誰かを
追い立てるための
意図もない。

それでも、
数字の前に立つと、
人は自分を
縮めてしまう。

旅人は
黒猫に尋ねる。
「みんな、
　間違ったことは
　してないよね」

黒猫は
掲示板の影に座り、
答える。
「悪意はない」

「でも、
　平均は
　人を楽にしない」

昼、
医師が
平均値に基づいた
助言をする。

教師が
平均的な理解度で
授業を進める。

制度は
整っている。
効率もいい。

それでも、
誰も
ちょうどよく
救われていない。

旅人は
気づく。
平均に合わせようと
するほど、
個々の輪郭が
薄れていく。

黒猫は
静かに言った。
「数字は
　人を救わない」

「ただ、
　見えなくする」

夕方、
掲示板の前を
素通りする人が
一人増える。

次の日、
二人になる。

平均は
変わらない。

けれど、
掲示板を
見ない背中が
少しずつ増えていく。

旅人と黒猫は
数字の下を通り過ぎ、
国を後にする。

整った制度と、
置き去りにされた
やさしさの
ずれを背中に感じながら。

そのずれこそが、
この国の
本当の重さだった。`},
  {num:279,title:"『完全には伝わらない国』",body:`その国では、
言葉が空を渡る途中で
必ず少し欠ける。

声にした瞬間は
確かにあったはずの意味が、
届くころには
角が丸くなり、
一部が抜け落ちている。

だから、
人々は
言葉を
受け取ったあと、
すぐに判断しない。

広場で、
青年が
誰かに何かを伝えようとしていた。

けれど、
最後まで言い切る前に
言葉が途切れる。

相手は
うなずきながら、
こう言った。
「全部は
　分からなかった」

「でも、
　急いでいないのは
　伝わった」

青年は
ほっとしたように
息を吐く。

旅人は
そのやりとりを見て
不思議そうに言う。
「誤解されても、
　怖くないの？」

黒猫は
地面に座り、
答える。
「誤解は、
　ここでは
　失敗じゃない」

別の通りでは、
二人の人が
すれ違いざまに
短い会話を交わす。

言葉は
途中で欠け、
文としては
不完全だ。

それでも、
二人は
立ち止まって
少しだけ
相手の顔を見る。

何を
言おうとしたのか。

何が
言えなかったのか。

そこに、
想像が
座る。

黒猫は
静かに言った。
「伝わらなかった場所に、
　想像が座る」

夕方、
旅人は
宿で
手紙を書く。

丁寧に書いたはずの文章も、
誰かが読むころには
きっと欠けている。

それでも、
この国では
それでいい。

旅人は
紙を折りながら言う。
「全部伝わらなくても、
　関係は続くんだね」

黒猫は
小さく頷く。
「完全に伝わることを
　前提にしないから」

夜。
街は静かになる。

誤解された言葉も、
言えなかった本音も、
責められずに
そこにある。

旅人と黒猫は
欠けたままの言葉を
胸に抱え、
国を後にする。

わかり合えなさを
失敗にしない世界が、
確かに
存在していることを
覚えながら。`},
  {num:278,title:"『同じ音が違って聞こえる国』",body:`その国の中心には、
大きな鐘が吊るされている。

時刻を告げる鐘。
集まりを知らせる鐘。
危険を伝える鐘。

鐘が鳴ると、
青年は胸をなで下ろす。
「今日も、
　何かが守られている音だ」

けれど、
少し離れた場所で
別の人は
肩を強張らせる。
過去に、
この音で呼び集められ、
責められた記憶がある。

同じ音。
同じ振動。
受け取られる意味だけが違う。

旅人は
二人の表情を見比べて言った。
「どっちが
　正しい反応なんだろう」

黒猫は
鐘を見上げて答える。
「どちらも、
　正しい」

この国では、
鐘を鳴らす前に
必ず立ち止まる習慣がある。

今、鳴らしたら、
誰が安心して、
誰が身を固くするか。

誰も完全には
分からない。

それでも、
考える時間だけは
手放さない。

旅人は
鐘楼のそばで
鐘守と呼ばれる人に会う。

鐘守は
綱に手をかけたまま、
動かない。

「鳴らさない自由もある」
旅人が言うと、
鐘守は首を振った。

「鳴らす必要が
　ある日もある」

「だから、
　軽く鳴らさない」

黒猫は
小さく言葉を添える。
「この国はね」

「鳴らさない自由より、
　鳴らす責任を
　選んだ」

夕暮れ、
遠くで小さな火事が起きる。

鐘は鳴る。

けれど、
いつもより
少しだけ
短く。

音は街に広がり、
安心する人と、
不安になる人が
同時に立ち上がる。

それでも、
誰も怒らない。

この音が、
誰かを傷つける可能性を
皆が知っているから。

旅人は
耳をすませて思う。

同じ音でも、
同じ意味にはならない。

黒猫は
歩きながら言った。
「違いを知ると、
　行動は
　慎重になる」

旅人と黒猫は
鐘の余韻が
消えきる前に
国を後にする。

その静けさが、
選ばれた結果だと
知りながら。`},
  {num:277,title:"『違う色の地図を持つ国』",body:`その国では、
入国するときに
一枚の地図を渡される。

ただし、
色は人によって違っていた。

青年が持つ地図では、
赤い道が
大きく塗りつぶされている。
「ここは、通ると具合が悪くなる」

別の人の地図では、
同じ道は
何の印もない。
代わりに、
青い道に
震えるような線が引かれている。
「ここは、怖い」

旅人は
地図を何枚も見比べて、
首をかしげた。
「同じ国なのに、
　全然違う」

「どれが
　正しい地図なんだろう」

黒猫は
旅人の足元に座り、
静かに言う。
「どれも、
　間違っていない」

旅人は
納得できずに
道を歩く。

ある交差点で、
青年が立ち止まる。
赤く塗られた場所だ。

別の人は
平気な顔で進むが、
今度は別の角で
足がすくむ。

誰かが言う。
「そんなの、
　気にしすぎだ」

別の誰かは言う。
「危険なのは、
　こっちだ」

声が重なり、
通りは少し騒がしくなる。

黒猫は
旅人に合図し、
地図を地面に広げさせる。

色の違う地図を
何枚も重ねる。

すると、
赤と青が
重なって濃くなる場所が
浮かび上がる。

旅人は
息をのむ。
「ここは…」

黒猫は
うなずく。
「多くの人が
　引っかかる場所」

「一人の地図では
　見えない」

「違いを
　並べたときにだけ、
　姿を現す」

旅人は
ゆっくり歩き出す。

自分の地図だけを
信じるのをやめ、
ときどき
人の色を思い出しながら。

青年は
赤い道を避け、
別の人は
青い道を遠回りする。

完璧な道はない。
けれど、
重ねて見れば
深い落とし穴は
避けられる。

国を出るとき、
旅人は
自分の地図を見つめる。

以前より、
少しだけ
色が増えた気がした。

黒猫は
振り返らずに言う。
「違いは、
　消すものじゃない」

「重ねるときに、
　意味を持つ」

旅人は
その言葉を胸に、
まだ見ぬ色の地図がある世界へ
歩き出した。`},
  {num:276,title:"『歩幅が決まっていない国』",body:`その国の道には、
歩く速度の決まりがなかった。

速く歩く人もいれば、
ゆっくりしか進めない人もいる。

走るように通り過ぎる影。
何度も立ち止まる背中。
ぶつかりそうになって、
舌打ちが生まれることもある。

旅人は
人の流れを見ながら言った。
「統一すればいいのに」

「同じ速さで歩けば、
　こんなに混乱しない」

黒猫は
少し後ろを歩きながら答える。
「同じ速さだったら、
　誰かは息ができなくなる」

広場で、
青年が
歩みを緩めていた。

息を整えながら、
周囲に追い越されていく。

旅人は
気まずそうに言う。
「遅れているね」

黒猫は
青年の足元を見る。
「今の速度でしか、
　倒れずに進めない日もある」

別の通りでは、
別の人が
速すぎるほどの速度で歩いていた。

前を見て、
後ろを振り返らない。

けれど角を曲がった瞬間、
足がもつれて
立ち止まらざるを得なくなる。

旅人は
思わず近づく。

黒猫は
静かに言った。
「速さは
　強さじゃない」

この国では、
速度を揃えると
安全が失われる。

速い人には
遅い人の時間が重すぎる。
遅い人には
速い流れが痛すぎる。

旅人は
歩きながら
何度も後ろを振り返るようになる。

置いていかれた人が
今どこにいるか。

急ぎすぎた人が
無理をしていないか。

黒猫は
その癖に気づいて言う。
「それが、
　この国の仕組み」

夕暮れ。
道はさらに
速度のばらつきを見せる。

誰かは待ち、
誰かは追いつき、
誰かは少し引き返す。

効率は悪い。
見た目も整っていない。

それでも、
誰も
無理な速度で
倒れてはいない。

旅人は
足を止めて言った。
「不便だね」

黒猫は
肯定するように答える。
「不便だから、
　調整が残る」

「調整があるから、
　人が見える」

夜、
人通りは減る。

速度は最後まで
揃わなかった。

それでも、
それぞれが
自分の速さで
一日を終えている。

旅人と黒猫は
速くも遅くもない歩調で
国を去る。

揃えないことで
守られている呼吸を、
確かに感じながら。`},
  {num:275,title:"『消えなかった足跡の国』",body:`その国の道は、
朝になると
きれいに均されていた。

昨日まであったはずの
足跡はどこにもない。

誰が通ったのか、
何人いたのか、
どこへ向かったのか。

翌日には、
すべて分からなくなる。

旅人は
まっさらな地面を見て言った。
「これじゃ、
　歩いた意味がないね」

黒猫は
道の端に座り、
前足で土を押す。

「意味は、
　残り方だけじゃない」

二人は歩き始める。

土は柔らかく、
沈みすぎず、
固すぎもしない。

歩くたび、
足の裏に
微かな反発が返ってくる。

途中で、
青年とすれ違った。

青年は
同じ道を
毎日通っているらしい。

旅人が尋ねる。
「足跡が残らなくて、
　寂しくならない？」

青年は
少し考えてから答えた。
「残らないけど、
　歩きやすくなってる」

「前より、
　転びにくくなった」

「誰かが通ってくれた道は、
　ちゃんと違う」

夕方、
坂道を登る。

見た目は
どこも同じ土の色。

けれど、
息は切れにくく、
足は止まらない。

旅人は
不思議そうに言う。
「誰の痕跡も見えないのに」

黒猫は
静かに歩きながら答える。
「道は、
　踏まれた回数を
　忘れない」

「名前も、
　理由も、
　目的も知らないまま」

「ただ、
　通られた事実だけを
　覚えている」

夜になる。

雨が降り、
今日の足跡も
すべて消える。

それでも道は、
昨日より
ほんの少し
なだらかになっていた。

旅人は
立ち止まり、
振り返る。

そこには
何も見えない。

それでも、
確かに進みやすい。

黒猫は
最後に言った。
「誰にも見えなくても」

「通ったことは、
　世界に
　触れている」

旅人と黒猫は
足跡を残さないまま
国を去る。

その道が、
また誰かを
静かに支えると知りながら。`},
  {num:274,title:"『何も起きなかった日が支える国』",body:`その国の記録所には、
奇妙な年表があった。

革命も、
事件も、
英雄の名前も並んでいない。

代わりに刻まれているのは、
こんな言葉だった。

・事故が起きなかった日
・喧嘩が起きなかった日
・誰も泣かなかった日

旅人は首をかしげる。
「……何も書いてないように見える」

黒猫は、
年表の前に座り、
しっぽを静かに揺らす。

「ここには、
　街を支えた日だけが
　書いてある」

通りを歩くと、
職人が
昨日と同じように
店の戸を開けていた。

特別な注文はない。
失敗もない。
褒められもしない。

ただ、
いつも通りに
刃物を研いでいる。

旅人は言う。
「何も起きなかったね」

黒猫は、
職人の手元から
目を離さずに答える。
「壊れなかった」

広場では、
母親と子どもが
何事もなく別れを告げている。

子どもは学校へ、
母親は仕事へ。

転ばなかった。
泣かなかった。
怒鳴らなかった。

その背中を見送りながら、
旅人はつぶやく。
「物語にならない一日だ」

黒猫は言う。
「物語にならなかったから、
　続きがある」

夕方、
老いた人が
一人でベンチに座っていた。

胸を押さえることもなく、
救急車も来ない。

ただ、
今日も呼吸をしている。

誰にも気づかれず、
日が沈む。

旅人は、
その静けさに
不安を覚える。

「本当に、
　大丈夫な国なの？」

黒猫は、
街全体を見渡して言う。
「この国はね、
　崩れなかった日で
　立っている」

夜。
灯りがともる。

何かが始まったわけでも、
終わったわけでもない。

それでも、
街は確かに
一日ぶん重くなっている。

旅人は、
自分の胸に手を当てる。

今日、
何も起きなかった。

それが、
どれほど多くの
“起きてほしくなかったこと”を
防いだのかを
考える。

黒猫は、
最後に言った。
「壊れなかったことは、
　起きたことだ」

旅人と黒猫は、
何事もなかった道を
静かに歩いて
国を出る。

その平穏が、
誰かの明日を
支えていると知りながら。`},
  {num:273,title:"『今日は誰かが初めてだった国』",body:`その国は、
とても静かだった。

祝祭の音も、
鐘の音もない。
けれど黒猫は言った。

「今日は、
　誰かが初めてだった日だよ」

旅人は足を止める。
「誕生日みたいなもの？」

黒猫は首を振る。
「もっと小さくて、
　もっと深い」

広場の端で、
少年が靴を履いていた。
紐を結ぶ手は、
まだぎこちない。

母親は、
少し離れたところで
何も言わずに見ている。

靴を履き終えた少年は、
一歩踏み出す。
誇らしさと不安が、
同時に顔に浮かぶ。

旅人は微笑む。
「それは、
　祝っていい初めてだね」

黒猫は答えない。

路地を曲がると、
青年が
友人に嘘をついていた。

「大丈夫」
本当は、
大丈夫じゃない。

嘘は小さく、
誰も傷つかないように
選ばれている。

言い終えたあと、
青年は
少しだけ肩を落とす。

旅人は眉をひそめる。
「それも、
　初めて？」

黒猫は静かに言う。
「うん。
　戻れない種類のね」

さらに進むと、
大人が
一人で耐えていた。

誰にも言わず、
怒らず、
助けも求めない。

それが
今日、初めてだった。

耐えたことを、
誰も知らない。
本人でさえ、
それを言葉にできない。

旅人は、
胸の奥が
きゅっとなる。

「それは……
　祝えない」

黒猫は、
夜の方を見て言う。
「だから、
　祝わなくていい」

旅人は考える。
「じゃあ、
　なぜ知る必要があるの？」

黒猫は答える。
「踏み荒らさないため」

旅人は、
自分の足元を見る。
軽い気持ちの一言。
不用意な正論。
急かす善意。

それらが、
誰かの“初めて”を
壊すことがあると
気づく。

夕暮れ。
街には何も起きていない
ように見える。

でも実際には、
境界線が
あちこちで引かれている。

こちら側と、
もう戻れない向こう側。

旅人は、
歩幅を小さくする。

黒猫は、
それを見て
何も言わない。

その日、
祝われた初めては
一つもなかった。

けれど、
踏み荒らされなかった
初めてが、
確かにあった。

旅人と黒猫は、
静かな足取りで
国を出る。

今日が、
誰かの境界線に
なっているかもしれないと
知ったまま。`},
  {num:272,title:"『毎日が特別な国』",body:`その国では、
朝になると必ず音楽が鳴った。
大きすぎない音で、
街のどこかから、
毎日同じ調子で流れてくる。

旅人は首をかしげる。
「お祭り？」

黒猫は耳を澄ます。
「誕生日の音だね」

通りを歩くと、
家の扉に小さな飾りが下がっている。
派手ではない。
けれど、
毎日どこかで見かける。

「今日も、
　誰かの誕生日です」
と、通りかかった青年が言った。

「毎日？」
旅人が聞く。

青年はうなずく。
「ええ。
　今日も、
　誰かにとっては
　一年に一度の特別な日ですから」

黒猫が、
ゆっくり歩きながら言う。
「特別が、
　行き渡ってる国なんだね」

昼過ぎ、
旅人と黒猫は
小さな家に招かれる。

「よかったら、
　一緒にお祝いしませんか」
青年が、
少し照れたように言った。

家の中では、
質素な誕生パーティーが
開かれていた。

ケーキは小さく、
ろうそくは一本だけ。
それでも、
テーブルを囲む人たちの顔は、
穏やかだった。

主役は、
年配の人だった。

「今日は、
　私の番なんです」
そう言って、
ゆっくり席に着く。

旅人は、
少し緊張して言う。
「おめでとうございます」

年配の人は、
目を細めた。
「ありがとう。
　今日まで、
　生きてきました」

黒猫は、
ケーキの横に座る。
「それが、
　一番の理由だね」

ろうそくが吹き消される。
拍手は、
控えめで、
長すぎない。

誰かが言う。
「明日は、
　別の人の番です」

「明後日も」
「その次の日も」

青年が旅人に話しかける。
「ここでは、
　特別じゃない日を
　作らないように
　してるんです」

「忘れちゃうから。
　生きてるだけで
　特別だったことを」

黒猫は、
皿の前でしっぽを揺らす。
「特別を、
　独占しないのが
　いいね」

夜。
旅人と黒猫は、
家を出る。

街には、
もう次の誕生日の
小さな飾りが
準備されていた。

旅人は、
少し不思議な気持ちで言う。
「特別が続くと、
　普通にならない？」

黒猫は、
歩きながら答える。
「普通になるくらいが、
　ちょうどいい」

「特別は、
　持ち上げるものじゃなくて、
　確かめるものだから」

翌朝。
また、
同じ音楽が流れる。

誰かの誕生日。
誰かの特別な日。

旅人と黒猫は、
自分の今日も、
そっと祝われている気がして、
静かに次の道へと向かった。

毎日が特別な国では、
特別は派手な出来事じゃなかった。

ただ、
今日ここにいることを、
誰かが忘れないようにする
小さな習慣だった。

旅人と黒猫は、
祝われる理由を
探さなくてもいい軽さを
胸に残して、
旅を続けた。`},
  {num:271,title:"『旅人が何もしない国』",body:`その国に着いたとき、
旅人は違和感を覚えた。

困っている人がいる。
迷っている人もいる。
今までなら、
声をかけ、歩き、
何かを残してきたはずだった。

けれどこの国では、
黒猫が先に言った。

「今日は、
　何もしなくていいよ」

旅人は立ち止まる。
「……本当に？」

黒猫は、
道ばたに座る。
「ここは、
　それでいい国だから」

広場では、
青年が行き先を迷っていた。
何度も地図を開き、
ため息をつく。

旅人は、
声をかけそうになる。
けれど、
黒猫は何も言わない。

しばらくして、
通りすがりの年配の人が
青年の地図をのぞき込む。

「私も、
　昔ここで迷いました」
そう言って、
一つだけ道の特徴を教える。

青年は、
少し安心した顔で
歩き出す。

旅人は、
胸の奥がざわつく。
「……僕が
　何かしなくても」

黒猫は、
小さくうなずく。
「うん」

別の通りでは、
中年の人が
店の前で立ち尽くしていた。

入る勇気が出ないらしい。

旅人は、
そっと立ち止まる。
何も言わず、
ただ同じ方向を見る。

数分後、
中年の人は
深呼吸をして、
店に入っていった。

旅人は驚く。
「今の、
　僕の存在は？」

黒猫は答える。
「何もしないで
　そばにいるのも、
　影響だよ」

夕方。
旅人と黒猫は
丘の上に座る。

街を見下ろすと、
小さな変化が
あちこちで起きている。

誰かが誰かに声をかけ、
誰かが一歩引き、
誰かが決め、
誰かが待つ。

旅人が
何かをしたわけじゃない。

それでも、
世界は動いている。

旅人は、
少し寂しそうに言う。
「役に立てなかった気がする」

黒猫は、
静かに尻尾を揺らす。
「役に立たないと、
　存在しちゃ
　いけないわけじゃない」

夜。
宿の窓から、
灯りが一つ増える。

誰かが、
今日を続けた証。

旅人は、
深く息を吐く。
「何もしないって、
　怖いね」

黒猫は、
そっと言う。
「でも、
　何もしないことで
　奪わないものもある」

翌朝。
旅人と黒猫は
国を出る。

別れ際、
誰にも声をかけられない。
感謝も、
記録もない。

それでも、
旅人の足取りは
軽かった。

旅人が何もしない国では、
変化は
誰かの手柄にならなかった。

「何もしない」も、
空気を変える。
余白を残す。
他人の一歩を、
その人のものにする。

旅人と黒猫は、
影響を残さない影響を
胸に抱え、
静かに次の国へと
歩いていった。`},
  {num:270,title:"『距離を測り間違える国』",body:`その国では、
人と人との間に、
目に見えない線が引かれていた。

けれどその線は、
誰にとっても同じではない。

近づきすぎる人は、
相手の呼吸にまで
踏み込んでしまう。

離れすぎる人は、
声が届く距離にすら
立たない。

旅人は、
市場でその様子を見た。

青年が、
誰かの話を聞いている。
あまりに近く、
相手は一歩下がる。

青年は、
気づかず、
また一歩近づく。

一方、
通りの反対側では、
中年の人が
困っている様子なのに、
誰も近づかない。

遠くから、
心配そうに見ているだけ。

旅人は、
ためらいながら言う。
「難しい国だね」

黒猫は、
足を止める。
「距離は、
　感覚じゃなくて
　技術だから」

広場には、
奇妙な建物があった。

――距離の練習所

中に入ると、
人々が向かい合って
立っている。

係の人が言う。
「一歩、
　近づいてください」

誰かは、
踏み込みすぎる。
誰かは、
動けない。

「次は、
　一歩下がって」

今度は、
離れすぎる。

青年が、
肩を落とす。
「正解が、
　分からない」

黒猫が、
青年の隣に座る。
「正解は、
　相手が
　教えてくれる」

「嫌そうな顔をしたら、
　下がる」

「声が震えていたら、
　止まる」

「近づいても
　逃げなければ、
　そこが今の距離」

青年は、
少し考える。
「勉強、
　いるんですね」

黒猫は、
小さくうなずく。
「練習も」

外に出ると、
中年の人が、
広場の端に座っていた。

旅人は、
黒猫を見る。

黒猫は、
ゆっくり歩いて、
中年の人から
三歩離れたところに
座る。

近づかない。
離れない。

中年の人が、
ちらりと見る。

逃げない。

旅人は、
同じ距離で
隣に座る。

しばらくして、
中年の人が
ぽつりと言う。
「……そこなら、
　大丈夫です」

旅人は、
息をつく。

夕方、
青年が市場を歩いていた。

誰かと話すとき、
一度立ち止まり、
相手の表情を見る。

少しずつ、
距離が合っていく。

黒猫は、
それを見て言う。
「間違えながら、
　覚えるしかない」

距離を測り間違える国では、
善意も、
不安も、
同じくらい
距離を狂わせていた。

けれど、
近づきすぎても、
離れすぎても、
やり直せる場所があった。

ちょうどいい関係は、
才能じゃない。

学習と、
相手を見る時間で
できていく。

旅人と黒猫は、
一歩分の感覚を
胸に残し、
次の国へと歩いていった。`},
  {num:269,title:"『理由を聞かれない国』",body:`その国では、
人に声をかけるとき、
「どうして？」という言葉を
使わなかった。

旅人は最初、
それが不思議でならなかった。

市場で、
青年が立ち止まっている。
何も買わず、
ただ棚を見つめている。

誰も、
「どうして買わないの？」
とは聞かない。

代わりに、
店の人が言う。
「ここにいていいですよ」

旅人は、
思わず青年に声をかけそうになり、
口をつぐむ。

黒猫が、
小さく言う。
「理由を聞くと、
　説明を
　要求することになるから」

広場では、
年配の人が
一日中ベンチに座っていた。

通りすがりの人は、
水を置いていく。
毛布をかけていく。

誰も、
「なぜ動かないの？」
とは言わない。

旅人は、
胸が少し苦しくなる。
「理由を聞かれないと、
　不安にならない？」

黒猫は、
首を横に振る。
「理由を
　作らなくていいのが、
　一番楽な人もいる」

路地裏で、
中年の人が
泣いていた。

泣いている理由は、
分からない。

けれど、
通りかかった人は、
ただ隣に座る。

「静かですね」
そう言うだけ。

中年の人は、
しばらくして、
泣き止む。

旅人は、
思わず黒猫に聞く。
「理由が分からなくても、
　いいの？」

黒猫は、
その場に座り込む。
「分からないままでも、
　そばにいられる」

「それが、
　この国の
　やさしさだよ」

夕方。
宿で、
旅人は隣の部屋から
物音がしないことに気づく。

心配になり、
戸を叩こうとする。

黒猫が、
そっと止めた。
「理由を
　確かめなくていい」

「必要なら、
　向こうから
　出てくる」

翌朝。
隣の部屋の人が、
何事もなかったように
廊下を歩いていた。

旅人は、
少しだけ安心する。

国を出るとき、
門には何も書いていない。

ただ、
誰も理由を
通行証にしない。

理由を聞かれない国では、
行動も、
感情も、
正当化されなくてよかった。

そこにいるだけで、
説明なしに
存在していい。

旅人と黒猫は、
理由を持たないままでも
歩いていける軽さを
胸に抱き、
次の国へと向かった。`},
  {num:268,title:"『気持ちに名前をつけすぎる国』",body:`その国に入ると、
人はまず、気持ちの札を受け取る。

旅人は前に進み、
黒猫は札を受け取らず、
少し後ろに立った。

広場の片隅で、
青年が立ち尽くしていた。
手には、
まだ白いままの札。

係の人が声をかける。
「どれですか？」

青年は、
口を開きかけて閉じる。
何度か息を吸って、
それでも言えない。

「……分かりません」

係の人は困った顔になる。
「分からない、は
　選択肢にありません」

青年の肩が、
わずかに下がった。

旅人はそばに寄る。
「書けそう？」

青年は、
首を横に振った。
「どれも違うんです。
　でも、
　どれも少しずつ当てはまる」

「名前がつかないと、
　ここでは、
　進めないんです」

黒猫が、
二人の間に座った。

「名前がないと、
　苦しくなるのは、
　ここだけだよ」

青年は、
黒猫を見る。
「でも、
　名前がないと、
　自分でも
　分からなくて」

黒猫は、
地面を見つめる。
「分からないって、
　ちゃんと感じてる証拠だ」

夕方。
感情整理所から、
分類された人たちが
次々と出てくる。

札には、
細かい言葉が並ぶ。

青年は、
それを見て、
さらに黙り込んだ。

「みんな、
　言葉を持ってる」
小さな声で言う。
「自分だけ、
　何も持ってないみたいで」

黒猫は、
広場の端の影を指す。
「来なよ」

三人は、
影の中に入る。
そこでは、
札を持たない人たちが、
静かに座っていた。

誰も説明しない。
誰も分類しない。

青年は、
初めて深く息を吐いた。

「……ここなら、
　消えないですか」

黒猫は、
短くうなずく。
「消えない」

「名前がなくても？」

「名前がないままでも」

夜。
青年の足元に、
淡い揺らぎが現れる。

形も、
色も定まらない。

青年は、
それを見つめて言う。
「これが、
　今の気持ちかもしれません」

旅人は、
静かに言った。
「それで、
　十分だと思う」

翌朝。
青年は、
札を返さなかった。

係の人は、
何も言わなかった。

国を出るとき、
青年は旅人と黒猫に
小さく頭を下げる。

「名前がつかなくても、
　自分の中に
　あっていいんだって
　思えました」

黒猫は、
少しだけ目を細める。
「言葉は、
　あとから来ることもある」

旅人と黒猫は、
名前を持たない感情と、
それを抱えた青年の背中を、
静かに見送った。

気持ちに名前をつけすぎる国では、
言語化できない感情が
居場所を失いやすい。

それでも、
言葉になる前の感情も、
確かに生きていていい。

そのことを知った人が、
また一人、
影の中に居場所を見つけていた。`},
  {num:267,title:"『わかっているふりをする国』",body:`その国では、
会話の終わりに必ず同じ言葉が添えられた。

「分かりました」

問いの内容に関係なく、
理解できたかどうかに関係なく、
それを言うのが礼儀だった。

旅人と黒猫が街に入ると、
人々は皆、うなずきながら歩いていた。
少し早口で、
少し緊張した顔で。

店先で、青年が説明を受けている。
長い注意事項、
複雑な仕組み。

青年は途中から、
視線が宙を泳いでいた。
それでも最後には、
はっきりと言う。

「分かりました」

店の人は満足そうに笑い、
青年は深く息を吐いて立ち去った。

旅人は声を潜める。
「……本当に、
　分かっていたのかな」

黒猫は答えず、
青年の背中を見つめていた。

広場では、
説明役の人が高台に立ち、
人々に何かを伝えている。

「ここが重要です」
「理解できましたか？」

一斉に返る声。
「分かりました」

その中で、
黒猫だけが黙っていた。

説明役の人が気づき、
少し困ったように言う。
「そちらの方は？」

黒猫は静かに答える。
「分からない」

広場が、
一瞬だけ静まり返る。

旅人は息をのむ。
誰かが不快そうに、
誰かが不安そうに、
視線を向ける。

説明役の人は、
言葉を選ぶように言った。
「……ここでは、
　分かっているふりを
　していただけると助かります」

黒猫は、その場に座り込んだ。
立ち止まって、
地面を見る。

「分かったふりをすると、
　安全なんだと思う」
黒猫は言う。
「でも、
　分からないまま進むのは、
　もっと危ない」

近くにいた年配の人が、
小さく声を出す。
「分からないって言うと、
　迷惑をかけるから」

黒猫は目を上げる。
「分からないまま
　うなずくほうが、
　ずっと重たい迷惑に
　なることもある」

沈黙が落ちる。

しばらくして、
青年が戻ってきた。
さきほどの青年だった。

「……あの」
小さな声で言う。
「さっきの説明、
　実は分かってませんでした」

その言葉は震えていたが、
確かだった。

誰も拍手しない。
誰も責めない。
ただ、
一人、また一人と、
視線が下がる。

「私も」
「正直、途中から」
「聞き返すのが怖くて」

黒猫は立ち上がらなかった。
ただ、そこに座ったまま、
その声たちを受け止めていた。

夕方。
広場の隅に、
小さな札が置かれる。

――分からないと言ってもよい場所

旅人は黒猫に言う。
「少し、変わったね」

黒猫はゆっくり立ち上がる。
「分からないって言える場所が、
　一つできただけ」

「でも、
　それで十分なこともある」

翌朝。
旅人と黒猫が国を出るとき、
誰かの声が背後から聞こえた。

「もう一度、
　説明してもらえますか」

その声は、
昨日より少しだけ、
楽そうだった。

わかっているふりをする国では、
理解より安全を選ぶ心が、
確かにあった。

けれど、
立ち止まる勇気が、
静かに、
別の安全を作り始めていた。

旅人と黒猫は、
分からないままでも
立っていていい感覚を胸に、
次の国へと歩いていった。`},
  {num:266,title:"『まだ決めなくていい国』",body:`その国の入口には、
三つの道が並んでいた。

右には「はい」。
左には「いいえ」。
そして真ん中に、
少し広めの道があった。

――保留

旅人は立ち止まる。
「……道に、
　ちゃんと名前がある」

黒猫は何も言わず、
その「保留」の道に座った。
急ぐ気配もなく、
ただ、そこにいる。

通りかかった青年が、
二人を見て声をかける。
「決めなくていい日ですか？」

旅人はうなずく。
「どうやら」

青年は肩の力を抜く。
「よかった。
　僕も、ここに来たばかりです」

青年は、
手に二枚の紙を持っていた。
一枚には「続ける」。
もう一枚には「やめる」。

「どちらも、
　嘘じゃないんです」
青年は言う。
「でも、
　どちらも今じゃない」

黒猫が静かに言う。
「今じゃない、
　っていうのも
　立派な判断だよ」

広場に進むと、
人々が思い思いに
腰を下ろしていた。
立っている人も、
寝転んでいる人もいる。

誰も急かさない。
誰も数を数えない。

旅人は、
中年の人と並んで
ベンチに座った。

「いつまで、
　保留でいられるんですか？」
旅人が聞く。

中年の人は、
空を見上げて答える。
「必要なだけ」

「期限は？」

「決めたくなったときが、
　期限です」

黒猫は、
地面に尻尾で円を描く。
「決断は、
　追い立てると
　歪むからね」

夕方、
鐘が鳴る。

それは、
「決めなさい」の合図ではなく、
「今日も決めなくてよかった」
という合図だった。

旅人は胸がゆるむのを感じる。

夜、
宿へ向かう途中、
旅人は黒猫に言う。
「決められない自分が、
　少し許せた気がする」

黒猫は、
その場にまた座り込む。
「決めない時間も、
　ちゃんと生きてる」

翌朝。
旅人が目を覚ますと、
黒猫はまだ
「保留」の道に座っていた。

旅人は急かさなかった。
黒猫が立ち上がるまで、
隣に腰を下ろす。

まだ決めなくていい国では、
選ばないことが、
置き去りにされなかった。

決断できない自分も、
ここでは、
ちゃんと居場所を持っていた。

やがて黒猫は立ち上がり、
何事もなかったように歩き出す。

旅人は、
「保留」という言葉を胸に、
次の国へと静かに進んだ。`},
  {num:265,title:"『ちゃんと嫌われていい国』",body:`その国の入口には、
奇妙な看板が立っていた。

――好かれすぎ注意

旅人は思わず読み返す。
「……注意？」

黒猫は尻尾を揺らして言う。
「この国では、
　自分を削って好かれると、
　通行の妨げになるらしい」

街に入ると、
人々の服には小さな印が縫い付けられていた。
傷のようにも、
勲章のようにも見える。

旅人は近くにいた青年に尋ねる。
「その印は？」

青年は胸元を指で叩く。
「嫌われた痕跡です」

旅人は言葉を失う。
「……誇らしげですね」

青年は少し笑った。
「初めて断った仕事で、
　一人に嫌われました」

「怖くなかったですか？」

「怖かったです。
　でも、そのあと
　自分の声が消えなかった」

黒猫が低く、やさしく言う。
「迎合しすぎると、
　声のほうが先に
　いなくなるからね」

広場では、
年配の人が注意を受けていた。

「最近、
　好かれすぎていますよ」
役人が静かに言う。

「断るべき場面で、
　全部引き受けているでしょう」

年配の人は、
少しうつむいた。
「嫌われるのが、
　怖くて」

役人は、
布切れを一枚手渡す。
「次に嫌われたら、
　ここに縫いなさい」

その布には、
小さくこう書かれていた。

――あなたは、
――あなたでいてよい

旅人は胸が詰まる。

路地裏では、
若い人が壁に寄りかかっていた。
新しい印を、
震える手で縫い付けている。

「今、
　嫌われたところです」
そう言って、
深く息を吐いた。

黒猫はそっと言う。
「おめでとう」

若い人は驚き、
それから笑った。
「変な国ですね」

「でも、
　少し楽です」

夜、
宿で旅人が黒猫に言う。
「嫌われることが、
　こんなに静かなものだとは」

黒猫は丸くなり、
穏やかに答える。
「ちゃんと嫌われるって、
　ちゃんと立っている
　証拠だから」

翌朝。
旅人と黒猫が国を出るとき、
入口の看板が目に入る。

――嫌われた数だけ、
――あなたはあなたでいた

旅人は、
胸の奥で何かが軽くなるのを感じた。

好かれなくてもいい。
嫌われても、
消えなくていい。

ちゃんと嫌われていい国で、
迎合は役目を終え、
人は少し、
自由になっていた。

旅人と黒猫は、
自分の輪郭を確かめながら、
次の国へと歩き出した。


『守られなかった約束の国』
―――

その国の道は、歩きにくかった。
石が敷き詰められているのだが、
どれも角ばっていて、
ところどころ赤黒く欠けている。

旅人が一歩踏み出すと、
靴の裏から鈍い痛みが伝わった。

「……痛いね」

黒猫は足元を見つめて言う。
「約束の石だよ。
　守られなかったものほど、
　角が鋭くなる」

道の脇には、
同じ石が山のように積まれている。
避けて歩こうとしても、
必ずどこかで踏んでしまう配置だった。

旅人は近くにいた中年の人に声をかける。
「みんな、こんな道を？」

中年の人はうなずく。
「避けようとすると、
　前に進めないんです」

その人は足を引きずっていた。
「信じた約束ほど、
　重くて、痛い」

黒猫が静かに尋ねる。
「それでも、
　ここを歩いている理由は？」

中年の人は少し考え、
石を一つ拾い上げた。
「立ち止まったままだと、
　この石の重さだけが
　増えていくからです」

別の場所では、
若い人が道の真ん中で立ちすくんでいた。
足元には、
まだ新しい石がいくつも転がっている。

「踏めません」
若い人は言った。
「信じたばかりだったから」

旅人は何も言えなかった。
黒猫が前に出る。

「踏まなくていいとは、
　言えない」
「でも、
　一人で踏まなくていい」

黒猫は、
若い人の隣に座り、
しばらく一緒に道を見つめた。

やがて若い人は、
小さく息を吐き、
ゆっくり一歩を踏み出した。
痛みに顔を歪めながらも、
確かに前へ進む。

夕方、
広場に着くと、
人々が石を積み直していた。

「捨てないんですか？」
旅人が聞く。

年配の人が答える。
「捨てると、
　なかったことにしたくなる」

「積み直すと、
　あったことだと認められる」

黒猫は、その山を見て言う。
「痛みを、
　地形にしているんだね」

夜、
旅人は足の痛みで眠れなかった。
黒猫はそばで丸くなり、
低く言う。

「裏切られたからって、
　感じたものまで
　間違いになるわけじゃない」

「約束を信じた自分は、
　悪くない」

翌朝。
旅人と黒猫は、
痛みを引きずりながら国を出る。

道は最後まで、
平らにはならなかった。

それでも、
踏みしめた跡が、
確かに後ろに続いていた。

守られなかった約束の国では、
裏切りの上でも、
歩く選択だけは
奪われていなかった。

旅人と黒猫は、
痛みを抱えたまま、
それでも進むことを選び、
次の国へと歩いていった。`},
  {num:264,title:"『声に出さなかった言葉の国』",body:`その国では、
夜になると路地が少し明るくなった。

灯りではない。
文字だった。

昼間、誰にも言えなかった言葉が、
夜になると薄い光を帯びて、
路地の壁や地面に、静かに浮かび上がる。

旅人は立ち止まり、目を凝らす。
けれど、どれも読めない。
形は文字なのに、意味が届かない。

「読めないね」
旅人が言う。

黒猫は、しばらく黙ってから答えた。
「ここでは、
　声にしなかった言葉は、
　聞こうとしないと読めないんだ」

そして、黒猫は歩き出す。
路地の奥へ。

そこには、青年が一人、
壁にもたれて立っていた。
昼間、旅人が見かけたとき、
青年は誰かに「大丈夫です」と
はっきり言っていた。

今、その足元に、
淡く光る言葉が浮かんでいる。

黒猫はそれを見て、
声を低く、やわらかくする。

「……『本当は、
　少し休みたかった』」

旅人は息をのむ。
青年は驚いた顔をして、
それから視線を落とした。

「聞こえたんですか」

黒猫は首を横に振る。
「読んだだけ。
　言わなかった言葉だから」

青年は苦笑する。
「言えばよかったのかもしれません。
　でも、言ったら壊れそうで」

黒猫は否定しない。
「言わなかったのも、
　守るための選択だったんだと思う」

別の路地では、
年配の人が立ち尽くしていた。
その周囲には、
いくつもの言葉が重なって浮かんでいる。

――あのとき、謝りたかった
――ありがとうって言えなかった
――もう遅い気がしていた

旅人は胸が詰まる。
「こんなに、たくさん……」

黒猫は、そっと言う。
「声に出さなかったから、
　消えなかったんだ」

年配の人は、
黒猫の視線に気づいて尋ねる。
「そこに、何かありますか」

黒猫は少し考え、
一つだけを選んで伝えた。
「『ちゃんと、思っていた』って」

その人の目が、
わずかに潤む。

「……それなら、
　それでいいですね」

夜が更けるにつれ、
路地の言葉は一つずつ、
風に溶けていく。

旅人は黒猫に聞く。
「どうして、
　君だけ読めるんだろう」

黒猫は歩きながら答える。
「声にならなかった言葉は、
　誰かに理解される前提で
　生まれていないから」

「でも、
　誰かに拾われたら、
　少し軽くなる」

夜明け前、
旅人と黒猫は国を出る。

路地はもう暗く、
言葉は残っていない。

けれど旅人は知っている。
あの沈黙の中に、
確かに本音があったことを。

黒猫は最後に、
振り返らずに言った。

「言えなかった言葉も、
　なかったことには
　ならないんだ」

旅人はうなずき、
声に出さなかった思いを、
そっと胸に抱いたまま、
次の国へと歩き出した。`},
  {num:263,title:"『正解が遅れて届く国』",body:`旅人と黒猫がたどり着いた国では、
人々が時折、足を止めて小さな掲示板を見つめていた。
そこには日付と短い文章だけが書かれている。

「十五年前の選択について」
「三年前の遠回りについて」

旅人は不思議に思い、
掲示板の前に立っていた青年に声をかけた。

「これは、何の記録なんですか？」

青年は少し考えてから答えた。
「答え合わせ、です。
　ただし、今じゃなくて、
　届いたときに書くんです」

黒猫が静かに言う。
「届くまで、
　間違いだったかどうかは、
　保留にするんだね」

青年は苦笑した。
「昔、続けていた仕事を
　向いていないと思って辞めました。
　周りには逃げたって言われました」

旅人は黙って聞く。

「そのあと、
　何年も何者でもない時間が続きました。
　正直、失敗だったと思ってました」

青年は掲示板の一枚を指さす。
そこには、数日前の日付があった。

「でも最近、
　あの時やめたから
　家族の最期に間に合ったって気づいたんです」

黒猫が、柔らかく声を落とす。
「正解が、
　ずいぶん遅れて来たね」

青年はうなずく。
「当時は、
　正しいかどうかなんて
　分かりませんでした」

そこへ、
買い物袋を下げた中年の人が加わる。

「私も同じです」
「若い頃、挑戦しなかったことを
　ずっと後悔してました」

旅人が尋ねる。
「今は？」

「今は、
　挑戦しなかったから
　守れた生活があると分かりました」

黒猫は二人を見て言う。
「この国では、
　選択が“即座に採点”されないんだ」

夕方、
旅人と黒猫は小さな家を訪れる。
そこには、長い間迷ってきた人が住んでいた。

「正解は、来ましたか？」
旅人が聞くと、
その人は首を振る。

「まだです。
　でも、来ない日々にも
　意味がある気がしています」

黒猫は、
窓から差し込む夕日を見ながら言った。
「答えが届く前の時間も、
　生きている時間だからね」

翌朝。
旅人と黒猫が国を去るとき、
掲示板には新しい紙が一枚、
そっと貼られていた。

「遠回りだったけれど、
　あの時間がなければ
　今の自分はいなかった」

旅人は振り返り、
静かに息をつく。

正解が遅れて届く国では、
間違えたと思った瞬間さえ、
まだ途中だと信じてよかった。

旅人と黒猫は、
答えがまだ届かない選択を
胸に抱えたまま、
次の国へ歩き出した。`},
  {num:262,title:"『説明しすぎる国』",body:`旅人と黒猫がたどり着いた国では、
人々は話す前に、必ず息を整えていた。

「それをする理由は？」
「背景は？」
「どこまで想定していますか？」

問いが、空気のように漂っている。

通りの掲示板には、長い文章が並んでいた。
助けた理由、断った理由、
少し遅れた理由まで、
すべて丁寧に書かれている。

「大変そうだね」
旅人が言う。

黒猫は、看板を読みながら答えた。
「善意を、証明しないといけない国みたい」

広場で、一人の人が誰かに水を差し出していた。
だが、その前に、深く息を吸う。

「これは、上下関係を示す意図ではなく、
　純粋な配慮であり、
　過去の経験から――」

話しているうちに、
差し出した水は、温くなってしまった。

「そこまで言わなくても……」
旅人が小さく言う。

その人は苦笑いする。
「言わないと、誤解されるんです」

別の場所では、
何かを断る人が、
何枚もの紙を手にしていた。

「今は対応できない理由を、
　時系列で説明します」

黒猫が、静かに尋ねる。
「疲れませんか？」

その人は、少し考えてから答えた。
「疲れます。でも、
　説明しないと、悪意に見えるので」

旅人は胸が詰まる。
善意も、正直さも、
長い説明を通らないと
認められない。

夕方、
広場の中央で、
説明に詰まっている人がいた。

「うまく言えなくて……」
言葉が途切れる。

周囲は待つ。
誰も急かさないが、
誰も助けない。

黒猫が、そっと一歩前に出た。
「今は、説明できない、
　でいいと思う」

空気が、少し揺れた。

旅人は、広場の片隅に
小さな札を立てた。

――説明は、あとでもいい

最初は、誰も近づかない。
けれど、しばらくして、
一人が札のそばに立つ。

「理由は、今は話せません」

誰も否定しなかった。

夜。
掲示板に、新しい一文が加えられていた。

――善意には、
――即時の説明義務はありません

それは小さな変化だった。
国の仕組みが変わったわけではない。

それでも、
水は冷たいまま、
渡されるようになった。

旅人と黒猫は、
少し軽くなった空気を背に、
次の国へと歩いていった。`},
  {num:261,title:"『名前のない希望の国』",body:`旅人と黒猫がたどり着いた国には、地図がなかった。

正確には、地図はあるのだが、どこにも国の名前が書かれていない。
川も、道も、町も描かれているのに、中央にあるはずの国名だけが、ぽっかり空白のままだった。

黒猫は地図を覗き込み、首をかしげる。

「書き忘れたのかな」

「違うと思う」
旅人は静かに言った。
「この国は、名前をつけなかったんだ」

国に足を踏み入れると、不思議な静けさがあった。
にぎやかではないが、荒れてもいない。
人々はそれぞれの場所で暮らしているが、どこか落ち着かない様子にも見える。

黒猫は言う。

「みんな、何かを待ってる顔をしてる」

旅人はうなずいた。

「ここは、“希望があるかどうか”を聞かれる国なんだ」

通りの先に、小さな広場があった。
広場の真ん中には、白い箱が置かれている。
箱の横には、こんな説明が書かれていた。

この国では、希望に名前をつけてはいけません
見つけても、見つからなくても
そのまま置いていってください

黒猫は目を細める。

「希望に名前をつけないって、どういうこと？」

「名前をつけるとね」
旅人は少し考えてから言った。
「形が決まってしまうんだ」

広場には、人がひとり、またひとりとやってきては、
箱の前で立ち止まり、何も入れずに去っていく者もいれば、
小さな紙切れをそっと落としていく者もいた。

黒猫が聞く。

「あの紙には、何が書いてあるの？」

「たぶんね、言葉にならなかった気持ちだよ」

旅人は箱の中を覗かなかった。
誰も中身を確かめようとはしない。
それがこの国の決まりだった。

通りを歩くと、店先に奇妙な看板が並んでいる。

夢は売り切れました
代わりに、今日を用意しています

未来は未定です
過去の返品は受け付けています

黒猫は思わず笑いそうになり、でもやめた。

「ここ、ちょっと優しいね」

「うん」
旅人は言った。
「希望を持てない人が、責められない国なんだ」

黒猫は歩きながら、ぽつりと言う。

「ぼく、希望って言葉を聞くと、
なんだか置いていかれる気がする」

旅人は足を止めた。

「どうして？」

「持ってないと、だめみたいだから」

旅人は黒猫の目を見て、ゆっくり答えた。

「この国ではね、
“持っていない”ことも、ちゃんと含まれてる」

夕方になると、町のはずれに小さな丘が見えた。
丘の上には、何もない。
旗も、碑も、約束の言葉もない。

ただ、風が通るだけだった。

丘のふもとに、こんな看板が立っている。

ここに希望はありません
それでも、立ち止まっていい場所です

黒猫はその前に座り込んだ。

「……希望がないって書いてあるのに、
なんだか、落ち着く」

「それはね」
旅人は言った。
「“見つけなきゃいけない”って言われていないからだよ」

空は少しずつ暗くなり、星がひとつだけ見えた。
それは明るくもなく、目立ちもしない星だった。

黒猫が言う。

「ねえ旅人。
あれ、希望かな」

旅人は首を横に振った。

「わからないね。
でも、名前をつけなくていい」

黒猫はしばらく星を見てから、目を伏せた。

「名前がないなら、失くしてもいい？」

「うん」
旅人はうなずいた。
「失くしたって、また同じものじゃなくてもいい」

二人は丘を下り、町へ戻った。
この国には出口の門も、旅立ちの合図もなかった。

ただ、歩きたい人が歩き出すだけ。

『名前のない希望の国』では、
希望は光らない。
掲げられない。
約束にもならない。

それでも、
眠る前に少し息が楽になることや、
明日を決めなくていい夜や、
理由のない静けさが、そっと置かれている。

旅人と黒猫は、
その“何でもない感じ”を胸に残して、
また次の国へ向かった。

希望を持つためではなく、
希望を持てない自分を、
そのまま連れていくために。`},
  {num:260,title:"『少しだけ前を向ける国』",body:`旅人と黒猫がたどり着いたのは、風の静かな国だった。

空は曇っているわけでも、晴れているわけでもない。
明るすぎず、暗すぎず、ちょうど言葉にしにくい色をしている。
町の人々は前を向いて歩いてはいるが、足取りはどこか慎重だった。

黒猫は小さくあくびをして言った。

「この国、元気すぎないね」

「うん」と旅人はうなずく。
「でも、うつむきすぎてもいない」

二人が通りを進むと、道の両脇に奇妙な標識が立っているのに気づいた。

無理に前を向かなくていい
今日は“少しだけ”でいい

黒猫はその文字を見上げる。

「少しだけ、って変だね。
前を向くなら、ちゃんと向かなきゃいけないんじゃないの？」

旅人は首を横に振った。

「この国ではね、“ちゃんと”は使われないんだ」

広場に着くと、人々が思い思いの姿勢で過ごしていた。
ベンチに座って遠くを見る人、
立ち止まったまま靴先だけを前に向けている人、
後ろを振り返りながらも、体だけは前を向いている人もいる。

黒猫は不思議そうに言った。

「みんな、向きがバラバラだね」

「それでいいんだよ」
旅人は静かに答えた。
「この国では、“心が追いつかない日”があることを、ちゃんと知っているから」

広場の中央には、小さな掲示板があった。
そこには毎日一つだけ、短い言葉が貼られるという。

今日の言葉は、こうだった。

昨日と同じ場所に立っていても
ほんの少し視線が上がったなら
それは前進です

黒猫はその言葉を読み、しばらく黙り込んだ。

「……ぼく、前を向こうとすると、
後ろに置いてきたものが気になっちゃう」

旅人は黒猫の隣にしゃがみ込む。

「うん。
前を向くって、忘れることじゃないからね」

「じゃあ、どういうこと？」

「“抱えたままでもいい”って認めることかな。
この国では、過去を連れたまま歩いていいんだ」

そのとき、近くにいた人が二人の会話を聞いて、穏やかに笑った。

「私はね、今日は椅子から立てただけで十分だったよ」

別の人が続ける。

「私は昨日より、少しだけ息が深く吸えた」

誰も拍手しない。
誰も評価しない。
ただ、それぞれの“少し”を、そのまま置いていくだけだった。

黒猫はしっぽをゆっくり揺らす。

「ここでは、比べられないんだね」

「うん。
“昨日の自分”とも比べなくていい」

夕方になると、町の端に小さな坂道が現れた。
急ではないが、平らでもない。
坂の入り口には、こんな看板が立っていた。

登らなくてもいい
立ち止まってもいい
でも、見上げられたら、それでいい

黒猫は坂の先を見た。
頂上は雲に隠れて見えない。

「ねえ旅人。
前って、あんなふうに見えないものなの？」

旅人はうなずいた。

「見えないことのほうが多いよ。
だからこの国では、“行けるかどうか”じゃなくて、
“向けたかどうか”を大事にするんだ」

黒猫は一歩だけ、前に足を出した。
すぐに立ち止まり、振り返る。

「……これでも、いい？」

「もちろん」
旅人は微笑んだ。
「それは立派な“少し”だよ」

二人は坂を登らなかった。
ただ、そこに立って、同じ方向を眺めた。

前を向けない日がある。
前を向きたくない日もある。
それでも、ほんの一瞬、視線が前に向いたなら。

それで、今日は十分。

『少しだけ前を向ける国』は、
がんばる人の背中を押さない。
引っ張らない。
ただ、倒れない場所を、そっと用意している。

旅人と黒猫は、
その感覚を胸に残したまま、
また静かに歩き出した。

前に進むためではなく、
“前を向ける日が来るかもしれない”と信じるために。`},
  {num:259,title:"『生きているだけで足りる国』",body:`旅人と黒猫がたどり着いたのは、静かで不思議な国だった。

町には大きな建物も、目立つ看板もない。
人々は思い思いの場所で、腰を下ろしたり、空を眺めたりしている。
誰かが急いで走ることもなく、誰かを叱る声も聞こえなかった。

黒猫は周囲を見回し、小さく首をかしげた。

「ねえ旅人、この国の人たち……何をしてるの？」

旅人は少し考えてから答えた。

「たぶんね、“何もしなくていい時間”を過ごしているんだと思う」

黒猫は驚いたように目を丸くする。

「何もしなくていいの？」

「うん。この国では、それが許されているんだ」

二人が歩いていくと、町の中央に小さな広場があった。
その真ん中には、古い木の掲示板が立っている。
紙は何枚も重ね貼りされているのに、書かれている言葉はいつも同じだった。

今日、ここに来たあなたは
もう十分にやってきました。

黒猫はその言葉をじっと見つめた。

「……これだけ？」

「それだけだよ」と旅人はうなずいた。
「この国では、“できたこと”を書く必要がないんだ」

黒猫は少し黙り込み、それからぽつりと言った。

「ぼく、できなかった日のほうが多いかも」

旅人は何も否定せず、ただ隣に立った。

「それでも、この国では問題にならない。
生きてここまで来た、それだけで十分だからね」

広場のベンチには、年齢も服装もばらばらな人たちが座っていた。
仕事を終えた人も、仕事を持たない人も、
何かを失った人も、何かを探している途中の人もいる。

誰かが誰かに、こう言っていた。

「今日は、起きられただけでよかったよ」

それを聞いた別の人が、静かにうなずく。

「それでいい日もあるよね」

黒猫はしっぽをゆっくり揺らした。

「ここでは、“ちゃんとしてない”って怒られないんだね」

「うん」と旅人は答える。
「ここでは、“ちゃんと生きてる”かどうかも、問われない。
ただ、“生きている”ことだけが事実として大切にされているんだ」

夕方になると、町はやわらかな光に包まれた。
人々はそれぞれの場所へ戻っていく。
誰も今日を反省せず、誰も明日を急がない。

黒猫は空を見上げ、ぽつりとつぶやいた。

「……ぼく、ここにずっといたら、少し楽になる気がする」

旅人は微笑んだ。

「そうだね。
でも覚えておいて。
この国は、特別な人のためだけにあるわけじゃない」

黒猫が振り向く。

「どういうこと？」

「この国は、“どこかに行かないと入れない場所”じゃない。
苦しいとき、何もできないとき、
“今日は生きているだけで足りる”って思えた瞬間に、
誰の心の中にも現れる国なんだよ」

黒猫はその言葉を胸にしまうように、目を閉じた。

「……じゃあ、ぼくもときどき、ここに来ていいんだね」

「もちろん」

二人はしばらく並んで立ち、沈みゆく空を眺めていた。

何かを成し遂げなくても、
前に進めなくても、
名前を持たなくても。

それでも、今日を生きている。

それだけで足りる国は、
静かに、確かに、そこにあった。

そして旅人と黒猫は、
その感覚を胸に抱いたまま、
次の国へと歩き出した。

――また、どうしても立ち止まりたくなったときのために。`},
  {num:258,title:"『わかりやすくない努力の国』",body:`旅人と黒猫がたどり着いた国には、
表彰台も、成績表も、掲示板もなかった。

代わりにあったのは、
静かな生活の音だった。
息を整える音、
椅子を引く音、
夜に灯りを消す音。

「ここでは、何を頑張ってるんだろう」
旅人が言った。

黒猫は、しばらく周囲を見てから答える。
「頑張ってるかどうか、
　測らない国みたいだね」

通りの端で、一人の人が立ち止まっていた。
何かを始めようとして、
結局、何も始めていない。

「今日は、ここまで来れました」
その人は、誰にともなく言う。

旅人は思わず尋ねた。
「何を、やったんですか？」

その人は困ったように笑った。
「説明できないことです。
　でも、昨日より少し、
　怖くなかった」

黒猫は、静かに頷いた。
「それは、かなりの努力だね」

別の場所では、
机に向かって座っている人がいた。
紙は白いまま。
文字は一つも書かれていない。

「書けなかったんですか？」
旅人が聞く。

「書こうとしました」
その人は答えた。
「三時間、座っていました」

誰も拍手しない。
誰も評価しない。
それでも、その人は
机を離れるとき、少しだけ誇らしそうだった。

広場には、
数字の代わりに言葉が集められていた。

――今日は、逃げなかった
――途中でやめなかった
――泣かなかった
――泣いても戻ってきた

どれも、
外からは見えない努力だった。

「比べられないね」
旅人が言う。

黒猫は、やわらかく答えた。
「比べられないから、
　ここに置いてある」

夕方、
一人の人が広場の端で立ち尽くしていた。
何も達成していないように見える。

旅人は声をかけるのを迷う。
黒猫が、小さく言った。
「今日は、立ってるだけで
　精一杯の日かもしれない」

旅人は、その人の隣に立った。
何も言わない。
ただ、同じ時間を過ごす。

夜。
国は静かに眠りにつく。
今日の努力は、
どこにも記録されない。

それでも、
確かに残っている。

旅人は思う。
わかりやすくない努力は、
消えているのではなく、
語られていないだけなのだと。

黒猫は、歩きながら言った。
「物語にしないと、
　残らない努力もある」

旅人と黒猫は、
誰にも見えなかった頑張りを胸に、
次の国へと歩いていった。`},
  {num:257,title:"『期待に応えすぎる国』",body:`旅人と黒猫がたどり着いた国では、
人々はとても親切だった。

頼まれれば断らず、
頼まれていなくても先に動く。
誰かの期待が見えた瞬間、
身体が自然に前へ出てしまう。

「いい人が多い国だね」
旅人が言う。

黒猫は、少しだけ立ち止まった。
「いい人であることが、
　休めない理由になってる」

広場で、一人の人が
何人もの頼みを同時に引き受けていた。
笑顔は崩れないが、
足取りは重い。

旅人は、その人の前に立った。
「その荷物、
　今日はここまででいいと思います」

その人は、きょとんとする。
「え……でも、
　まだ期待されていて……」

黒猫が、静かに続ける。
「期待は、
　今日は休んでもいい」

周囲が少しざわめく。
そんな言葉を、
この国で聞いたことがないからだ。

旅人は、広場の中央に
小さな布を広げた。
黒猫はその上に座る。

「ここは、
　“応えない場所”です」

誰かが笑った。
「そんな場所、意味あります？」

黒猫は、やわらかく答えた。
「応え続ける人がいるから、
　意味がある」

しばらくして、
さっきの人が、
恐る恐る布の端に腰を下ろした。

何もしない。
誰の期待にも応えない。
ただ、そこにいる。

すると、別の人が言った。
「……少し、代わります」

別の人が、
「今日は、引き受けません」と言った。

誰も責めなかった。
代わりに、
空いた仕事がそのまま残った。

それでも、
国は壊れなかった。

夕方。
広場には、
何もしない人が数人集まっていた。
笑顔も、役割もない。

旅人は気づく。
期待に応えない時間が、
初めて共有されている。

黒猫が、小さく言う。
「優しさってね、
　使い切らない前提で
　扱わないと、減ってしまう」

夜。
掲示板の文字が、一行だけ書き換えられていた。

――期待に、
――応えられない日もあります

それは小さな変化だった。
制度が変わったわけでも、
国の価値観が一夜で変わったわけでもない。

でも、
誰かが布の上に座ったことは、
確かに残った。

旅人と黒猫が国を去る朝、
広場には、
畳まれた布が置かれていた。

使うかどうかは、
その日の人たちが決める。

「少し、変わったね」
旅人が言う。

黒猫は、ゆっくり歩きながら答えた。
「変えたというより、
　余白を置いただけ」

期待に応えすぎる国は、
その日から、
応えなくてもいい場所を
ひとつ持つようになった。

旅人と黒猫は、
その余白を後ろに残して、
次の国へと歩いていった。


『期待に応えすぎる国』
―――

旅人と黒猫がたどり着いた国では、
人々はとても親切だった。

道を聞けば、
最後まで案内してくれる。
荷物を持てば、
代わりに運ぼうとする。
頼まれていなくても、
先回りして手を差し出す。

「いい国だね」
旅人が言う。

黒猫は、少し考えてから答えた。
「うん。
　でも、期待がとても上手に循環してる」

通りを歩いていると、
一人の人が何人もの頼みを同時に受けていた。
笑顔を崩さず、
次々と頷いている。

旅人が声をかける。
「大丈夫ですか？」

その人は反射的に答えた。
「大丈夫です。
　期待されてるので」

言葉は丁寧だが、
声は少しだけ擦れていた。

黒猫が、やわらかく尋ねる。
「断ることは、ありますか？」

その人は一瞬考えて、
首を振った。
「断ると、
　がっかりさせてしまうので」

別の場所では、
同じように頼みを受け続けている人がいた。
疲れた様子でも、
「役に立ててよかったです」と言う。

旅人は不安になる。
「無理してない？」

黒猫は、静かに言った。
「無理だと、
　気づく余裕がなくなる仕組みだね」

広場には、
「期待ありがとう」という掲示板があった。
人々の名前と、
感謝の言葉が並んでいる。

称賛は、重ならない。
一人ひとりに、
均等に注がれる。

「褒められてるのに、
　どうして苦しそうなんだろう」
旅人が言う。

黒猫は答える。
「期待が、
　休憩にならないから」

夕方、
一人の人が、広場の端に座り込んだ。
それでも、
誰かが近づくと立ち上がろうとする。

旅人が、そっと言った。
「今は、応えなくていいですよ」

その人は、困ったように笑った。
「そう言われるの、
　久しぶりです」

黒猫が続ける。
「ここではね、
　優しさが、
　減る前提で使われていない」

夜。
国は静かになるが、
人々の心は休まらない。

灯りの下で、
誰かが小さくつぶやく。
「期待に応えられなくなったら、
　私、何者なんだろう」

旅人は、答えを持たない。
ただ、そばに立つ。

黒猫は、穏やかに言った。
「応えられない日があっても、
　価値は減らない」

国を出る道で、
旅人は振り返る。

この国の人々は、
怠けていたわけでも、
弱かったわけでもない。

ただ、
期待に応え続けることが、
美徳として設計されていただけだった。

旅人と黒猫は、
応えすぎた優しさを否定せず、
次の国へと歩いていった。`},
  {num:256,title:"『休み方を知らない国』",body:`旅人と黒猫がたどり着いた国では、
人々は皆、忙しそうに歩いていた。
走っているわけではない。
けれど、誰も立ち止まらない。

通りには、仕事場が途切れなく並んでいる。
朝も昼も、夜になっても、灯りは消えない。

「働き者の国なんだね」
旅人が言う。

黒猫は、少し首を傾げた。
「働いてる、というより……
　休む場所を知らないみたい」

広場で、一人の人が腰を下ろしていた。
けれど、背中はこわばったまま、
目はずっと地面を追っている。

旅人が声をかける。
「大丈夫ですか？」

その人は、慌てて立ち上がった。
「すみません、休んでるわけじゃなくて」

「責めてないよ」
旅人が言うと、
その人は少し困った顔をした。

「休むって、
　どうすればいいんでしょう」

黒猫が、やさしく問い返す。
「今は、何をしている途中なの？」

「何かを、しなきゃいけない途中です」
その人は真剣に答えた。

通りを進むと、
別の人が壁にもたれて目を閉じていた。
だが、手には仕事道具を握ったままだ。

「家では休めないんですか？」
旅人が聞く。

「家は、次の準備をする場所です」
その人は言う。
「休む場所じゃない」

黒猫は、静かに言った。
「この国には、
　“何もしなくていい時間”の設計がない」

国の中央には、大きな時計塔があった。
刻んでいるのは、
「始まり」と「締め切り」だけ。

休憩の印は、どこにもない。

旅人は、ふと気づく。
「怠けてる人がいないんじゃなくて、
　休める人がいないんだ」

黒猫は、少しだけ微笑んだ。
「うん。
　休めないのは、性格じゃない。
　構造の問題だね」

夕方、
一人の人がぽつりとつぶやいた。
「疲れてるんです。でも、
　休み方が分からない」

誰も答えられない。
慰めの言葉も、用意されていない。

旅人は、その場に座った。
黒猫も隣に座る。

「今は、何もしなくていい時間です」
旅人が、静かに言った。

その人は戸惑いながら、
ゆっくりと腰を下ろした。

何も変わらない。
けれど、少しだけ呼吸が深くなる。

夜。
国の灯りは、相変わらず消えない。
それでも、広場の片隅に、
小さな座る人の輪ができていた。

誰かが言った。
「これが、休む、なのかもしれない」

黒猫は、小さく頷く。
「最初は、設計じゃなくて、
　真似から始まることもある」

国を出るとき、
旅人は振り返った。

休めない人たちは、
怠けていたわけじゃない。
ただ、休む道具も、時間も、
与えられていなかっただけだった。

旅人と黒猫は、
「何もしない時間」を一つ胸に抱えて、
次の国へと歩いていった。`},
  {num:255,title:"『向いていないことをやめる国』",body:`旅人と黒猫がたどり着いた国では、
道の途中に、使われなくなった場所がそのまま残っていた。
壊れてはいない。
ただ、続いていないだけだった。

工房の前で、一人の人が扉を閉めていた。
中には、半分まで作られた道具が残っている。

旅人は、少し迷ってから声をかけた。
「終わったんですか？」

その人は、首を横に振った。
「続けられなかった、が近いですね」

「失敗、ではなく？」
旅人が尋ねる。

「ええ」
その人は扉に手を置いたまま言った。
「手が動かなくなったんです。
　頑張れば動いたかもしれないけど、
　ここで無理をすると、
　自分が嫌いになりそうで」

黒猫が、やわらかく口を挟む。
「それで、やめたんだ」

「はい」
その人は少し笑った。
「やめたら、朝が楽になりました」

通りを進むと、
別の人が道端で休んでいた。
そばには、使い古された靴。

「旅人さんですか」
その人が声をかけてくる。
「ここでは、やめた話、よくしますよ」

「どんなふうに？」
旅人が聞く。

「理由を説明しないんです」
その人は肩をすくめた。
「合わなかった、で終わり。
　それ以上は、聞かれません」

黒猫は、静かに頷く。
「合わなさは、才能の不足じゃないからね」

夕方、
小さな広場に人が集まっていた。
輪になって、座っている。

「今日は、やめた話の日です」
誰かが言う。

一人が口を開く。
「続けるつもりだったけど、
　苦しくなった」

別の人が言う。
「最後までやれなかったけど、
　途中までやったから、
　向いていないって分かった」

誰も拍手しない。
誰も慰めない。
ただ、静かに聞いている。

旅人は思わず言った。
「やめたことを、
　こんなふうに話していいんだ」

そばにいた人が、穏やかに答える。
「やめた人の話は、
　これからやめる人を、
　助けるから」

黒猫は、小さく付け加えた。
「続ける人を否定する話でもないしね」

夜。
人々は、それぞれの家に戻っていく。
続けている人も、
やめたばかりの人も、
同じ明かりの下にいる。

国を出る道で、
旅人が黒猫に言った。
「やめるって、
　こんなに静かな選択なんだね」

黒猫は歩きながら答えた。
「大きな決断じゃなくて、
　自分の声を聞いただけ、
　なのかもしれない」

旅人と黒猫は、
向いていないことを手放した人たちの背中を思い出しながら、
次の国へと歩いていった。`},
  {num:254,title:"『個性を求められる国』",body:`旅人と黒猫がたどり着いた国では、
家の数だけ、工房があった。

扉の形も、看板の文字も、
中から聞こえる音も、すべて違う。
彫刻の音、機械の音、筆が走る音。
それぞれが、自分の「何者か」を作っている。

通りの入り口に、大きな標語が掲げられていた。

――あなたは、何者ですか

「質問が、ずいぶんはっきりしてるね」
旅人が言う。

黒猫は、少し考えてから答えた。
「ここでは、答えを持ってる前提なんだろうね」

工房の前で、
立ち尽くしている人がいた。
扉は開いているのに、
中には何も置かれていない。

「始めないんですか？」
旅人が声をかけると、
その人は困ったように笑った。

「何を作ればいいか、分からなくて」
「でも、何者かにならないと、
　ここにいてはいけない気がして」

旅人は返す言葉を探す。
黒猫が、やさしく言った。
「悩んでる時間も、
　ちゃんと工房の中だよ」

別の通りでは、
迷いなく手を動かす人たちがいた。
自分の得意を知っていて、
迷わず進んでいるように見える。

「進める人もいるんだね」
旅人が言う。

黒猫は頷く。
「うん。
　悩まないわけじゃないけど、
　悩む場所が決まってる人たちだ」

広場に行くと、
完成品が並べられていた。
それぞれに、
「私らしさ」と書かれた札が付いている。

人々は比べ合い、
評価し、
時にはため息をつく。

工房に戻る途中、
旅人はさっきの人を思い出した。
まだ、何も作れていない人。

「作れない人は、
　置いていかれない？」
旅人が不安そうに言う。

黒猫は、少し歩調を緩めた。
「ここではね、
　進む人の音が大きいだけ」

夕方になると、
工房の明かりが一斉につく。
手を動かす人、
考え込む人、
何もせず座る人。

どの工房にも、
同じ明かりが灯っていた。

旅人は気づく。
工房は、
完成のためだけにあるわけじゃない。

悩むための場所でもあり、
立ち止まるための場所でもある。

「何者かにならなくても、
　ここにいることはできるのかな」
旅人が言う。

黒猫は、静かに答えた。
「なろうとすること自体が、
　もう一つの個性なんだと思う」

夜。
工房の音は次第に消えていく。
完成したものも、
途中のものも、
手つかずの工房も、
同じように眠りにつく。

国を出るとき、
旅人は振り返った。

あの国では、
悩む人も、
それでも進む人も、
同じ問いの前に立っていた。

答えの速さが違うだけで。

旅人と黒猫は、
「何者かにならなければ」という問いを
そのまま持って、
次の道へと歩き出した。`},
  {num:253,title:"『続けられなかった国』",body:`旅人と黒猫がたどり着いた国には、
途中で終わったものが、あちこちに残っていた。

半分まで耕された畑、
途中で止まった歌の練習、
書きかけの手紙、
未完成の家。

どれも放置されているようで、
捨てられてはいない。

「やめた痕跡ばかりだね」
旅人が言う。

黒猫は、足元の未舗装の道を見ながら答えた。
「痕跡があるってことは、
　ちゃんと歩いた時間があったってことだよ」

最初に出会ったのは、
途中で農業をやめた人だった。

「続けられなかったんです」
その人は、穏やかに言う。
「でも、土の匂いは、今も分かる」

その人は今、
食べ物を選ぶ仕事をしている。
畑での時間が、
無駄にはならなかった。

次に会ったのは、
楽器を途中で置いた人。

「才能がないと思って」
そう言いながら、
その人は音楽を聴く側になった。

「作れなくなって、
　聴けるようになったんです」

黒猫は、静かに頷いた。
「関わり方が、変わっただけだね」

通りの先では、
学びを途中でやめた人が、
子どもに教えていた。

「全部は理解できなかった」
「でも、つまずいた場所は覚えてる」

それは、
誰かの道しるべになっていた。

広場には、
途中で終えたものを並べた市が立っていた。

畑の道具、
書きかけの原稿、
使わなくなったユニフォーム。

値札はついていない。
代わりに、短い言葉が添えられている。

――ここまでやった
――ここで分かった
――ここで違うと気づいた

「成果じゃないんだね」
旅人が言う。

黒猫は、やわらかく答える。
「経験の形だよ」

夕方、
未完成の橋の前で、
何人かが立ち止まっていた。

「渡れないね」
旅人が言う。

「でも、
　どこまで行けるかは分かった」
黒猫はそう言って、
橋の端を軽く叩いた。

夜。
国は静かに灯る。
未完成のものも、
完成したものと同じ明かりで照らされる。

翌朝、
旅人と黒猫は国を出る。

振り返ると、
途中でやめた道が、
無数に分かれている。

それらは失敗の道ではない。
選び直すための分岐だった。

「続けられなかったことって、
　役に立つこともあるんだね」
旅人が言う。

黒猫は、ゆっくり歩きながら答えた。
「役に立たなくてもいいけど、
　意味は、もうそこにあるよ」

続けられなかったことは、
時間を裏切らなかった。

それは、
生き方の輪郭を
少しはっきりさせただけだった。

旅人と黒猫は、
途中でやめたすべてを否定せず、
次の道へと進んでいった。`},
  {num:252,title:"『できなかった日の国』",body:`旅人と黒猫がたどり着いた国では、
一日の終わりに、
小さな箱が家々の前に置かれていた。

箱には、何も書かれていない。
中をのぞくと、紙が一枚だけ入っている。

――今日は、できなかったこと

旅人は首をかしげた。
「やらなかったこと、じゃないんだね」

黒猫は、箱をそっと閉じながら答える。
「ここでは、分けて考えるんだ」

通りを歩くと、人々が箱に紙を入れていく。
書かれている言葉は短い。

「起き上がれなかった」
「連絡できなかった」
「外に出られなかった」

誰も言い訳を添えない。
誰も責める言葉を書かない。

「それで終わり？」
旅人が尋ねる。

黒猫は、やわらかく頷いた。
「うん。
　できなかった理由は、
　その人の中にあるから」

広場には、大きな掲示板があった。
だが、貼られているのは達成の記録ではない。

――今日も、できなかった日でした

同じ言葉が、
日付だけを変えて並んでいる。

「これ、消さないんだ」
旅人が言う。

「消さないよ」
黒猫は静かに言った。
「できなかった日も、
　ちゃんと一日だから」

夕方、
ベンチに座る人が、
紙を握りしめたまま立ち尽くしていた。

旅人は声をかけようとして、
立ち止まる。

黒猫が小さく言う。
「今日は、
　書けなかったことかもしれないね」

旅人は黙って隣に座った。
しばらくして、その人は紙を畳み、
箱にそっと入れた。

何も言わなくてよかった。

夜になると、
箱は回収され、
中身は数えられないまま保管される。

集計も、評価もない。

翌朝。
箱は空になって、
また家々の前に戻ってくる。

「昨日の“できなかった”は？」
旅人が尋ねる。

黒猫は、朝の光の中で答えた。
「昨日に置いてきた。
　背負うものじゃないから」

国を出る道で、
旅人は思う。

できなかった日は、
怠けた日ではない。

力が足りなかった日、
余裕がなかった日、
それでも、生きていた日だ。

旅人と黒猫は、
何も達成しなかった一日を、
そっと肯定しながら、
次の国へと歩き出した。`},
  {num:251,title:"『気づかれなくても続く国』",body:`旅人と黒猫がたどり着いた国は、
一見すると、とても静かだった。
旗も掲げられておらず、
成功を示す印も見当たらない。

通りでは、人々が同じ動きを繰り返している。
井戸の水を汲む人、
道を掃く人、
店先の棚を整える人。

誰も拍手を受けない。
誰も成果を報告しない。

「何を目指している国なんだろう」
旅人が小さく言った。

黒猫は、足元の石畳を確かめるように歩きながら答える。
「目指しているかどうか、
　ここではあまり大事じゃないみたい」

広場の隅で、年配の人が毎日同じ場所に花を植えていた。
花はすぐに枯れ、
次の日にはまた植え替えられる。

「無駄に見えるね」
旅人がつぶやく。

黒猫は首をかしげる。
「でも、地面はやわらかくなってる」

別の通りでは、
一人の人が壊れかけの橋を、
毎日少しずつ直していた。
完成の予定は、誰も知らない。

通り過ぎる人は、
足を止めない。
礼も言わない。

それでも、その手は止まらなかった。

夕方、旅人は不思議に思う。
「誰にも気づかれないのに、
　どうして続けられるんだろう」

黒猫は、穏やかな声で言う。
「見られなくても、
　続いてるってこと自体が、
　もう答えなんじゃないかな」

宿に戻ると、
帳場には何も書かれていない日誌があった。
今日の出来事を記す欄は、
空白のままだ。

「何も書かないんだ」
旅人が言う。

「書かなくても、
　今日は終わるからね」
黒猫は静かに答えた。

夜。
国は特別な終わり方をしない。
灯りは一つずつ消え、
また明日の準備に戻っていく。

翌朝。
旅人と黒猫は、国を出る支度をした。
見送りはない。
門もない。

出発の道すがら、
旅人は振り返る。
昨日と同じ人が、
昨日と同じ場所で、
同じことをしている。

「変わってないね」
旅人が言う。

黒猫は歩きながら答える。
「変わらないように、
　続いてるんだよ」

国の外に出ると、
振り返っても、
特別な景色は見えなかった。

それでも、
その国は今日も続いている。

誰かに気づかれなくても、
成果が見えなくても、
静かな営みは途切れない。

旅人と黒猫は、
その“続いていること”を胸に、
次の道へと歩いていった。`},
  {num:250,title:"『理由を探さない国』",body:`旅人と黒猫がたどり着いた国には、
理由を問う言葉が、最初から置かれていなかった。

広場の木の下に、
一人の青年が座っていた。
背中を丸め、空を見上げているが、
何を考えているのかは分からない。

旅人は、声をかけようとして、ためらった。
「どうして……」

黒猫が、そっと首を横に振る。
「ここでは、聞かなくていい」

旅人は青年の隣に腰を下ろした。
距離は近すぎず、遠すぎず。
言葉は、置かない。

しばらくして、青年が小さく言った。
「理由が、分からないんです」

旅人は答えを探してしまう。
だが、黒猫が先に口を開いた。
「分からなくても、ここにいていいよ」

青年は少し驚いたように顔を上げた。
「……聞かれないんですね」

「うん」
黒猫の声は、やわらかかった。
「理由を話す元気がない日もあるから」

広場を行き交う人たちは、
三人を特別に見ない。
誰も、青年に説明を求めない。

青年は、息を整えるように肩を下ろした。
「前の場所では、
　理由を言えないと、
　ちゃんとしてないって言われました」

旅人は、胸の奥が少し痛んだ。
それでも、言葉を足さない。

黒猫が静かに言う。
「理由は、あとから見つかることもある。
　見つからないままでも、
　間違いじゃない」

夕方、
鐘は鳴らず、
日だけが傾いていく。

青年は立ち上がり、
小さく頭を下げた。
「今日は、説明しなくて済みました」

その声には、
わずかな軽さがあった。

宿へ向かう道で、
旅人が黒猫に尋ねる。
「何も解決してないのに、
　いいのかな」

黒猫は歩きながら答えた。
「解決より先に、
　守られる時間が必要な日もある」

夜。
それぞれの部屋に灯りがともる。
青年の部屋にも、
同じように小さな灯りが揺れる。

この国では、
感情は説明できるかどうかで
価値を決められない。

分からないままでも、
疲れていても、
人はここにいていい。

旅人と黒猫は、
理由を探さなかった一日を抱えて、
静かに眠りについた。`},
  {num:249,title:"『何も起きない国』",body:`旅人と黒猫がたどり着いた国では、
特別な出来事が何ひとつ起きていなかった。

鐘は鳴らず、
行列もなく、
誰かが泣いたり笑ったりする大きな理由もない。

朝、店はいつも通りに開き、
昼、人々はいつも通りに歩き、
夕方になると、いつも通りに家へ帰る。

「……本当に、何も起きないね」
旅人が言った。

黒猫は、日向で丸くなりながら、
やわらかな声で答える。
「うん。今日は、ちゃんと“何も起きなかった日”だね」

通りの掲示板には、紙が一枚だけ貼られていた。

――本日の記録
――特記事項なし

旅人は少し戸惑う。
「失敗とか、停滞とか、
　そういう扱いにはならないの？」

黒猫はゆっくりと目を開けた。
「ならないよ。
　呼吸みたいな一日だから」

川辺では、誰かが洗濯をしている。
洗い終わった布は、静かに風に揺れる。
見ているだけで、時間がほどけていく。

「何も起きないと、
　置いていかれる気がする」
旅人がぽつりと言う。

黒猫は、少しだけ体を寄せた。
「進んでないように見えても、
　今日もちゃんと、ここにいたでしょう」

昼下がり、広場の時計は一度も注目されない。
針は進んでいるのに、
誰も急がせない。

パン屋では、昨日と同じパンが焼かれ、
同じ値段で、同じように売れていく。

「変わらないって、
　こんなに静かなんだ」
旅人が息をつく。

「静かだけど、空っぽじゃないよ」
黒猫は穏やかに言った。
「今日は“壊れなかった日”でもある」

夕方。
特別な締めくくりもなく、
空の色だけが、少しずつ変わる。

宿の窓から見える灯りは、
どれも同じくらいの明るさだ。

「今日を、どう記憶すればいい？」
旅人が尋ねる。

黒猫は、しばらく考えてから答えた。
「生き延びた日、でいいと思う」

夜。
何も起きなかった一日は、
誰にも拍手されずに終わる。

それでも、この国では、
その一日がきちんと数えられていた。

変化も事件もない一日を、
失敗にしないために。

旅人と黒猫は、
何も起きなかった今日を連れて、
静かに眠りについた。`},
  {num:248,title:"『小さな声が残る国』",body:`旅人と黒猫がたどり着いた国は、とてもにぎやかだった。
広場では人々が声を張り上げ、意見を述べ、歌い、主張している。
太鼓の音、演説、笑い声が重なり、空気が震えていた。

「声が大きい人が多い国だね」
旅人が耳を押さえながら言う。

黒猫は静かに地面を見つめていた。
「でも、ここは“大きな声の国”じゃない」

広場の端に、小さな建物があった。
扉は低く、看板も控えめだ。
近づくと、かすかな音が聞こえてくる。

――……それは、いやでした
――……ほんとは、少し怖かった
――……わからないままです

旅人は息を潜めた。
「今の、聞こえた？」

「聞こえた」
黒猫は頷いた。
「この国では、小さな声は記録される」

中に入ると、机が並び、紙とペンが置かれている。
声を出せない人たちが、ゆっくりと言葉を残していた。
書けない人のために、誰かが代筆している。

「外の声に、消されないの？」
旅人が尋ねる。

黒猫は壁を指した。
そこには無数の紙が貼られていた。
かすれた文字、途切れた文、
途中で終わったままの言葉もある。

「消えない」
黒猫は言った。
「大声は流れていくけど、
　小さな声は、ここに留まる」

外に戻ると、演説はまだ続いている。
誰かが勝ち、誰かが負け、
拍手とブーイングが交錯する。

その足元で、
小さな子どもが誰にも聞こえない声で言った。
「……ぼくは、こわい」

旅人は反射的にしゃがみ込む。
だが、何も言わない。
黒猫がそっと隣に座る。

少しして、近くの大人が気づいた。
「どうしたんだい」

子どもは小さく、でも確かに答える。
「こわかった」

大人はうなずき、子どもの肩に手を置いた。
それだけで、十分だった。

夜になると、国の喧騒は静まる。
広場に残るのは、昼間には聞こえなかった音。
紙をめくる音、息を整える音、
小さな声が、やっと響く時間。

旅人は空を見上げて言った。
「小さな声って、弱いと思ってた」

黒猫は尻尾を揺らす。
「小さいだけだよ。
　消えない強さを、持ってる」

この国では、
大声が世界を動かすことがあっても、
小さな声が、世界を残していた。

旅人と黒猫は、
そのかすかな響きを胸に、
静かに次の道へと歩き出した。`},
  {num:247,title:"『優しくなれない日もある国』",body:`旅人と黒猫がたどり着いた国では、
人の胸に小さな札が下がっていた。

「今日は、優しくなれます」
「今日は、優しくなれません」

文字は日によって、静かに書き換わる。
誰かが決めるのではなく、
朝、目を覚ましたときの心の重さで。

「ずいぶん正直な国だね」
旅人が言うと、黒猫は頷いた。
「嘘をつかなくていい国だ」

通りには、穏やかに挨拶する人もいれば、
目を合わせずに歩く人もいる。
けれど、不思議と衝突は起きない。

札を見れば、理由が分かるからだ。

広場で、花を配っている女性がいた。
札には「今日は、優しくなれます」とある。
彼女は、誰かに断られても、顔色を変えない。

少し離れたベンチには、
背を丸めて座る青年がいた。
札には「今日は、優しくなれません」。

旅人は声をかけようとして、迷った。
黒猫が言う。
「話しかけなくていい。
　でも、近くにいてもいい」

旅人は黙って、同じベンチの端に座った。
青年は何も言わない。
それでも、立ち去らなかった。

しばらくして、花を配っていた女性が近づいてくる。
彼女は青年に花を差し出さず、
そっと旅人の足元に置いた。

「無理に渡さないんですね」
旅人が言う。

「ええ」
女性は微笑んだ。
「今日は受け取れない人もいるから」

夕暮れ時、宿に戻ると、
廊下ですれ違う人たちの札が、
薄暗がりに混ざって見える。

優しい人と、
今日は優しくなれない人。
どちらも、同じ灯りの下にいる。

旅人は黒猫に尋ねた。
「優しくなれない人は、
　何もしなくていいの？」

黒猫は窓の外を見ながら答えた。
「何もしないことが、
　誰かを傷つけない優しさになる日もある」

夜。
国中の札は外され、
人々はただの人に戻る。

誰かは今日、たくさん手を差し伸べ、
誰かは今日、耐えるだけで精一杯だった。

それでも、価値は同じだった。

旅人は眠りにつく前、思った。
優しくなれない日があっても、
優しい人たちと、同じ世界にいられる。

この国は、
優しさの強弱ではなく、
存在そのものを並べて置く国だった。

旅人と黒猫は、
その静かな共存の中で、
明日へと目を閉じた。


『優しくなれない日の国』



旅人と黒猫がたどり着いたのは、曇った空の下にある国だった。
雨は降っていないのに、陽射しもない。
人々はそれぞれの歩幅で歩き、誰も急かさない。

「ここは、元気がないわけじゃないんだね」
旅人が言う。

黒猫は石畳の上で立ち止まり、周囲を見渡した。
「うん。今日は“そういう日”な人が多いだけだ」

通りの角で、パン屋の前に座り込んでいる青年がいた。
看板は出ているのに、店は開いていない。

「どうしたんですか？」
旅人が声をかけると、青年は少し困ったように笑った。

「今日は、人に優しくできそうになくて」
「だから、店を開けなかったんです」

旅人は言葉を探したが、うまく見つからなかった。
黒猫が代わりに言う。
「それでいいと、この国は決めた」

青年は驚いたように目を丸くした。
「……責められないんですか？」

「責めない」
黒猫は短く答えた。
「優しさは義務じゃないから」

広場に行くと、噴水の縁に腰掛けている老女がいた。
誰かに声をかけられても、返事をしない。
それでも、人々はそっとしておく。

旅人は黒猫に尋ねた。
「助けなくていいの？」

「助けられない日もある」
「この国では、それも“人”として扱われる」

老女はしばらくして、自分から立ち上がった。
誰にも見られないように、深く息を吸い、ゆっくり歩き出す。

夕方、宿の前に木の看板が立っていた。

――今日は、優しくなれない日かもしれません
――それでも、ここに泊まれます

旅人はそれを読んで、肩の力が抜けた。
「何もしなくても、いいんだ」

黒猫は尻尾を揺らしながら言った。
「何もしない選択も、生きている証拠だよ」

夜。
旅人と黒猫は同じ部屋で静かに過ごす。
外では、いくつかの窓に灯りがともっている。

誰かを励ましている灯りではない。
誰かが、ただ今日を終えた灯りだ。

「明日は、少し優しくなれるかな」
旅人がつぶやく。

黒猫は目を閉じたまま答えた。
「なれなくても、ここを通ってきたことは消えない」

優しくなれない日も、
この国では、確かに一日として数えられていた。

旅人と黒猫は、
その静かな肯定の中で、眠りについた。


『優しくなれない日の国』


旅人と黒猫がたどり着いたのは、音の少ない国だった。
鐘もなく、呼び声もなく、ただ風が低く流れている。

「静かな国だね」
旅人が言うと、黒猫は歩調を緩めた。
「この国では、声を張らなくていいらしい」

道を行く人々は、誰かを助けているわけでも、争っているわけでもなかった。
目が合えば、軽く会釈する。
合わなければ、そのまま通り過ぎる。
笑顔もあれば、無表情もある。
どれも、咎められていない。

広場の片隅に、看板が立っていた。

――今日は、優しくなれない日かもしれません。
――それでも、ここにいていい。

旅人は足を止めた。
「……優しくなれない日、って書いてある」

黒猫は看板の前で座り込み、尻尾を丸めた。
「この国ではね、優しさは通貨じゃない。
　払えない日があっても、追い出されない」

旅人は思い出していた。
言葉がきつくなってしまった日。
誰かの話を聞く余裕がなかった日。
自分の中の疲れに気づく前に、責めてしまった自分。

「優しくできないと、だめだと思ってた」
旅人はぽつりと言った。

黒猫は何も答えなかった。
ただ、隣にいる。

しばらくして、旅人は深く息を吐いた。
誰かに許されたわけでも、解決したわけでもない。
それでも、胸の奥の硬さが、少しだけほどけていた。

この国では、
今日は助けない人も、
今日は笑えない人も、
今日は自分のことで精一杯な人も、
同じ地面の上を歩いていい。

夜になると、灯りが一つずつともる。
それは励ますための灯りではなく、
「ここにいる」という印だった。

旅人と黒猫は、その中の一つの灯りの下で休んだ。

「明日は優しくなれるかな」
旅人が言うと、黒猫は静かに首を振った。
「明日のことは、明日の国が考える」

この国では、
今日を生き切れただけで、十分だった。`},
  {num:246,title:"『それぞれのペースの国』",body:`旅人と黒猫がたどり着いた国では、時計がいくつもぶら下がっていた。
けれど、どれも違う速さで動いている。

「壊れてるのかな」

旅人が言うと、黒猫は静かに答えた。

「どれも、合っている」

道を歩く人たちは、歩幅も速度もまちまちだった。
早く進む人。
何度も立ち止まる人。
遠回りを選ぶ人。

誰も、誰かを追い立てない。

橋を渡るとき、
一人が足を止めた。
後ろの人たちは、待つ。

「大丈夫、急がなくていい」

その声は、小さくて、自然だった。

旅人は胸の奥が少し緩むのを感じた。

作業場では、何人かが一つのものを作っている。
手順は揃っていない。

得意な人が、少し多めに手を動かす。
苦手な人は、準備や片づけをする。
途中で疲れた人は、休む。

完成まで、時間はかかる。
でも、途中で投げ出されることはない。

「役割が、ちゃんと分かれてるんだね」

旅人が言うと、黒猫は首を振った。

「流動的だ。
できる時に、できることをやる」

誰かが失敗すると、
別の誰かがそっと補う。
責める声はない。

「うまくできない日もあるよね」

「ある。
だから、一人に任せない」

夕方、広場で人々が集まる。
その日の進み具合を確認するが、
比べることはしない。

――今日はここまで
――続きは、また明日

旅人はその言葉に、見覚えがあった。

「焦らなくていいって、
ちゃんと仕組みになってる」

黒猫は小さくうなずく。

「優しさは、
個人の性格じゃなく、
設計だ」

国を歩くうち、
旅人は気づいた。

この国では、
器用さは才能の一つでしかない。
速さも、同じ。

どれも、価値の差にはならない。

旅人は足取りを、
自分に合った速さに落とした。

黒猫は、それに合わせる。

「置いていかれないんだね」

「置いていかないから」

空が夕色に染まる。

それぞれの時計が、
それぞれの一日を終える。

それぞれのペースの国では、
速さは競われない。

ゆっくりでも、
一緒なら、進める。

旅人と黒猫は、
同じ方向を見ながら、
違う呼吸のまま、歩き続けた。


『うまくできない人の国』


旅人と黒猫がたどり着いた国では、道のあちこちに小さな段差があった。
けれど、それをなくそうとする人はいない。
代わりに、手すりや腰掛けが、自然に増えている。

「歩きにくくない？」

旅人が尋ねると、黒猫は首を振った。

「ここでは、
“うまくできない前提”で作られている」

通りを歩く人たちは、急がない。
荷物を落とす人がいれば、
誰かが拾うまで、待つ。

「ごめん」と言う声も、
「気にしないで」と返す声も、
どちらも控えめだ。

旅人は気づく。

誰も、手際の良さを競っていない。

作業場では、道具が少しずつ違う形をしていた。
持ちにくい人のために太くなった柄。
力が弱くても使える仕組み。

完成品は、均一ではない。
でも、どれも使われている。

旅人は言った。

「評価が大変そうだね」

黒猫は答える。

「評価より、
続くことを大事にしている」

広場の真ん中で、
何人かが一緒に何かを作っていた。
進みは遅い。

間違える。
やり直す。
休む。

誰も苛立たない。

「今日は、ここまででいいか」

「うん、続きは明日」

そのやり取りが、当たり前に交わされる。

旅人の胸が、少しあたたかくなった。

「できないと、
迷惑をかけている気がしてしまう」

黒猫は立ち止まり、旅人を見た。

「ここでは、
迷惑は想定内だ」

旅人は思わず笑った。

夕方、作業は自然に終わる。
達成感は小さいが、
疲れは深くない。

旅人は空を見上げた。

「器用じゃなくても、
生きていけるんだね」

「器用じゃないから、
一緒に生きる」

黒猫の声は、はっきりしていた。

国を出るころ、
旅人は足取りが少し遅くなった。
それでも、置いていかれる不安はなかった。

うまくできない人の国では、
速さより、隣が大切だった。

旅人と黒猫は、
同じ速度で、
ゆっくりと次の道へ進んでいった。`},
  {num:245,title:"『自分に戻れる国』",body:`旅人と黒猫がたどり着いた国の入口には、
大きな建物も、検問もなかった。
ただ、低い棚が並んでいるだけだった。

棚の上には、さまざまな服が置かれている。
立派な制服。
役職の印がついた上着。
期待や評価を縫い込んだような仮面。

旅人は思わず立ち止まった。

「……これ、着て入るの？」

黒猫は首を横に振った。

「脱いで入る」

近くにいた人が、慣れた手つきで上着を外し、
棚にそっと置いた。

「ここでは、
役は外に置いていくんです」

名前も、肩書きも聞かれない。
ただ、軽くうなずかれるだけ。

旅人は自分の胸元を見た。
目には見えないが、
ずっと着ていた何かがある気がした。

評価される役。
期待に応える役。
説明できる自分でいる役。

旅人は深く息を吸い、
それらを一枚ずつ脱ぐ想像をした。

棚に置くと、
肩が少し下がった。

国の中は、驚くほど静かだった。
話し声はあるが、
張りつめていない。

人々は、取り繕わない歩き方をしている。
早くも、遅くもない。
誰かに合わせていない速度。

旅人はぽつりと言った。

「……何者でもなくなるの、少し怖い」

黒猫は歩きながら答える。

「何者かでいるのは、
外で十分やった」

川辺に腰を下ろすと、
旅人は理由もなく、ただぼんやりした。

誰も「どうしたの」と聞かない。
誰も、何かを求めない。

それでも、そこにいていい。

「何もしなくていいんだ」

「“戻っている”だけだ」

黒猫の声は、低くてやさしかった。

夕暮れになると、
棚の前に人が集まり始める。
それぞれ、自分の服を選ぶ。

着る人もいれば、
今日はそのまま帰る人もいる。

旅人は迷った末、
一番軽いものだけを手に取った。

「全部は、着直さなくていいんだね」

「必要な分だけでいい」

国を出ると、
外の世界の音が少し大きく感じられた。

けれど、旅人の中には、
ちゃんと“戻る場所”が残っている。

自分に戻れる国は、
逃げ場ではない。

演じるために、
素に戻るための国だった。

旅人と黒猫は、
またそれぞれの役を引き受けながら、
軽い足取りで道を進んでいった。`},
  {num:244,title:"『振り返りの国』",body:`夜が明けても、何も変わらなかった。
鐘は鳴らず、旗も掲げられない。
新年を告げる合図は、この国にはなかった。

旅人は少し拍子抜けした顔で空を見た。

「……始まった感じがしないね」

黒猫はすでに歩き出している。

「始まりは、
気づかれないことが多い」

通りには、昨日と同じ道。
昨日と同じ店。
昨日と同じ人の足音。

それでも、人々は一歩ずつ歩いている。

広場の年表は、片づけられていた。
代わりに、小さな札が置かれている。

――今日
――ただの一日

旅人はその言葉を読み、少し考えた。

「特別じゃない日って、
意味が薄い気がしてしまう」

黒猫は立ち止まり、振り返らずに言った。

「特別じゃない日が、
世界を続けている」

パン屋の前では、昨日と同じ時間にシャッターが上がる。
子どもは同じ道を通って歩く。
誰かは、昨日の続きの仕事を始める。

誰も「新年だから」と言わない。
それでも、確かに始まっている。

旅人は胸の奥で、何かがほどけるのを感じた。

「一年の区切りって、
大きな意味を持たせすぎなくてもいいのかも」

黒猫は小さくうなずいた。

「振り返ったのは、
昨日を片づけるため。
今日を大きくするためじゃない」

川沿いの道を歩く。
水は昨日と同じ流れ方をしている。

旅人は足を止めた。

「じゃあ、今日の価値って？」

黒猫はようやく旅人の方を見た。

「今日を、生きること自体」

言葉は短かったが、
それ以上はいらなかった。

通りの端で、誰かが転びかけ、
誰かが手を差し伸べる。
礼も、記念日もない。

ただ、一日が進む。

旅人は静かに息を吸った。

「特別じゃない一日を、
ちゃんと過ごすのって、難しいね」

「だから、価値がある」

黒猫の声は、朝の光に溶けた。

国の出口は、いつの間にか消えていた。
振り返りの国は、
終わる場所ではなかった。

旅人と黒猫は、
続いていく世界の中へ歩いていく。

祝われない朝。
何も変わらない一日。

それでも確かに、
今日を生きている。

新年は、
静かに、もう始まっていた。`},
  {num:243,title:"『振り返りの国』",body:`旅人と黒猫がたどり着いた国では、道の途中に鏡が立っていた。
けれど、それは顔を映すためのものではない。
歩いてきた方向を、静かに映す鏡だった。

「前じゃなくて、後ろを見るんだね」

旅人が言うと、黒猫は答えた。

「ここでは、
一年の終わりにだけ、振り返る」

国の空気は澄んでいて、音が少ない。
人々は立ち止まり、
急がず、無理に言葉を探さない。

広場には、大きな年表が描かれていた。
数字はあるが、評価はない。

――できたこと
――できなかったこと
――続いたこと
――終わったこと

どれにも印はつけられていない。
思い出すだけで、十分なのだ。

旅人は自分の一年を思い浮かべた。
進んだ日も、止まった日もある。
誇れる瞬間も、目を伏せたい時間もあった。

「……あまり、うまくなかった気がする」

黒猫は静かに言う。

「それでも、
ここまで来た」

道の脇に、小さな箱が並んでいる。
中には紙が一枚ずつ入っていた。

――よくやったこと
――手放したこと
――まだ分からないこと

旅人は一つ選び、
「まだ分からないこと」と書いた。

箱は閉じられ、
誰にも読まれないまま、棚に戻される。

「共有しなくていいんだね」

「振り返りは、
次に進むための私事だ」

黒猫の声は、夜に溶けていく。

夕暮れ、国中の灯りが一斉に落とされた。
暗闇の中で、人々は空を見上げる。

何も起きない。
花火も、号令もない。

ただ、一区切りが、そこにある。

旅人は深く息を吸った。

「終わった、って感じがする」

「終わったから、
始められる」

黒猫はそう言って、歩き出した。

国の出口に、静かな言葉が刻まれている。

――振り返った者から、
――新しい年が始まる

旅人と黒猫は、
来た道を一度だけ見返した。

そこには、失敗も、迷いも、
確かに生きた時間があった。

そして二人は、
何も背負い直さず、
新たな始まりへと進んでいった。

年は静かに終わり、
静かに、始まろうとしていた。`},
  {num:242,title:"『ひとりでも悪くない国』",body:`旅人と黒猫がたどり着いた国では、時計の針が少しゆっくり進んでいた。
正確ではない。
けれど、焦らせもしない。

通りには、一人用の場所が自然に混ざっている。
一人分の机。
一人分の影。
一人で歩く速度に合わせた道。

旅人は周囲を見渡した。

「誰かといなくても、
浮かない国だね」

黒猫は小さくうなずいた。

「ここでは、
ひとりは“不足”じゃない」

喫茶店の入口に、控えめな札が下がっている。

――お一人さま、歓迎
――長居しても、問題ありません

旅人は窓際の席に座った。
誰も急かさない。
話しかけない。

それなのに、居心地がいい。

「自分の時間を、
こんなふうに過ごしてもいいんだ」

黒猫は向かいの椅子に飛び乗り、言った。

「ここでは、
自分の時間は“守るもの”だ」

外を歩く人々も、急いでいない。
一人で考え事をしながら歩く人。
音楽を聴いて立ち止まる人。

誰も、理由を聞かれない。

旅人はふと思った。

「ひとりだと、
何も生み出していない気がする時がある」

黒猫は窓の外を見ながら答える。

「何も足さない時間は、
心を戻す時間だ」

夕方、空が橙色に染まる。
国のあちこちで、灯りが一つずつ点く。
一人に一つずつ。

旅人は静かに息を吐いた。

「……ひとりでも、
ちゃんと満ちるんだね」

「満ちるかどうかを、
比べなくていい」

黒猫はそう言って、尻尾を揺らした。

国の出口に、小さな言葉が刻まれている。

――ひとりでも、悪くない
――自分の時間は、居場所です

旅人と黒猫は、
並んで歩きながらも、
それぞれの沈黙を持っていた。

この国では、
誰かといなくても、
自分と一緒にいることが許されていた。

旅人はその感覚を、
大切に胸にしまった。

次に訪れる国でも、
ひとりの時間を、
手放さずにいられるように。`},
  {num:241,title:"『今日はここまでの国』",body:`旅人と黒猫がたどり着いた国では、夕方になると必ず鐘が鳴った。
高らかでも、急かす音でもない。
一日の終わりを知らせる、低くやさしい音だった。

「終業の合図みたいだね」

旅人が言うと、黒猫は首を横に振った。

「“終わっていい”という合図だ」

通りの人々は、鐘を聞くと自然に歩みを緩める。
仕事の途中でも、話の途中でも、誰も慌てない。

店の扉には札が下がる。

――今日はここまで
――続きは、明日でもいい

旅人は少し驚いた。

「切りが悪くても？」

「切りが悪い日は、
無理をすると壊れる」

黒猫は短くそう言った。

広場には、火の消えかけた灯りが並んでいる。
完全に明るくしないのは、
“まだ残っている疲れ”を否定しないためだという。

旅人はベンチに腰を下ろした。
思った以上に、足が重い。

「今日は、あまり進めなかった」

黒猫は隣に座る。

「進めなかった日も、
一日は終わる」

旅人は空を見上げた。
夕焼けは派手ではないが、
一日の出来事をすべて包み込む色をしている。

近くにいた人が、静かに言った。

「今日はここまで、でいいよね」

隣の人がうなずく。

「ここまで来たんだから」

誰も拍手しない。
誰も評価しない。

ただ、終わりを受け入れる。

旅人の胸に、少しだけ緩みが生まれた。

「何も達成してなくても？」

黒猫は即座に答えた。

「“無理しなかった”は達成だ」

旅人は目を閉じた。
今日一日を振り返る。

できなかったこと。
途中でやめたこと。
投げ出したように見えること。

それでも、ここに座っている。

「……今日はここまで、か」

「そう。
また歩ける日まで」

夜がゆっくりと国を包む。
誰も取り残されない速度で。

旅人と黒猫は、
立ち上がらないまま、
一日の終わりを迎えた。

進まなかったことも、
休んだことも、
この国では、ちゃんと一日分だった。

鐘の余韻が消えたあと、
旅人は静かに思った。

今日を終えていい場所があることは、
生きるのを、少し楽にする。`},
  {num:240,title:"『気づかれない親切の国』",body:`旅人と黒猫がたどり着いた国は、目立った建物も、名所もない場所だった。
道は整っているが、新しくはない。
人々は忙しそうでも、冷たくはなかった。

「……普通の国だね」

旅人がそう言うと、黒猫は否定も肯定もせずに歩き続けた。

道を進むうち、旅人は気づく。
雨が降りそうになると、自然と人が軒下に入れる位置に屋根が伸びている。
疲れた頃に、必ず腰掛けられる石がある。
喉が渇く前に、井戸が現れる。

どれも、主張しない。

「便利だけど……説明がないね」

黒猫は言った。

「この国では、
親切は“使われるもの”で、
見せるものじゃない」

旅人はある家の前で足を止めた。
扉の前に、さりげなく置かれた灯り。
夜遅く帰る誰かのためだろう。

「これ、誰が？」

「知らなくていい」

黒猫は静かだった。

旅人は少し戸惑った。

「でも、誰かがやってるって、
ちゃんと分からないと……」

黒猫は足を止め、旅人を見た。

「分からなくても、
君はここまで来られただろう」

その言葉に、旅人は胸を突かれた。

振り返ると、今まで歩いてきた道が浮かぶ。
転ばなかったのは、誰かが石をどかしていたから。
迷わなかったのは、目立たない印があったから。
歩き続けられたのは、休める場所があったから。

「……僕、一人で来たつもりだった」

黒猫はうなずいた。

「この国では、
誰も“支えている”と名乗らない。
だから、多くの人が支えていることに、
あとから気づく」

広場に出ると、記念碑があった。
だが、名前は刻まれていない。

――今日も、誰かが無事に過ごせた
――それで十分

旅人はしばらく、動けなかった。

「僕が歩いてきた道、
たくさんの親切の上だったんだね」

「そう。
一人分に見えて、
実際は多人数分だ」

旅人は深く息を吸った。
胸の奥が、静かに温かくなる。

「ありがとうって、
誰に言えばいいんだろう」

黒猫は前を向いたまま言った。

「次に歩く人のために、
少し整えればいい」

旅人はうなずいた。
足元の小石を、道の端に寄せる。

それだけでいい。
誰にも見られなくてもいい。

親切の国は、
声を上げないやさしさでできている。

そして旅人は知った。
自分が今ここに立っていること自体が、
多くの人の親切の、静かな結晶なのだと。

旅人と黒猫は、
そのやさしさを背負わず、
次の道へと進んでいった。`},
  {num:239,title:"『失敗を置いていく国』",body:`旅人と黒猫がたどり着いた国では、道がやけに広かった。
すれ違う人は多いのに、誰も重そうな荷を持っていない。

道の脇を見ると、不思議な光景があった。
古びた鞄、割れた道具、破れた紙切れ。
どれも大切に並べられているのに、持ち主はいない。

旅人は足を止めた。

「……忘れ物の国？」

黒猫は首を振る。

「置いていったものだ」

近くにいた人が、肩から袋を下ろしていた。
中には、失敗した計画書、うまくいかなかった作品、
誰にも渡せなかった言葉が詰まっている。

その人は道端に袋を置き、軽く一礼した。

「ここまで、一緒に来てくれてありがとう」

そして、そのまま歩き出した。

旅人は思わず声を上げた。

「え、いいの？
あれ、大事なものだったんじゃ……」

黒猫は静かに答えた。

「大事だった。
だから、置いていく」

道端の札に、こう書かれている。

――失敗は、持ち主を離れても存在できる
――背負い続けなくていい
――必要になったら、また拾える

旅人は胸がざわついた。

「他の国では、
失敗は責任として背負い続けるものだ」

黒猫は道の先を見つめる。

「ここでは、
失敗は“荷物”だ。
学びが終わったら、下ろしていい」

旅人は、自分の背中を意識した。
見えないはずなのに、重さだけがある。

「……置いていっても、僕は僕のまま？」

「置いていくのは、出来事であって、
君じゃない」

黒猫の言葉は、地面に静かに置かれたようだった。

旅人は深く息を吸い、
そっと肩から何かを下ろす仕草をした。

形はない。
けれど確かに、何かが道端に置かれた気がした。

誰も咎めない。
誰も振り返らない。

ただ、足音が軽くなる。

旅人は一歩踏み出した。

「……戻ってきてもいい？」

「もちろん。
失敗は逃げない」

黒猫はそう言って、先を歩いた。

夕暮れの道には、
無数の“もう背負わなくていい過去”が並んでいる。

それらは、風雨にさらされながら、
誰かの人生を縛ることなく、
静かにそこに在り続ける。

旅人と黒猫は、
振り返らずに進んだ。

失敗を置いたままでも、
道は、ちゃんと続いていた。`},
  {num:238,title:"『遅れて咲く花の国』",body:`旅人と黒猫がたどり着いた国には、花畑があった。
けれど、その多くはまだ咲いていない。

芽は出ている。
葉も伸びている。
ただ、花だけが見当たらない。

旅人は不安そうにあたりを見渡した。

「……ここ、季節を間違えたのかな」

黒猫は地面にしゃがみ込み、土に触れた。

「違う。この国では、咲くのが遅い」

花畑の中には、立て札がいくつもあった。

――まだ
――今じゃない
――比べないこと
――根を育てています

旅人は眉をひそめた。

「他の国なら、
もう結果が出てないと、見向きもされない頃だ」

黒猫は土から手を離し、静かに言った。

「この国では、
早く咲かなかったものを“失敗”とは呼ばない」

二人の前に、一輪だけ花が咲いていた。
色は淡く、派手さもない。
けれど、不思議と目を引く花だった。

そばにいた人が、誇らしげでもなく、恥ずかしそうでもなく言う。

「ようやく、ですね」

「遅かったですね」とは、誰も言わない。

旅人はその花をじっと見つめた。

「……静かな咲き方だ」

黒猫はうなずいた。

「根が深い花は、音を立てない」

旅人は足元を見る。
土は固く、簡単には掘れそうにない。

「この下に、そんなに根が？」

「見えない時間が長いほど、
地下は複雑になる」

黒猫はそう言って、少しだけ土を掘った。
細く、絡み合い、遠くまで伸びる根がのぞく。

旅人の胸が、きゅっと締まった。

「……咲けなかった時間も、
何もしていなかったわけじゃないんだ」

「むしろ、その時間があったから、
ここまで立っていられる」

風が吹き、まだ咲いていない花たちの葉が揺れた。
焦りも、諦めもない揺れ方だった。

旅人は、思い出していた。
早く形にならなかった自分のこと。
芽が出ているのかも分からなかった時間。

「遅れて咲くのは、怖いよ」

黒猫は旅人を見て、はっきりと言った。

「だから、この国がある」

夕暮れ、花畑の奥で、また一輪、花が開いた。
祝福の声は上がらない。
記録も残らない。

ただ、根を張り続けてきたことを、
花自身が知っている。

旅人は深く息を吸った。

「咲くまで、立ち去らなくてもいいんだね」

「咲く前でも、ここにいていい」

黒猫はそう答えた。

花は遅れて咲く。
けれど、その分、風に倒れない。

旅人と黒猫は、
まだ咲いていない花たちの間を歩きながら、
見えない根の確かさを、足裏で感じていた。


『遅れて咲く花の国』別ver


旅人と黒猫がたどり着いた国には、花畑があった。
けれど、色とりどりに咲き誇っているわけではない。

芽は出ている。
茎も伸びている。
それでも、多くの花はまだ蕾のままだった。

旅人は足を止め、首をかしげる。

「季節を間違えたのかな」

黒猫は地面に前足をつけ、土を確かめるように言った。

「この国の花は、咲くのが遅い」

畑のそばに立て札があり、こう書かれていた。

――焦らせないこと
――比べないこと
――咲く時期は、それぞれ

旅人は蕾をひとつ、そっと覗き込んだ。

「ちゃんと育ってるのに、
まだ咲いてないだけなんだね」

「まだ、という言葉も使わない」

黒猫はそう言って、地面を見た。

旅人は目を凝らした。
土の表面は静かだが、
その下には太く、複雑に絡み合う根が広がっている。

「……根が、深い」

「早く咲かなかった分、
見えないところで時間を使った」

二人の近くで、花守りが水をやっていた。
花守りは言い訳も説明もしない。
ただ、蕾のそばに立ち、待っている。

旅人は小さな声で言った。

「他の国だと、
早く咲かない花は、育て方を疑われる」

黒猫はゆっくり首を振った。

「ここでは、
遅れは欠陥じゃない」

旅人は、自分の過去を思い出した。
周りより遅かったこと。
追いつけなかった時間。

「咲けなかった間、
無駄だった気がしてた」

黒猫は蕾の前で立ち止まる。

「根を張る時間は、
花には見えないだけだ」

風が吹き、畑が静かに揺れた。
その中で、一輪の花が、
音もなく、ゆっくりと開いた。

派手ではない。
けれど、芯のある色だった。

旅人は息をのむ。

「……遅れて、咲いた」

「深く、立っている」

黒猫はそう言った。

夕方、畑を離れる頃、
まだ多くの花は蕾のままだった。

けれど旅人は、もう不安を感じなかった。

「咲くかどうかじゃなくて、
どう立っているか、なんだね」

「そして、
立っていること自体が、もう十分だ」

二人は花畑を背に歩き出す。
土の下で張られた無数の根が、
静かに、確かに、この国を支えていた。`},
  {num:237,title:"『わからないまま一緒にいる国』",body:`旅人と黒猫がたどり着いた国では、人々が少し離れた距離で並んでいた。
肩は触れない。
けれど、背中を向けてもいない。

広場では二人一組で座っている人が多い。
会話をしている組もあれば、
ただ同じ方向を見ているだけの組もあった。

旅人は不思議そうに周囲を見渡した。

「静かな国だね。
喧嘩も、説得も、あまり起きていないみたいだ」

黒猫は歩きながら答えた。

「この国では、“わかり合うこと”が義務じゃない」

旅人は足を止めた。

「わからなくても、いいの？」

「いい。
わからないまま、一緒にいる」

二人は石段に腰を下ろした。
隣に座っている人たちも、互いに視線を合わせない。
それでも、そこに緊張はなかった。

旅人は声を落として言った。

「他の国では、
理解できないと、距離を取るか、
どちらかが正しくなるまで話し合う」

黒猫は小さくうなずいた。

「ここでは、理解しようとして傷つくこともあると知っている」

少し離れた場所で、二人の人が言い合いをしていた。
けれど声は荒くない。

「正直、あなたの気持ちはわからない」
「そう。私も、あなたの考えは理解できない」

二人はそこで言葉を止めた。
それ以上、踏み込まない。

しばらくして、二人は同じ方向へ歩き出した。
距離は変わらないまま。

旅人はその背中を見つめた。

「離れないんだね」

「離れない選択が、ここでは尊重される」

黒猫の声は静かだった。

旅人は、自分の胸に浮かんだ過去の顔を思い出した。
わかり合えなかった人。
説明できなかった自分。

「わかってもらえないなら、
一緒にいちゃいけないと思ってた」

黒猫は旅人を見ずに言った。

「それは、多くの国で教えられる。
でもここでは、
“わからない”は失敗じゃない」

夕暮れ、橋の上で人々が並んで立っていた。
誰も手をつながない。
誰も背を向けない。

ただ、同じ景色を見る。

旅人は、胸の奥が少しほどけるのを感じた。

「理解されなくても、ここにいていいんだ」

「理解できなくても、そばにいていい」

黒猫はそう言って、歩みを止めた。

二人も橋の上に立つ。
沈む夕日を、同じ方向から眺める。

言葉は交わさない。
納得も、結論もない。

それでも、二人は離れなかった。

わからないまま。
一緒にいるという選択だけが、
この国では、十分だった。`},
  {num:236,title:"『贈り物の国』",body:`旅人と黒猫がたどり着いたのは、色とりどりの包み紙が風に揺れる、賑やかな国だった。
通りには笑い声があふれ、店先には小さな箱から大きな袋まで、無数の贈り物が並んでいる。

「この国は、なんだか浮き足立ってるね」

旅人がそう言うと、黒猫は周囲を見回して答えた。

「ここは贈り物の国。この時期になると、親しい人に贈り物をする習わしがあるらしい」

人々は楽しそうだったが、その輪の外で立ち止まっている青年が一人いた。
手には包みを持っているが、顔は晴れない。

「こんにちは。どうかしましたか？」

声をかけると、青年は少し恥ずかしそうに視線を落とした。

「プレゼントを……もらったんです。でも、お返しに何を渡したらいいのか、思いつかなくて」

黒猫が首をかしげる。

「相手は、どんなものが好きなの？」

「……どんなもの、でしょう。考えたこと、なかったです」

「今まではどうしてたの？」

「自分の好きなものを渡してました。きっと、それで喜ぶだろうって」

旅人は静かに言った。

「自分が好きなものと、相手が好きなものは、同じとは限らないよ」

青年ははっとしたように目を見開き、それから肩を落とした。

「……そうですよね。どうして、今まで考えてこなかったんだろう」

「じゃあ、まずは知るところからだね」

黒猫の言葉に、青年は何度も頷いた。

「ありがとうございます！」

そう言って、青年は人混みの中へ走っていった。

しばらく歩くと、今度は店先で立ち尽くしている女性がいた。
小さな包みを手に、ため息をついている。

「やっぱり……やめておこうかしら」

「何かお困りですか？」

女性は少し安心したように話し始めた。

「贈り物をしたい相手がいるんです。でも、迷惑じゃないかって考えてしまって」

「その人とは、親しいの？」

黒猫が聞く。

「まだ、そこまでじゃないの。でも、いつもお世話になっていて」

「それで、迷ってるんですね」

旅人は少し考えてから言った。

「僕だったら、感謝されるのは嬉しいな」

女性は一瞬驚いた顔をして、それから微笑んだ。

「……そうですよね。やっぱり、贈ることにします」

彼女は軽やかな足取りで店を出ていった。

「贈り物で悩む形も、人それぞれだね」

黒猫の言葉に、旅人は頷く。

「相手に喜んでほしいって思うから、悩むんだろうね」

通りを歩きながら、旅人はふと思いついたように言った。

「黒猫は、欲しいものある？」

「どうしたの、急に」

黒猫は少し驚いたように尻尾を揺らす。

「僕は特に欲しいものはないよ」

「せっかく贈り物がたくさんあるからさ」

黒猫は少し考えてから、楽しそうに歩き出した。

「じゃあ、見てみようかな」

しばらくして、離れた場所から声がした。

「旅人、これがいい」

「星のアクセサリー？」

黒猫は小さく頷いた。

「昔の人は北極星を目印に旅をしたんだって。
だから、旅人が道に迷わないように」

旅人は少し照れたように笑った。

「黒猫がいれば、暗闇でも迷わない気がするよ」

旅人は微笑んで、その星を黒猫の首元へと丁寧につけてあげた。

二人は並んで包みを受け取り、国の外れへ歩いていった。

「ねえ、旅人。さっきの二人、ちゃんと贈り物を買えたかな？」

「きっとね」

黒猫は空を見上げて言った。

「プレゼントって、物そのものより、
贈った人の気持ちを想像することが大事なんだね」

旅人は静かに答えた。

「贈る人と、受け取る人。
その気持ちがすれ違わずに届くこと――
それが、いちばんの贈り物なのかもしれない」

星の瞬く空の下、二人はまた次の国へと歩き出した。`},
  {num:235,title:"『小さく喜ぶ国』",body:`旅人と黒猫がたどり着いた国では、鐘の音が鳴っていた。
けれど、それは勝利や祝祭を告げるような大きな音ではなく、
風にまぎれるほど小さな音だった。

「今日は、何かのお祭りなのかな」

旅人が尋ねると、黒猫は首を振った。

「お祭りというほどじゃない。
この国では、毎日起きる」

通りを歩くと、人々が小さな紙を手にして集まっていた。
紙には短い言葉が書かれている。

――朝、起きられた
――頭痛が少し軽かった
――今日は誰にも怒られなかった
――昨日より、息がしやすい

それを読んだ誰かが、そっと鐘を鳴らす。
音は一度きり。
大きく鳴らす人はいない。

旅人は立ち止まった。

「こんなことで、喜ぶんだ」

黒猫は否定も肯定もせずに答えた。

「こんなことだから、喜ぶ」

広場の隅では、年配の人が小さなテーブルを出していた。
そこには派手な料理も、贈り物もない。
温かい飲み物と、静かな場所だけが用意されている。

「今日は少し楽だった」

そう言って座る人に、周りの人は拍手をしない。
代わりに、うなずく。

「それは、よかったね」

その一言で終わりだ。

旅人は胸の奥が、わずかに揺れた。

「他の国だと、もっと頑張った話じゃないと
喜んでもらえないことが多い」

黒猫は足を止め、旅人の方を見た。

「ここでは、“楽だった”は成果だ。
苦しくなかった時間は、ちゃんと価値がある」

旅人は自分の一日を思い返した。
特別なことはしていない。
何かを達成したわけでもない。

けれど。

「……今日は、少し楽だったかもしれない」

その言葉が、思いがけず口からこぼれた。

近くにいた人が、静かに鐘を鳴らした。
澄んだ音が、一度だけ空に広がる。

誰も見ていないのに、
誰も比べていないのに、
確かに祝われた気がした。

旅人は少し照れながら、黒猫を見る。

「大きな成功じゃないのに」

「だからいい」

黒猫はそう言って、尻尾を軽く揺らした。

「この国では、
“生き延びた一日”より、
“少し楽だった一日”を祝う」

夕方になると、鐘の音は自然と止んだ。
人々はそれぞれの場所へ戻っていく。

旅人と黒猫も歩き出した。

旅人の足取りは、ほんのわずかに軽かった。

「この国、好きだな」

黒猫は前を向いたまま答えた。

「小さく喜べる国は、
長く生きるのに向いている」

鐘の余韻が消えた後も、
旅人の胸の中では、
静かな喜びが、まだ鳴っていた。`},
  {num:234,title:"『立ち止まってもいい国』",body:`旅人と黒猫がたどり着いたのは、道の途中にある国だった。
門はなく、境界もあいまいで、地図には「通過点」とだけ記されている。

けれど不思議なことに、この国では多くの人が歩いていなかった。

道の真ん中に腰を下ろして空を見ている人。
靴を脱いで、ただ地面の感触を確かめている人。
進もうとして、途中で立ち止まり、そのまま動かなくなった人もいる。

誰も急かさない。
誰も理由を聞かない。

旅人は歩調を落とし、あたりを見回した。

「ここでは、みんな止まっているんだね」

黒猫は少しだけ目を細めて言った。

「この国では、進まないことが咎められない。
立ち止まること自体が、生きている証とされているから」

旅人は首をかしげた。

「でも、止まっていたら……遅れるでしょう？
他の国では、置いていかれる」

黒猫は道端に咲いている、小さな草を見つめた。

「ここでは、遅れるという概念が薄い。
呼吸が乱れたら、足を止める。
心が重くなったら、座る。
それだけのことだ」

しばらく歩くと、石碑のようなものが立っていた。
そこには短い言葉が刻まれている。

――歩けない日は、歩かなくていい
――立ち止まる日は、生きている日だ

旅人はその前で足を止めた。

「……優しい言葉だね」

「優しいというより、正確なんだ」

黒猫は静かに続ける。

「人は、動いている時だけ生きているわけじゃない。
迷っている時、休んでいる時、何もできない時も、
ちゃんと“在る”」

旅人は、その言葉を胸の中で転がした。

ふと、道の脇に座り込んでいる人と目が合った。
その人は申し訳なさそうでも、恥ずかしそうでもなく、
ただ、穏やかに笑った。

「今日はここまでなんです」

それだけ言って、また空を見上げる。

旅人は何も言えず、軽く会釈を返した。

「……進まなくても、否定されない顔をしている」

「否定され続けなかった人の顔だ」

黒猫の声は低く、やわらかかった。

旅人は、自分の足元を見た。
少し疲れていることに、ようやく気づいた。

「少し、休んでもいいかな」

「いい」

黒猫は即座に答えた。

二人は道の端に腰を下ろした。
風が吹き、時間がほどけていく。

旅人は何も成し遂げていない自分を思い、
それでも、この瞬間に呼吸していることを確かめた。

黒猫は言った。

「立ち止まれるということは、
まだ終わっていないということだ」

旅人は小さく息を吐いた。

「……じゃあ、ここにいる間は」

「生きていれば、それでいい」

空はゆっくりと色を変え、
誰も急がせない夕方が、この国を包んでいた。

旅人と黒猫は、立ち止まったまま、
確かに、生きていた。`},
  {num:233,title:"『苦手と呼ばれる国』",body:`旅人と黒猫がたどり着いた国は、案内板の文字が妙に大きかった。

「ここは、苦手と呼ばれる国」

国の人々は穏やかで、礼儀正しかった。
ただ、誰に話しかけても、同じ言葉が返ってくる。

「それは苦手でして」
「昔から苦手なんです」
「みんな、そう言いますよ」

市場では、同じ形の食べ物が並んでいた。
辛くも甘くもなく、匂いも弱い。

「誰でも食べられる味です」と店主は胸を張った。
だが、食べる人の表情はどこか遠い。

旅人が一口かじると、味はした。
けれど、心に残らなかった。

黒猫は鼻先を近づけ、そっと顔を背けた。

「これは…“安全”だね」
「美味しくはない？」
「美味しい、という言葉を使う人は、あまりいない国だ」

学校では「苦手克服の時間」があった。
子どもたちは順番に立ち上がり、言う。

「音が苦手です」
「文字が苦手です」
「人が苦手です」

先生はうなずき、黒板に丸をつける。
理由は聞かれない。
どんなふうに苦手かも、問われない。

旅人は一人の子に、そっと尋ねた。

「どんな音が、苦手なんだい？」

その子は言葉に詰まり、しばらく考えたあと、首を振った。

「わかりません。
ただ、苦手なんです」

役所には「苦手登録簿」があった。
分厚い帳簿に、項目だけが並んでいる。

□ 音
□ 光
□ 味
□ 会話
□ 変化

丸をつければ、それで終わりだった。

黒猫は帳簿を見つめながら言った。

「まとめると、安心する人もいる。
でも、まとめられた瞬間に、消えるものもある」

「消えるもの？」
「その人だけの“感じ方”だよ」

旅人は、国のはずれで一人の女性に出会った。
彼女は食事を前に、手を止めていた。

「苦手ですか？」と旅人が聞くと、
彼女は小さくうなずいた。

旅人は言い直した。

「どんなふうに、つらい？」

長い沈黙のあと、彼女はぽつりと答えた。

「…刺さるんです」
「味が、舌に残って、逃げ場がなくなる」

その言葉を口にした瞬間、
彼女の顔が少しだけ緩んだ。

「今まで、そんなふうに言ったことがなかった」

黒猫は静かに言った。

「それは“苦手”じゃなくて、
君の感じ方だね」

旅人と黒猫が国を去るころ、
案内板の文字は変わっていた。

「ここは、まだ名前の足りない国」

すぐには何も変わらない。
味も、学校も、帳簿も、ほとんど同じままだ。

それでも、誰かが
「どんなふうに？」
と尋ね始めた。

苦手という言葉の奥に、
それぞれ違う痛みと重さがあることを、
少しずつ思い出しながら。

この国は、
人が弱い国ではない。
言葉が足りなかっただけの国だった。

旅人と黒猫は、
次の国へ向かって歩き出した。

まだ、名前のない感じ方を抱えた人たちが、
きっと他にもいるから。`},
  {num:232,title:"『気にしすぎる国』",body:`その国の空には、無数の紙風船が浮かんでいた。
赤、青、白、くすんだ灰色。
どれも軽そうなのに、空全体が重たく見える。

旅人が空を見上げると、
紙風船のひもが人々の胸や手首につながっているのが見えた。

黒猫が言う。

「ここはね、
　心配が形になって離れない国だ。」

◆

通りを歩く女性は、
頭上に十個以上の紙風船を浮かべていた。

「迷惑じゃなかったかな」
「変に思われてないかな」
「さっきの言い方、まずかったかも」

風船に書かれた文字が、
風に揺れてかすかに読める。

女性は何度も振り返り、
誰かの表情を確かめる。

旅人は胸の奥が締めつけられた。
その心配は、
他人のために生まれたようで、
実は自分を縛っていた。

黒猫が言う。

「気にする人ほど、
　自分を後回しにする。」

◆

広場では、
紙風船が絡まり合い、
空がほとんど見えなくなっていた。

ある青年は、
風船の重さに耐えきれず、
立ち止まっていた。

「切ればいいのに。」

旅人がそう言うと、
青年は首を横に振る。

「もし、本当に必要な心配だったら？」

その言葉の奥には、
“気にしなかった自分が悪い”
という恐れが潜んでいた。

黒猫は青年の足元に座る。

「心配ってね、
　役に立つふりをする感情なんだ。」

◆

夕方、強い風が吹いた。
紙風船たちは一斉に引っ張り合い、
人々は前に進めなくなる。

旅人は思わず叫んだ。

「このままだと、
　どこにも行けない！」

黒猫は静かに言った。

「だからこの国では、
　ひとつだけ手放す習慣がある。」

◆

黒猫は、
自分につながっていない紙風船を
ひとつ指差した。

「これはね、
　“気にしなくてもよかった心配”。」

青年は震える手で、
一本のひもを切った。

紙風船は、
音もなく空へ消えていく。

何も起きなかった。

責められもしない。
壊れもしない。

青年は、
はっとしたように息を吸った。

◆

それを見て、
女性も一本切った。
次に、また一本。

空が、少しずつ広がっていく。

旅人は気づいた。
心配は、全部なくさなくていい。
全部持ち続けなくてもいいだけだ。

◆

夜になると、
残った紙風船は、
やさしい灯りのように光っていた。

大切な人を思う気持ち。
失敗を避けたい願い。
自分を守ろうとする本能。

それらは、
完全に手放すものではなかった。

黒猫が言う。

「気にしすぎる人はね、
　世界を大切にしすぎる人なんだ。」

◆

国を出るとき、
旅人は空を見上げた。

紙風船はまだ浮いている。
でも、
空が見える余白ができていた。

黒猫が静かに言う。

「心配を減らすってね、

旅人はうなずく。

「軽くなること、だね。」

旅人は歩き出した。
空を見上げられる速さで。`},
  {num:231,title:"『あなたの居場所の国』",body:`その国には、地図がなかった。
正確には、居場所だけが載っていない地図だった。

道、建物、川の名前は書かれている。
けれど「ここにいていい場所」だけが、空白のまま残されている。

旅人はその地図を手に、立ち尽くした。

黒猫が言う。

「ここではね、
　居場所は示されない。」

◆

最初に出会ったのは、
広場の端に腰を下ろす青年だった。

彼の周りには、
人が通る余地はあるのに、
誰も立ち止まらない。

「そこ、空いてますか？」

旅人が尋ねると、青年は困ったように笑った。

「空いてるけど、
　座っていいかは、わからない。」

居場所がないとは、
追い出されていることだけではない。
自分が許可を出せなくなることだと、
旅人は気づいた。

◆

路地裏では、
少女が壁にもたれて立っていた。

「家はあるのに、
　帰る場所がない。」

少女はそう言って、
足元を見つめる。

誰かの期待、
誰かの失望、
誰かの物語。

それらの中にいると、
自分が消えていくようだった。

黒猫が低く言う。

「居場所はね、
　誰かの役に立つ席じゃない。」

◆

夕暮れ、
旅人は小さな空き地に立った。

誰も呼んでいない場所。
誰も拒んでいない場所。

旅人は腰を下ろした。
何も起きない。
評価も、視線もない。

胸の奥で、
少しだけ呼吸が深くなる。

黒猫が隣に丸くなる。

「ここは、
　今の君がいても、減らない場所だ。」

◆

夜、焚き火の周りに、
少しずつ人が集まってきた。

何かを証明するためでも、
役割を果たすためでもない。

ただ、
座りたいから座る。

誰も「理由」を聞かなかった。

青年も、少女も、
静かに火を見つめている。

居場所は、
与えられるものではなく、
奪い合うものでもなかった。

自分が先に、
ここにいることを許すこと。

旅人はそう理解した。

黒猫が言う。

旅人は続きを待つ。
