黒猫は、
やわらかく答える。

「備えただけだよ」

少し先で、
傘を持たない男性が歩いている。

足取りは軽い。

でも、
何度か空を見上げる。

雲の動きを気にしている。

旅人はつぶやく。

「どっちも、
　気にしてるんだね」

黒猫はうなずく。

「選び方が違うだけ」

昼。

ぽつり、と一滴落ちる。

傘を持っていた人が、
すぐに開く。

音が、
小さく広がる。

持っていなかった人は、
少しだけ立ち止まる。

走るか、
このまま歩くか。

一瞬だけ迷う。

でも、
そのまま歩き出す。

旅人は言う。

「濡れちゃうね」

黒猫は、
静かに答える。

「そうだね」

「でも、
　軽いままだった時間もある」

夕方。

雨は止む。

どちらの人も、
それぞれの帰り道を歩いている。

傘を持っていた人は、
少し腕が疲れている。

持っていなかった人は、
少しだけ服が重い。

通りの端で、
ふたりが話している。

「持っていけばよかったかな」

「でも、
　邪魔じゃなかった？」

少し笑う。

どちらも、
間違いとは言わない。

旅人は、
そのやりとりを見て言う。

「正解はないんだね」

黒猫は、
やわらかく答える。

「どっちも、
　ちゃんと選んでるからね」

夜。

街には、
乾きかけの傘と、
少し湿った服がある。

どちらも、
その日の選択の跡。

旅人は、
窓の外を見ながらつぶやく。

「小さなことなのに、
　ずっと迷うね」

黒猫は、
静かに答える。

「小さいから、
　毎日ある」

しばらく沈黙が続く。

遠くで、
誰かがまた空を見る。

旅人は、
小さく言う。

「どっちを選んでも、
　何かは残るんだね」

黒猫は、
うなずく。

「残るものが違うだけ」

風が吹く。

雲が少し動く。

でも、
はっきりとは変わらない。

この国では、
選択ははっきりしない。

小さな迷いが、
何度も繰り返される。

それでも人は、
どちらかを持って、
外に出る。

旅人は目を閉じる。

今日の迷いが、
少しだけ体に残っている。

黒猫は、何も言わない。

ただ、
その迷い方を見ている。

それは、
決めきれない選択。

でも、
確かに自分で選んだ、

静かな一歩だった。`},
  {num:347,title:"『靴を選ぶ国』",body:`その国では、
外に出る前に、
必ず靴を選ぶ。

服より先に。
行き先より先に。

旅人がその国に入った朝、
店にはたくさんの靴が並んでいた。

軽い靴。
重い靴。
少し硬いもの。
やわらかいもの。

見た目は似ているのに、
履き心地が違う。

店主が言う。

「今日は、どんな一日にしますか」

旅人は、
少し戸惑う。

「まだ、決めてないけど」

黒猫は、
静かに答える。

「ここではね」

「履いたもので、
　決まることもある」

通りに出ると、
人々はそれぞれ違う歩き方をしている。

足音が違う。
速さが違う。

同じ道でも、
進み方が少しずつ変わる。

ひとりの女性が、
ゆっくり歩いている。

足元は、
やわらかい靴。

ときどき立ち止まって、
空を見ている。

旅人は言う。

「のんびりしてるね」

黒猫は、
足元を見る。

「その靴は、
　急げない」

少し先で、
ひとりの男性が早足で進む。

硬い靴。

音が、
はっきり響く。

まっすぐ前だけを見る。

旅人はつぶやく。

「急いでるのかな」

黒猫は、
やわらかく言う。

「そう歩きやすいだけかもね」

広場では、
ひとりの少年が座っている。

靴を履いていない。

足元に、
いくつかの靴が並んでいる。

どれも、
まだ選ばれていない。

旅人は聞く。

「どうしたの？」

少年は、
少し考えてから答える。

「今日は、
　どんなふうに歩くか、決められない」

しばらく沈黙。

どの靴も、
間違いではない。

でも、
履かないと、
歩き出せない。

黒猫は、
静かに言う。

「歩き方はね」

「選んでから、
　わかることもある」

夕方。

旅人は、
ひとつの靴を履いて歩いている。

最初は、
少し違和感がある。

でも、
少しずつ慣れてくる。

歩き方も、
少し変わる。

通りの端で、
さっきの女性とすれ違う。

少しだけ、
同じ速さになる。

ほんの一瞬。

旅人は、
その感覚を確かめる。

「少しだけ、
　世界が変わった気がする」

黒猫は、
静かにうなずく。

「見え方も、
　変わるからね」

夜。

靴を脱ぐ人たちがいる。

その日の歩き方が、
静かに終わる。

でも、
完全には消えない。

少しだけ、
体に残る。

旅人は、
窓の外を見ながら言う。

「選び方が、大事なんだね」

黒猫は、
やわらかく首を振る。

「選んだあとも、
　大事だよ」

しばらく沈黙が続く。

遠くで、
誰かの足音がする。

ゆっくりと、
一定の速さで。

旅人は、
小さく言う。

「うまく歩けなかった日も、
　あるよね」

黒猫は、
静かに答える。

「合わない靴もある」

「でも、
　それも残る」

風が吹く。

脱いだ靴の中に、
その日の温度が残っている。

この国では、
生き方は抽象じゃない。

履いて、
歩いて、
少しずつ形になる。

どんな靴も、
ただの選択じゃない。

その日の、
歩き方そのものになる。

旅人は目を閉じる。

今日の歩き方が、
まだ足に残っている。

黒猫は、何も言わない。

ただ、
その重さと軽さを見ている。

それは、
言葉になる前の選択。

でも、
確かに生きた、

一日のかたちだった。`},
  {num:346,title:"『何気ない会話の国』",body:`その国では、
大きな話はあまりされない。

代わりに、
何気ない会話が続いている。

旅人がその国に入ったとき、
通りでふたりが話していた。

「今日は、少しあたたかいね」

「うん、昨日よりは」

それだけで、
会話は終わる。

旅人は言う。

「中身がないね」

黒猫は、
静かに答える。

「形があるよ」

店の中では、
店主が客に言う。

「いつものにします？」

客は、
少しだけ笑ってうなずく。

「うん、それで」

それ以上は、
何も言わない。

旅人はつぶやく。

「何も伝えてない気がする」

黒猫は、
やわらかく言う。

「すでに知ってることを、
　確かめてる」

広場では、
人々がそれぞれ話している。

「さっき、風強かったね」
「そうそう、帽子飛びそうだった」

小さな出来事。

でも、
そこに少しだけ笑いがある。

旅人は言う。

「もっと大事な話をすればいいのに」

黒猫は、
静かに首を振る。

「いきなりは、
　難しいからね」

通りの端で、
ひとりの女性が立っている。

誰かに声をかける。

「最近、どう？」

短い言葉。

相手は、
少しだけ考える。

「まあ、ぼちぼち」

それだけのやりとり。

でも、
少しだけ距離が近づく。

旅人は言う。

「何も話してないのに、
　変わった気がする」

黒猫は、
うなずく。

「入り口だからね」

夕方。

空の色が、
ゆっくり変わる。

はっきりしないまま、
少しずつ深くなる。

ベンチで、
ふたりが座っている。

「今日は疲れた」

ぽつりと、ひとりが言う。

少しの沈黙。

もうひとりが答える。

「そっか」

それだけ。

でも、
その一言のあと、
肩の力が少し抜ける。

旅人は、
その様子を見てつぶやく。

「それでいいんだね」

黒猫は、
静かに言う。

「深い話は、
　浅いところからしか入れない」

夜。

街には、
たくさんの会話がある。

どれも短い。
どれも軽い。

でも、
途切れていない。

旅人は、
窓の外を見ながら言う。

「意味のある会話って、
　もっと特別なものだと思ってた」

黒猫は、
やわらかく答える。

「意味は、
　あとから深くなることもある」

しばらく沈黙が続く。

遠くで、
誰かが言う。

「またね」

その言葉が、
次につながる。

旅人は、
小さく言う。

「何気ないって、
　何もないことじゃないんだね」

黒猫は、
うなずく。

「削られてないだけだよ」

風が吹く。

言葉が、
軽いまま残る。

この国では、
会話は大きくならない。

でも、
途切れない。

小さな言葉が、
少しずつ積み重なる。

気づかないうちに、
形を作る。

旅人は目を閉じる。

さっきの「ぼちぼち」が、
なぜか残っている。

黒猫は、何も言わない。

ただ、
その小さな積み重なりを見ている。

それは、
目立たない対話。

でも、
関係をつないでいく、

静かな入り口だった。`},
  {num:345,title:"『楽しみ方が一つしかない国』",body:`その国では、
「勝つこと」だけが、
楽しいとされている。

速く走ること。
高く跳ぶこと。
誰かより上にいること。

それが、
楽しさの証だった。

旅人がその国に入ったとき、
広場では競争が行われていた。

人々は走る。

順位がつく。
歓声が上がる。

一番になった人だけが、
「楽しかった」と言う。

旅人は言う。

「負けた人は、楽しくなかったのかな」

黒猫は、
静かに答える。

「そう決められている」

通りの端で、
ひとりの少年が座っている。

競争には参加していない。

ただ、
風に揺れる旗を見ている。

旅人は声をかける。

「やらないの？」

少年は、
少し考えてから答える。

「うまくできないから」

少しの沈黙。

風が吹く。

旗が揺れる。

少年の目が、
それを追う。

旅人は言う。

「それ、見てるの好き？」

少年は、
少し驚いてからうなずく。

「うん」

黒猫は、
静かに言う。

「それも、楽しさだよ」

でも、
その言葉は広場には届かない。

競争は続いている。

勝った人だけが、
中心に立つ。

店の中では、
人々が結果の話をしている。

「今日は勝てた」
「次はもっと上に行く」

それ以外の話は、
あまりされない。

旅人はつぶやく。

「他の楽しみ方は、ないのかな」

黒猫は、
やわらかく答える。

「見えなくなってるだけだよ」

夕方。

広場の端で、
ふたりが並んで座っている。

何もしていない。

ただ、
同じ方向を見ている。

ときどき、
小さく笑う。

理由は、
はっきりしない。

旅人は言う。

「何が楽しいんだろう」

黒猫は、
静かに答える。

「同じ時間にいることかもね」

その近くで、
ひとりの女性が歩いている。

足取りはゆっくり。

周りを見ながら、
ときどき立ち止まる。

花に触れる。

空を見る。

誰にも競っていない。

旅人は、
その様子を見てつぶやく。

「楽しんでるように見える」

黒猫はうなずく。

「でも、
　ここではそう呼ばれない」

夜。

街には、
勝った人の話が残る。

順位が、
そのまま価値になる。

旅人は、
窓の外を見ながら言う。

「楽しさって、
　ひとつじゃないよね」

黒猫は、
静かに答える。

「ひとつにすると、
　測れるからね」

しばらく沈黙が続く。

遠くで、
風の音がする。

誰も、
それを話題にはしない。

旅人は、
小さく言う。

「でも、
　あの音、いいと思った」

黒猫は、
やわらかくうなずく。

「それが、見方だよ」

風が、
もう一度通り抜ける。

旗が揺れる。

さっきの少年が、
またそれを見ている。

この国では、
楽しさはひとつに決められている。

勝つこと。
上に行くこと。

それでも、
こぼれているものがある。

名前をつけられていないだけで、
確かにあるもの。

旅人は目を閉じる。

勝っていない時間の中にも、
何かがあった気がした。

黒猫は、静かに言う。

「楽しさはね」

「できることじゃなくて、
　見ている場所にある」

それは、
測れないままの感覚。

でも、
誰の中にもある、

静かな見方だった。`},
  {num:344,title:"『誰かの一言で変わる国』",body:`その国では、
たった一言で、
人の一日が変わる。

大きな出来事ではない。

ただの、
短い言葉。

旅人がその国に入った朝、
通りで誰かが言った。

「似合ってるね」

それだけの言葉。

言われた人は、
少し驚いてから、
自分の服を見る。

さっきまで気にしていた襟元を、
そっと整える。

歩き方が、
少しだけ変わる。

旅人は言う。

「そんなに変わるものかな」

黒猫は、
静かに答える。

「言葉は、
　置かれる場所で重くなる」

少し進むと、
別の声が聞こえる。

「気にしすぎだよ」

軽く言ったつもりの声。

でも、
受け取った人は少し黙る。

何も言わない。

ただ、
視線が下がる。

旅人は、
その様子を見てつぶやく。

「同じくらい短いのに、
　違うね」

黒猫はうなずく。

「触れる場所が違う」

広場では、
人々がそれぞれ過ごしている。

誰かが、
ぽつりと言う。

「ありがとう」

特別な場面ではない。

でも、
その言葉を受け取った人は、
少しだけ背筋を伸ばす。

何かが、
確かに届いている。

旅人は言う。

「何が違うんだろう」

黒猫は、
やわらかく答える。

「言葉じゃなくて、
　置かれたところだよ」

通りの端で、
ひとりの女性が立ち止まる。

誰かに言われたらしい。

「大丈夫？」

その一言。

女性は、
少しだけ息を吐く。

「……大丈夫じゃないかも」

初めて、
そう言う。

旅人は言う。

「変わったね」

黒猫は、
静かにうなずく。

「許されたからね」

昼。

店の中で、
ひとりの男性が席を立つ。

帰り際、
店主が言う。

「また来てください」

男性は、
少し迷ってからうなずく。

さっきまで、
来るつもりはなかったのに。

旅人は、
その背中を見て言う。

「未来も変わるんだね」

黒猫は、
小さく答える。

「一言で、
　向きが変わることもある」

夕方。

空の色が、
ゆっくり変わる。

はっきりした境目はない。

それでも、
確かに移っていく。

通りで、
ひとりの青年が立っている。

何かを迷っている。

そこへ、
誰かが言う。

「それでいいと思うよ」

短い言葉。

でも、
青年は少し考えて、
うなずく。

歩き出す。

旅人は言う。

「背中を押されたのかな」

黒猫は、
やわらかく答える。

「少しだけね」

「押しすぎないくらいが、
　ちょうどいい」

夜。

街には、
たくさんの言葉が残っている。

言われた言葉。
言えなかった言葉。

どちらも、
どこかに影を落としている。

旅人は、
窓の外を見ながらつぶやく。

「何気ない一言でも、
　変わるんだね」

黒猫は、
静かに答える。

「何気ないから、
　入るんだよ」

しばらく沈黙が続く。

遠くで、
誰かが小さく言う。

「大丈夫」

その言葉が、
誰かの中で少しだけ広がる。

旅人は、
小さく言う。

「じゃあ、
　言葉って怖いね」

黒猫は、
やわらかく首を振る。

「怖いだけじゃない」

「残るんだよ」

風が吹く。

言葉が、
目には見えないまま、
どこかに置かれていく。

この国では、
一言が小さくない。

短くても、
軽くても、

それが、
誰かの中で形を変える。

それでも人は、
言葉を交わす。

慎重に、
ときどき無意識に。

旅人は目を閉じる。

さっき聞いた言葉が、
まだ少し残っている気がした。

黒猫は、何も言わない。

ただ、
その残り方を見ている。

それは、
すぐには消えない変化。

静かに続いていく、

小さなきっかけだった。`},
  {num:343,title:"『本当が一つじゃない国』",body:`その国では、「本当のこと」は一つではなかった。

同じ出来事でも、人によって語る内容が少しずつ違っていた。
いや、少しどころではないこともあった。

ある人は「優しかった」と言い、
別の人は「冷たかった」と言う。
どちらも、嘘ではなかった。

旅人は最初、それを奇妙に思った。

「どちらかが、間違っているんじゃないのか」

そう言うと、黒猫は静かに首を振った。

「この国では、“感じたこと”が、そのまま本当になる」

旅人はしばらく考えてから、また問いかけた。

「じゃあ、本当のことを確かめる方法はないのか」

黒猫は少しだけ目を細めた。

「確かめる必要が、ないのかもしれない」

その言葉は、どこか冷たくもあり、やさしくもあった。

この国には、「記録係」と呼ばれる人たちがいた。

彼らは出来事を記録する役目を持っていたが、
一つの出来事に対して、必ず複数の記録を残した。

「誰の視点か」を明記して。

旅人はその記録をいくつか読んでみた。

同じ日の、同じ時間、同じ場所のはずなのに、
まるで違う物語が並んでいた。

ある記録には「救われた日」と書かれていて、
別の記録には「何も変わらなかった日」と書かれている。

さらに別の記録には、
「失ったことに気づいた日」と書かれていた。

旅人は混乱した。

「……どれが、本当なんだ」

黒猫は答えなかった。

代わりに、旅人をある場所へ連れていった。

そこは、小さな広場だった。

人々が輪になって座り、同じ出来事について話していた。

一人が話す。
すると、別の人が首をかしげる。

「わたしは、そうは感じなかった」

誰かが少し困った顔をする。
けれど、否定はしない。

ただ、「違い」がそこに置かれる。

やがて、誰かが言う。

「どれも、本当だったのかもしれないね」

その言葉に、誰も反論しなかった。

旅人は、その光景を見ながらつぶやいた。

「それだと……まとまらないだろう」

黒猫は、静かに答えた。

「まとまらないことが、守っているものもある」

風が、ゆっくりと広場を通り抜けた。

誰かの言葉が、少しだけ揺れる。

「一つに決めてしまうと、
　こぼれてしまうものがあるから」

旅人は、自分の中を探るように目を閉じた。

これまで、自分が「正しい」と思ってきたこと。
「間違っている」と切り捨ててきたこと。

それらが、少しだけ、形を変える。

「……じゃあ」

旅人は目を開けて言った。

「自分の中の“本当”も、変わっていいのか」

黒猫は、すぐには答えなかった。

しばらくしてから、ぽつりと口を開いた。

「変わったのではなく、
　最初から、いくつもあったのかもしれない」

旅人は、その言葉を聞いて、少しだけ笑った。

うまく言えないが、
何かが、ほどけた気がした。

この国では、「一つに決めること」が重視されていなかった。

代わりに、「持ち続けること」が大切にされていた。

矛盾したままでも。
揺れたままでも。

それでもいいと、許されていた。

夕暮れの中で、旅人は最後にもう一度だけ尋ねた。

「それでも、人は迷わないのか」

黒猫は、遠くを見ながら答えた。

「迷うよ」

そして、少しだけ間を置いて続けた。

「でも、迷いながら持っている本当のほうが、
　誰かを傷つけにくいこともある」

空は、いくつもの色が混ざり合っていた。

どれが本当の色なのかは、もう分からなかった。

けれど、どれも、確かにそこにあった。`},
  {num:342,title:"『思い出に変わる途中の国』",body:`その国では、
出来事はすぐには思い出にならない。

少しのあいだ、
途中のまま残る。

旅人がその国に入ったとき、
通りの空気は、
どこか曖昧だった。

新しくも、
懐かしくもない。

まだ、
名前がついていない感じ。

広場で、
ひとりの女性が立っている。

さっき別れたばかりらしい。

手には、
何も持っていない。

でも、
まだ何かを持っているように見える。

旅人は聞く。

「もう終わったの？」

女性は、
少し考えてから答える。

「……まだ、途中」

黒猫は、
静かに言う。

「ここではね」

「すぐには、
　しまえない」

通りを歩くと、
笑っている人がいる。

でも、
笑い終わっていない。

声は止まっているのに、
空気だけが残っている。

少しだけ、
続いている。

旅人はつぶやく。

「終わったはずなのに、
　まだあるね」

黒猫は、
うなずく。

「形が変わる前だよ」

店の中では、
誰かが席を立つ。

カップは空。

でも、
その場に、
会話の温度が残っている。

椅子も、
少しだけそれを持っている。

旅人は言う。

「消えるまで、時間がかかるんだね」

黒猫は、
やわらかく答える。

「消えるんじゃない」

「変わるんだよ」

夕方。

空は、
はっきりしない色になる。

昼でも夜でもない。

そのあいだの時間。

通りの端で、
ひとりの青年が立っている。

何かを思い出しかけている。

でも、
まだ言葉にならない。

「……なんだったかな」

小さくつぶやく。

旅人は言う。

「もう思い出じゃないの？」

黒猫は、
静かに首を振る。

「まだ、
　今に近い」

しばらくして、
その青年は歩き出す。

少しだけ軽い。

何かが、
少しだけ形を変えたあと。

夜。

街には、
いくつもの“途中”がある。

終わった出来事。
過ぎた時間。

でも、
まだ完全には遠くない。

旅人は、
窓の外を見ながら言う。

「思い出って、
　すぐにはできないんだね」

黒猫は、
静かに答える。

「距離がいるからね」

しばらく沈黙が続く。

遠くで、
誰かが小さく笑う。

その音は、
まだ現在にある。

でも、
少しずつ遠ざかっていく。

旅人は、
小さく言う。

「このまま、どうなるんだろう」

黒猫は、
やわらかく答える。

「少しずつ、
　触れにくくなる」

「でも、
　なくならない」

風が吹く。

今日の出来事が、
少しだけ離れる。

この国では、
思い出は一瞬でできない。

今と過去のあいだで、
ゆっくり形を変える。

はっきりしないまま、
少しずつ遠くなる。

でも、
完全には消えない。

旅人は目を閉じる。

さっきの出来事が、
まだ近くにある。

でも、
少しだけやわらいでいる。

黒猫は、何も言わない。

ただ、
その変わり方を見ている。

それは、
まだ触れられる過去。

でも、
もう同じではない、

静かな途中だった。`},
  {num:341,title:"『気遣いがズレる国』",body:`その国では、
気遣いが、少しだけズレる。

やさしさはある。
でも、
届き方が少し違う。

旅人がその国に入ったとき、
通りで誰かが声をかけていた。

「寒くない？」

相手は、
少し汗をかいている。

「うん、大丈夫」

そう答える。

でも、
少しだけ困った顔をしている。

旅人は言う。

「心配してるのに、
　合ってないね」

黒猫は、
静かに答える。

「自分の基準で見てるからね」

店の中では、
店主が客に言う。

「静かな席にしますね」

客は、
少し考えてからうなずく。

でも、
しばらくして、
窓の外を見ている。

人通りの多い席のほうを、
何度か気にしている。

旅人はつぶやく。

「落ち着けると思ったのかな」

黒猫は、
やわらかく言う。

「“自分ならそうする”を
　渡してる」

広場では、
ひとりの女性が立っている。

少し疲れているように見える。

近くにいた人が、
声をかける。

「無理しないで」

女性は、
小さくうなずく。

でも、
そのあとすぐに動き出す。

少しだけ、
急ぐように。

旅人は言う。

「休ませたかったんじゃないの？」

黒猫は、
静かに首を振る。

「“無理してる人”に
　見えたんだろうね」

通りの端で、
ふたりが話している。

ひとりが言う。

「大丈夫？」

もうひとりは、
少しだけ笑う。

「うん」

でも、
その声は軽くない。

少しだけ、
遠い。

旅人は、
そのやりとりを見て言う。

「ちゃんと伝わってない感じがする」

黒猫は、
うなずく。

「気遣いはね」

「正しさより、
　距離で変わる」

夕方。

空の色が、
少しずつ混ざる。

はっきりしないまま、
変わっていく。

通りで、
ひとりの青年が立ち止まる。

誰かに言う。

「手伝おうか」

相手は、
少し間を置いて答える。

「……大丈夫」

そのあと、
ひとりで作業を続ける。

少しだけ、
ゆっくり。

旅人は言う。

「助けてほしかったのかな」

黒猫は、
少し考える。

「タイミングが、
　少しずれてたのかもね」

夜。

街には、
やさしい言葉がたくさんある。

でも、
ぴったり重なることは少ない。

少しだけ、
ずれている。

旅人は、
窓の外を見ながらつぶやく。

「やさしさがあるのに、
　うまくいかないんだね」

黒猫は、
静かに答える。

「あるから、
　ズレることもある」

しばらく沈黙が続く。

遠くで、
誰かが言う。

「気にしないで」

その言葉に、
少しだけ救われる人と、
少しだけ寂しくなる人がいる。

旅人は、
小さく言う。

「どうしたら、
　ちゃんと届くんだろう」

黒猫は、
やわらかく答える。

「決めつけないことだね」

「相手の中に、
　少し置いてみること」

風が吹く。

言葉が、
ほんの少しだけ揺れる。

この国では、
気遣いは消えない。

ただ、
ぴったり重ならないだけ。

それでも人は、
何度も差し出す。

少しずれながら、
それでも近づこうとする。

旅人は目を閉じる。

うまくいかなかった言葉も、
無駄ではない気がした。

黒猫は、何も言わない。

ただ、
そのズレの中で、
何かが触れる瞬間を見ている。

それは、
完全ではないやさしさ。

でも、
やめられないまま続いていく、

静かな試みだった。`},
  {num:340,title:"『天気で体調の変わる国』",body:`その国では、
天気によって、
体調が変わる。

気分ではなく、
体そのものが揺れる。

旅人がその国に入った朝、
空は少し重たかった。

雲が低い。

空気が、
わずかに押してくる。

通りを歩くと、
人々の足取りがゆっくりだ。

声も、
少し低い。

誰も急がない。

急げない、
というほうが近い。

旅人は言う。

「みんな、疲れてるのかな」

黒猫は、
静かに答える。

「空気に、押されてる」

ひとりの男性が、
壁に手をついている。

目を閉じている。

「今日は、重いな」

それだけ言う。

誰も、
理由を聞かない。

旅人は小さくつぶやく。

「何もしてないのに」

黒猫はうなずく。

「してなくても、
　変わる日がある」

昼。

少しだけ風が通る。

雲が動く。

それだけで、
人々の肩が少し下がる。

呼吸が、
深くなる。

通りの端で、
ひとりの女性が言う。

「さっきより、楽」

理由は説明しない。

でも、
確かに違う。

旅人は言う。

「こんなに変わるんだね」

黒猫は、
やわらかく答える。

「気圧ってね」

「見えないけど、
　ちゃんと触れてる」

広場では、
子どもが空を見上げている。

「今日は、軽い日だね」

そう言って、
少し高く跳ぶ。

いつもより、
少しだけ軽やかだ。

夕方。

また空が曇る。

さっきまで笑っていた人が、
少し静かになる。

言葉が減る。

理由は、
誰も探さない。

旅人は、
その様子を見て言う。

「気持ちが変わったみたい」

黒猫は、
静かに首を振る。

「体が先だよ」

通りで、
ひとりの青年が立ち止まる。

こめかみに手を当てる。

「今日は、考えにくい」

それだけ言って、
ゆっくり歩き出す。

無理はしない。

旅人は聞く。

「大丈夫かな」

黒猫は、
やわらかく答える。

「大丈夫じゃない日も、ある」

「でも、
　それでいい日もある」

夜。

雨が降り始める。

静かな音。

街全体が、
少し沈む。

でも、
それを責める人はいない。

旅人は、
窓の外を見ながらつぶやく。

「頑張れない日も、あるんだね」

黒猫は、
静かにうなずく。

「頑張らないほうが、
　いい日もある」

しばらく沈黙が続く。

雨の音が、
一定の速さで続く。

旅人は、
小さく言う。

「自分のせいじゃないって、
　思えるのはいいね」

黒猫は、
やわらかく答える。

「外に理由があると、
　少しだけやさしくなれる」

風が吹く。

気圧が、
また少し変わる。

見えないまま、
体に触れる。

この国では、
体調は自分だけのものではない。

空とつながって、
揺れている。

良い日も、
重い日もある。

どちらも、
完全には選べない。

それでも人は、
その日の体で、
その日の分だけ生きる。

旅人は目を閉じる。

今日の重さも、
どこかから来て、
どこかへ抜けていく気がした。

黒猫は、何も言わない。

ただ、
その揺れ方を見ている。

それは、
不安定なままの体。

でも、
世界とつながっている、

静かなリズムだった。`},
  {num:339,title:"『最短距離しか歩けない国』",body:`その国では、
人は目的地まで、
最短距離でしか歩けない。

遠回りは、できない。

寄り道も、できない。

旅人がその国に入ったとき、
道はすべて、
まっすぐだった。

曲がり道がない。

細い路地も、
途中で消えている。

人々は、
迷わず歩く。

目的地を決めると、
そのまま一直線に進む。

立ち止まらない。

振り返らない。

旅人は言う。

「迷わなくていいね」

黒猫は、
静かに答える。

「迷えないんだよ」

通りを歩くと、
ひとりの女性が
店の前を通り過ぎる。

少しだけ、
中を見る。

でも、
入らない。

そのまま、
通り過ぎる。

旅人は聞く。

「入りたかったんじゃないの？」

女性は、
小さく首を振る。

「ここは、
　目的地じゃないから」

黒猫は、
その扉を見る。

「寄り道は、
　選択に入らない」

広場では、
人々が交差している。

それぞれが、
違う目的地に向かっている。

ぶつかりそうで、
ぶつからない。

少しも、
ずれない。

旅人は、
その様子を見てつぶやく。

「きれいに進んでるね」

黒猫は、
少しだけ目を細める。

「こぼれないからね」

通りの端で、
ひとりの青年が立っている。

動かない。

目の前には、
いくつかの道。

どれも、
まっすぐ伸びている。

旅人は言う。

「どうしたの？」

青年は、
少し迷ってから答える。

「目的地が、
　決められない」

しばらく沈黙が続く。

どの道も、
間違いではない。

でも、
どれかひとつに決めないと、
歩けない。

黒猫は、
静かに言う。

「最短距離はね」

「出発点と目的地が、
　決まってるときにしか
　意味を持たない」

夕方。

人々は、
それぞれの場所にたどり着く。

早い。

無駄がない。

でも、
途中の景色を
話す人はいない。

旅人は、
空を見ながら言う。

「何も失ってないのかな」

黒猫は、
やわらかく答える。

「気づかないものは、
　失ったことにならないからね」

通りで、
ひとりの子どもが
歩いている。

足取りは、まっすぐ。

でも、
視線が揺れている。

横にある花。
遠くの音。

どれも、
少し気になっている。

一瞬だけ、
足が止まりかける。

でも、
すぐに戻る。

また、
まっすぐ進む。

旅人は、
その背中を見て言う。

「見てるのに、行けないんだね」

黒猫は、
うなずく。

「通り過ぎるしかない」

夜。

街は静かだ。

誰も、
道に迷っていない。

でも、
遠回りの話もない。

旅人は、
窓の外を見ながらつぶやく。

「もし、寄り道できたら、
　どうなるんだろう」

黒猫は、
少し考えてから言う。

「たぶん、
　少し遅くなる」

「でも、
　違うものを持って帰る」

しばらく沈黙が続く。

風が、
まっすぐ通り抜ける。

旅人は、
小さく言う。

「最短じゃない道にも、
　意味はあるのかな」

黒猫は、
やわらかく答える。

「意味は、
　あとからつくこともある」

この国では、
最短距離しか選べない。

無駄はない。

迷いもない。

それでも、
見ているだけのものがある。

触れられないまま、
通り過ぎていくものがある。

旅人は目を閉じる。

今日の道は、
確かに早かった。

でも、
少しだけ軽い気もした。

黒猫は、何も言わない。

ただ、
その通り過ぎ方を見ている。

それは、
正確な歩き方。

でも、
すべてを拾わないままの、

まっすぐな一日だった。`},
  {num:338,title:"『本当が一つじゃない国』",body:`その国では、
本当がひとつに決まらない。

どれかが正しくて、
どれかが間違い、
というふうにはならない。

旅人がその国に入ったとき、
通りでふたりが話していた。

「昨日は、楽しかったよね」

ひとりがそう言う。

もうひとりは、
少し考えてから答える。

「……うん、でも少し疲れた」

どちらも、
否定しない。

ただ、
少し違うまま並んでいる。

旅人は言う。

「どっちが本当なの？」

黒猫は、
静かに答える。

「どっちも、その人の本当」

店の中では、
ひとりの女性が日記を書いている。

「今日は、いい日だった」

書いて、
少し止まる。

その下に、
小さく付け足す。

「少しだけ、寂しかった」

ページはひとつ。

でも、
内容はひとつにまとまらない。

旅人は、
その手元を見てつぶやく。

「ひとつにしなくていいんだ」

黒猫は、
やわらかく言う。

「無理にまとめると、
　消えるものがあるからね」

広場では、
人々がそれぞれ話している。

同じ出来事を、
少しずつ違う形で語る。

楽しかった人。
疲れた人。
何も感じなかった人。

どれも、
間違いにはならない。

通りの端で、
ひとりの青年が立っている。

誰かに言う。

「大丈夫」

少し間を置いて、
続ける。

「……大丈夫じゃないけど」

そのまま、
どちらも取り消さない。

旅人は言う。

「矛盾してるね」

黒猫は、
静かに首を振る。

「並んでるだけだよ」

夕方。

空は、
ひとつの色に決まらない。

青と橙が、
境目を持たずに混ざっている。

どこからがどちらか、
言い切れない。

旅人は、
その空を見ながら言う。

「どっちかに決めたほうが、
　楽な気がする」

黒猫は、
やわらかく答える。

「楽だけど、
　狭くなる」

通りで、
ひとりの女性が立ち止まる。

誰かとの会話を思い出している。

「嬉しかった」

小さく言う。

少ししてから、
続ける。

「でも、
　少し苦しかった」

そのまま、
どちらも抱えたまま歩き出す。

旅人は、
その背中を見てつぶやく。

「混ざったまま、生きてるんだね」

黒猫は、
うなずく。

「分けきれないものの中でね」

夜。

街には、
いくつもの“本当”がある。

ぶつからない。

消し合わない。

ただ、
少しずつ重なっている。

旅人は、
窓の外を見ながら言う。

「ひとつの自分に、
　ならなくていいのかな」

黒猫は、
静かに答える。

「ならなくていいよ」

「ひとつにすると、
　こぼれるから」

しばらく沈黙が続く。

遠くで、
誰かが言葉を選ぶ。

ひとつに決めずに、
少しだけ残す。

旅人は、
小さく言う。

「それでも、
　どれかを選ばなきゃいけないときは？」

黒猫は、
やわらかく答える。

「そのときは、
　ひとつを使うだけ」

「他が消えるわけじゃない」

風が吹く。

いくつもの気持ちが、
同じ体の中で揺れる。

この国では、
本当はひとつじゃない。

まとまらないまま、
そのまま存在している。

それでも人は、
その中から言葉を選び、
誰かと話す。

少しだけ削って、
少しだけ残して。

旅人は目を閉じる。

言わなかった本当も、
まだ自分の中にある気がした。

黒猫は、何も言わない。

ただ、
その曖昧なままの形を見ている。

それは、
揺れたままの自己。

でも、
消えずに重なり続ける、

静かな本当だった。`},
  {num:337,title:"『文化で意味が変わる国』",body:`その国では、
同じ言葉でも、
場所によって意味が変わる。

間違いではない。

ただ、
少しずつ違う。

旅人がその国に入ったとき、
通りで誰かが言った。

「大丈夫だよ」

声はやわらかい。

でも、
相手は少し距離をとる。

旅人は首をかしげる。

「安心させたんじゃないの？」

黒猫は、
静かに言う。

「ここでは、
　“これ以上は踏み込まない”
　って意味にもなる」

少し歩くと、
別の場所で同じ言葉が聞こえる。

「大丈夫だよ」

今度は、
相手の肩に手が置かれる。

距離が近い。

さっきとは、
同じ言葉なのに違う。

旅人は言う。

「どっちが本当なの？」

黒猫は、
やわらかく答える。

「どっちも、その場所の本当」

店の中では、
店主が客に言う。

「また来てください」

笑顔で、
丁寧に。

客も、
うなずく。

でも、
外に出たあと、
振り返らない。

旅人はつぶやく。

「来てほしいんじゃないの？」

黒猫は、
少しだけ目を細める。

「ここでは、
　“今日をきれいに終わらせる言葉”だね」

広場では、
人々がそれぞれ話している。

「いいね」
「すごいね」
「大丈夫」

どれも同じように聞こえる。

でも、
少しずつ温度が違う。

通りの端で、
ひとりの青年が誰かに言う。

「いいよ」

短い言葉。

でも、
声は少し硬い。

相手は、
それ以上何も言わない。

旅人は聞く。

「許したの？」

黒猫は、
静かに首を振る。

「ここでは、
　“これ以上続けない”
　って意味かもしれない」

夕方。

空の色が、
ゆっくり混ざる。

ひとつに決まらない。

どこからが青で、
どこまでが橙か、
はっきりしない。

旅人は、
その空を見ながら言う。

「意味って、
　決まってるものだと思ってた」

黒猫は、
やわらかく答える。

「言葉だけじゃ、
　決まらないよ」

「使う人と、
　場所で変わる」

通りで、
さっきの「大丈夫だよ」が、
また聞こえる。

今度は、
小さく、短く。

それでも、
相手は少し安心した顔をする。

旅人はつぶやく。

「同じ言葉でも、
　届くものが違うね」

黒猫はうなずく。

「意味はね、
　運ばれるものじゃなくて、
　そこで作られるものだから」

夜。

街には、
いくつもの言葉がある。

同じ音が、
違う意味で使われる。

重なって、
少しずつずれている。

旅人は、
窓の外を見ながら言う。

「ちゃんと伝わってるのかな」

黒猫は、
静かに答える。

「全部は、伝わらない」

「でも、
　少しは重なる」

しばらく沈黙が続く。

遠くで、
誰かが笑う。

その意味も、
ひとつではない。

旅人は、
小さく言う。

「じゃあ、
　どうやって話せばいいんだろう」

黒猫は、
やわらかく答える。

「言葉だけに、
　頼らないことだね」

風が吹く。

声の届かないところにも、
何かが伝わる。

この国では、
意味は固定されない。

文化の中で、
少しずつ形を変える。

それでも人は、
言葉を使う。

ずれることを知りながら、
それでも重なろうとする。

旅人は目を閉じる。

完全には伝わらなくても、
何かが届くこともある。

黒猫は、何も言わない。

ただ、
そのずれの中で、
わずかに重なる瞬間を見ている。

それは、
同じにならないままの理解。

でも、
途切れない対話だった。`},
  {num:336,title:"『本当の自分がわからない国』",body:`その国では、
人はみな、
いくつかの顔を持っている。

場面ごとに、
少しずつ違う。

どれも自然で、
どれも嘘ではない。

旅人がその国に入ったとき、
通りで話しているふたりを見た。

片方は、
やわらかく笑っている。

声も近い。

でも、
別の人が来た瞬間、

少しだけ距離が変わる。

言葉が整う。

同じ人なのに、
輪郭が違う。

旅人は言う。

「さっきと、別の人みたいだね」

黒猫は、
静かに答える。

「どっちも、その人だよ」

店の中では、
ひとりの男性が働いている。

丁寧に、
落ち着いた声で接客する。

背筋は伸びている。

けれど、
休憩に入った途端、

椅子に深く沈む。

目を閉じる。

何も言わない。

同じ体なのに、
重さが違う。

旅人は、
小さくつぶやく。

「どれが本当なんだろう」

黒猫は、
少し考えてから言う。

「分けてるから、
　わからなくなるんだ」

広場では、
人々がそれぞれの顔で話している。

明るい人。
静かな人。
きちんとした人。

でも、
よく見ると、

同じ人が、
別の場所では違う形をしている。

通りの端で、
ひとりの女性が立っている。

さっきは、
誰かに優しくしていた。

今は、
少しだけ表情が硬い。

旅人が声をかける。

「疲れてる？」

女性は、
少し迷ってから答える。

「……どれが私か、
　わからなくなるときがあるの」

旅人は、
その言葉を繰り返す。

「どれが自分か、わからない…」

黒猫は、
静かに言う。

「全部、自分だよ」

「でも、
　全部を同時には持てないだけ」

夕方。

空は、
ひとつの色に決まらないまま変わる。

青とも、橙とも言えない色。

どちらも混ざっている。

旅人は、
その空を見ながら言う。

「ひとつに決めないと、
　いけない気がしてた」

黒猫は、
やわらかく首を振る。

「決めると、
　こぼれるものがある」

通りで、
ひとりの青年が立ち止まる。

ポケットから、
小さな鏡を取り出す。

自分の顔を見る。

しばらく見つめる。

でも、
何も確かめられないまま、
鏡をしまう。

旅人は言う。

「確かめられないのは、
　不安だね」

黒猫は、
少し間を置いて答える。

「固定できないだけだよ」

夜。

街には、
いくつもの顔がある。

同じ人が、
少しずつ違う形でそこにいる。

どれも消えない。

どれも残る。

旅人は、
窓の外を見ながらつぶやく。

「本当の自分って、
　どこにあるんだろう」

黒猫は、
静かに答える。

「どこかにあるものじゃない」

「そのときの選び方の中にある」

しばらく沈黙が続く。

遠くで、
誰かが言葉を選ぶ。

ほんの少し、
迷いながら。

旅人は、
小さく言う。

「じゃあ、
　ずっと変わるのかな」

黒猫は、
やわらかくうなずく。

「変わるよ」

「でも、
　つながってる」

風が吹く。

いくつもの顔が、
少しだけ揺れる。

この国では、
本当の自分は固定されない。

探しても、
ひとつにはまとまらない。

それでも人は、
そのとき選んだ顔で、
誰かと向き合う。

少しずつ、
重なりながら。

旅人は目を閉じる。

どれかを選ぶたびに、
何かが残っていく気がした。

黒猫は、何も言わない。

ただ、
その揺れ方を見ている。

それは、
ひとつに決まらないままの自己。

でも、
消えないまま続いている、

静かな輪郭だった。`},
  {num:335,title:"『少しずつ色が戻る国』",body:`その国では、
色がゆっくり戻ってくる。

最初からあるわけではない。

一度、
ほとんど消えたあとで、
少しずつ戻る。

旅人がその国に入ったとき、
街は薄い灰色だった。

空も、建物も、
はっきりしない。

人の服も、
どれも似た色をしている。

旅人は言う。

「静かだね」

黒猫は、
まわりを見渡す。

「まだ、途中なんだよ」

通りを歩くと、
ひとりの女性が立っている。

手に持っている花は、
ほとんど色がない。

白にも見えない。

ただ、
少しだけ輪郭がある。

女性はそれを見つめている。

しばらくして、
小さく息を吐く。

そのとき、
花の先に、
ほんのわずかな色がにじむ。

旅人は、
目を細める。

「今、変わった？」

黒猫はうなずく。

「戻ったね、少し」

広場では、
子どもが地面に座っている。

石を並べている。

どれも灰色。

でも、
ひとつだけ、
少しだけ青い。

子どもはそれを手に取る。

何も言わない。

でも、
しばらく見つめている。

旅人は言う。

「どうして戻るんだろう」

黒猫は、
少し考える。

「きっかけは、
　いろいろだよ」

昼。

店の中で、
誰かが笑う。

大きな声ではない。

でも、
その音に合わせて、

壁の一部が、
ほんの少しだけあたたかい色になる。

すぐには広がらない。

でも、
消えない。

旅人は、
その場所を見つめる。

「一気には戻らないんだね」

黒猫は、
静かに言う。

「戻り方も、
　ゆっくりなんだよ」

通りの端で、
ひとりの男性が座っている。

何もしていない。

ただ、
空を見ている。

長い時間。

やがて、
小さくつぶやく。

「……まだ、見えるな」

その目の中に、
ほんの少しだけ色が映る。

外の世界は、
まだ灰色のままなのに。

旅人は言う。

「外じゃなくて、
　中から戻ることもあるんだね」

黒猫は、
やわらかくうなずく。

「順番は、決まってない」

夕方。

空が少しだけ、
色を持ち始める。

はっきりした夕焼けではない。

でも、
灰色の中に、
わずかなあたたかさが混ざる。

旅人は、
その空を見ながら言う。

「ちゃんと戻るのかな」

黒猫は、
少しだけ目を細める。

「全部は戻らないかもしれない」

「でも、
　戻るところは戻る」

夜。

街には、
ところどころに色がある。

ひとつの窓。
ひとつの服。
ひとつの灯り。

まだ、
まばらだ。

でも、
確かに増えている。

旅人は、
窓の外を見ながらつぶやく。

「前みたいには、
　ならないのかもね」

黒猫は、
静かに答える。

「前と同じじゃなくてもいい」

「今の色になるだけだよ」

しばらく沈黙が続く。

遠くで、
誰かが小さく笑う。

その音が、
またひとつ、色を残す。

この国では、
色は急には戻らない。

取り戻すものでも、
思い出すものでもない。

ただ、
少しずつ現れる。

消えたあとに、
また現れる。

同じではないまま。

それでも、
確かにそこにある。

旅人は目を閉じる。

さっき見た小さな色が、
まだ残っている気がした。

黒猫は、何も言わない。

ただ、
その戻り方を見ている。

それは、
はっきりした回復ではない。

でも、
消えきらなかった何かが、

静かに、
また色になっていく途中だった。`},
  {num:334,title:"『嘘が一つだけ許される国』",body:`その国では、
年に一度だけ、
嘘をついていい日がある。

それ以外の日は、
なるべく正直に生きる。

本当のことを、
きちんと話す。

だからその日だけ、
街の空気が少し変わる。

静かに、
やわらぐ。

旅人が通りを歩いていると、
ひとりの男性が
誰かに言っていた。

「大丈夫だよ」

声は、
やさしい。

でも、
その手は少し震えている。

相手は、
少しだけ安心した顔をする。

それ以上は、
聞かない。

旅人は小さく言う。

「本当じゃないよね」

黒猫は、
静かに答える。

「うん」

少し先で、
女性が電話をしている。

「もう平気」

短い言葉。

少し間を置いて、
「気にしないで」と続ける。

電話を切ったあと、
その場に立ち尽くす。

でも、
さっきより少しだけ、
姿勢が崩れていない。

旅人は、
戸惑う。

「どうして、
　わざわざ嘘をつくんだろう」

黒猫は、
やわらかく言う。

「そのほうが、
　持てることもあるから」

広場では、
人々がそれぞれに言葉を交わしている。

「大したことないよ」
「気にしてない」
「平気だから」

どれも、
少しだけ嘘。

でも、
どこかに向けられている。

通りの端で、
ひとりの少年が座っている。

膝に、擦り傷。

近くにいた人が、
声をかける。

「痛くない？」

少年は、
少しだけ考えてから言う。

「うん、痛くない」

声は、
少しだけ強い。

立ち上がる。

歩く。

足取りは、
まだぎこちない。

でも、
止まらない。

旅人は、
その様子を見てつぶやく。

「自分にも、
　言ってるみたいだね」

黒猫は、
うなずく。

「誰かに言うふりをして、
　自分に置いてるんだよ」

夕方。

空は、
やわらかい色に変わる。

はっきりしないまま、
少しだけ明るい。

通りで、
さっきの男性がまた立っている。

今度は、
誰もいない。

小さくつぶやく。

「大丈夫だよ」

今度は、
自分に向けて。

旅人は、
静かに言う。

「嘘って、
　隠すためのものだと思ってた」

黒猫は、
少しだけ目を細める。

「隠すこともある」

「でも、
　支えることもある」

夜。

街には、
やわらかい灯りがともる。

昼間に交わされた言葉が、
どこかに残っている。

消えてはいない。

でも、
強くもない。

旅人は、
窓の外を見ながら言う。

「明日になったら、
　また言えなくなるのかな」

黒猫は、
静かに答える。

「たぶんね」

「本当のことは、
　重いから」

しばらく沈黙が続く。

遠くで、
誰かが小さく言う。

「平気」

それは、
風に溶けていく。

旅人は、
小さくつぶやく。

「じゃあ、
　あの嘘は消えちゃうの？」

黒猫は、
やわらかく首を振る。

「言葉は消える」

「でも、
　置いたものは残る」

風が吹く。

昼に言われた「大丈夫」が、
どこかで、
まだ支えている。

この国では、
嘘は一度しか許されない。

でもその一度で、
人は少しだけ持ちこたえる。

本当のことを言えない日々の中で、
たった一度の嘘が、

折れそうな何かを、
静かに支えている。

旅人は目を閉じる。

その嘘は、
正しくはない。

でも、
必要だった気がする。

黒猫は、何も言わない。

ただ、
その小さな支え方を見ている。`},
  {num:333,title:"『自由と選択の国』",body:`その国では、
誰もが自由だった。

何を選んでもいい。
どこへ行ってもいい。

止めるものは、
何もない。

旅人が最初に見たのは、
立ち止まっている人たちだった。

広場の真ん中で、
何人もが動かない。

道は、いくつもある。

右にも、左にも、
細い道も、広い道も。

でも、
誰も選ばない。

旅人は言う。

「行けばいいのに」

近くにいた人は、
小さく首を振る。

「間違えたくない」

黒猫は、
その足元を見る。

「全部、選べるからね」

通りを歩くと、
店が並んでいる。

どの店にも、
同じように人が入れる。

値段も、
大きな違いはない。

でも、
扉の前で止まる人が多い。

入っては、
すぐに出る。

また別の店に入る。

そして、
また迷う。

旅人はつぶやく。

「決められないんだ」

黒猫は、
静かに言う。

「決める練習を、
　してこなかったからね」

広場の端で、
ひとりの女性が座っている。

手には、
いくつかの紙。

仕事の案内。
住む場所の候補。
誰かからの誘い。

どれも、
選べる。

女性は、
長く見つめている。

やがて、
小さく言う。

「どれも、
　間違いになりそう」

旅人は聞く。

「正しいのを選べばいいんじゃない？」

女性は、
少しだけ笑う。

「正しいかどうか、
　わからないから」

黒猫は、
やわらかく言う。

「自由はね」

「正解を、
　なくすことでもある」

夕方。

道を選んだ人もいる。

歩いている。

でも、
何度も振り返る。

別の道を見ている。

さっき通らなかった道。

そこに、
何かがあった気がする。

旅人は言う。

「進んでるのに、
　迷ってるね」

黒猫はうなずく。

「選んだあとも、
　選び続けるからね」

通りの端で、
ひとりの青年が立ち止まる。

しばらく考えて、
ひとつの道に入る。

そのまま、
振り返らない。

足取りは、
少しだけ重い。

でも、
止まらない。

旅人は、
その背中を見て言う。

「自信があるのかな」

黒猫は、
静かに首を振る。

「ないと思うよ」

「でも、
　止まるよりは進むことを選んだ」

夜。

街には、
いくつもの灯りがある。

どの灯りの下にも、
誰かの選択がある。

うまくいったものも、
そうでないものも、
混ざっている。

旅人は、
窓の外を見ながら言う。

「自由って、
　軽いものだと思ってた」

黒猫は、
少し間を置いて答える。

「軽いよ」

「でも、
　支えるものがないと、
　浮いてしまう」

しばらく沈黙が続く。

遠くで、
誰かが道を選ぶ。

小さな音がする。

旅人は、
小さく言う。

「どうすれば、
　うまく選べるんだろう」

黒猫は、
やわらかく答える。

「うまく、じゃなくていい」

「選んだあとで、
　少しずつ作るんだよ」

風が吹く。

選ばれなかった道にも、
同じように風が通る。

この国では、
自由はすでにある。

足りないのは、
選び方ではなく、

選んだあとを
引き受ける力かもしれない。

夜の中で、
人々はそれぞれの道を歩いている。

迷いながら、
ときどき立ち止まりながら、

それでも、
ひとつを選んだ足で進んでいる。

旅人は目を閉じる。

選ばなかったものも、
消えたわけではない。

ただ、
自分の外に残っている。

黒猫は、静かに言う。

「自由はね」

「持つものじゃなくて、
　慣れていくものだよ」`},
  {num:332,title:"『理由のない出来事の国』",body:`その国では、
出来事に理由がない。

原因があって、
結果がある、
という順番が、
あまり当てはまらない。

旅人がその国に入ったとき、
空は静かに晴れていた。

何も起きていないように見える。

でも、
通りの真ん中で、
ひとりの男性が立ち止まっていた。

手に持っていたカップを、
落とす。

割れる。

男性は、
しばらくそれを見ている。

「どうして、今？」

誰に向けるでもなく、
そう言う。

黒猫は、
その音の残りを聞く。

「理由は、ないね」

旅人は眉をひそめる。

「さっきまで、普通だったのに」

黒猫は、
静かに歩き出す。

「普通も、
　理由じゃないからね」

通りを進むと、
ひとりの女性が、
急に立ち止まる。

ポケットを探る。

何かを探している。

やがて、
小さく息を吐く。

「なくした」

何を、とは言わない。

でも、
確かに何かが消えている。

旅人は聞く。

「いつから？」

女性は、
少し考えてから答える。

「わからない」

広場では、
人々がいつも通りに過ごしている。

笑っている人もいる。
静かな人もいる。

その中で、
ひとりの少年が転ぶ。

誰にも押されていない。

つまずいたわけでもない。

ただ、
転ぶ。

少し驚いた顔で、
自分の手を見る。

旅人は言う。

「理由がないと、
　怖いね」

黒猫は、
小さくうなずく。

「つかめないからね」

夕方。

空の色が、
ゆっくり変わる。

はっきりした境目はない。

どこからが夕方で、
どこまでが昼だったのか、
わからない。

旅人は、
その空を見ながら言う。

「理由がないなら、
　意味もないのかな」

黒猫は、
少しだけ考える。

「意味は、
　あとからつくこともある」

通りの端で、
ひとりの女性が座っている。

さっき何かをなくした人だった。

手のひらを見つめている。

しばらくして、
小さく笑う。

「軽い」

それだけ言う。

何を失ったのか、
もう話さない。

旅人は、
その様子を見てつぶやく。

「悪いことばかりじゃないのかも」

黒猫は、
やわらかく答える。

「決まってないからね」

夜。

街には、
いくつもの出来事がある。

起きた理由は、
どこにも書かれていない。

探しても、
見つからない。

それでも、
人々は歩いている。

立ち止まりながら、
また進む。

旅人は、
窓の外を見ながら言う。

「納得できないこと、
　多いね」

黒猫は、
静かに答える。

「納得できないまま、
　置いておくしかないこともある」

しばらく沈黙が続く。

遠くで、
何かが落ちる音がする。

誰も、
振り返らない。

旅人は、
小さく言う。

「理由がないなら、
　どうやって生きればいいんだろう」

黒猫は、
少し間を置いて答える。

「理由がないまま、
　生きるんだよ」

風が吹く。

どこから来たのか、
わからない風。

でも、
確かに頬に触れる。

この国では、
出来事に説明はつかない。

整わないまま、
起きて、過ぎていく。

それでも人は、
その中で、
少しだけ意味を拾う。

全部じゃない。

ほんの一部だけ。

夜の中で、
理由のない出来事が、
静かに重なっていく。

つながらないまま、
それでも、
ひとつの一日になる。

旅人は目を閉じる。

理解できないままでも、
今日が終わっていく。

黒猫は、何も言わない。

ただ、
その不揃いなままの一日を、
受け取っている。`},
  {num:331,title:"『なんとなく良い日の国』",body:`その国では、
特別なことは、あまり起きない。

でも、
ときどき「なんとなく良い日」がある。

理由は、
はっきりしない。

旅人がその国に入った朝、
空は、
曇りとも晴れとも言えない色だった。

風も、
強くはない。

弱くもない。

ただ、
そこにある。

通りで、
ひとりの男性が立ち止まる。

ポケットから、
小さな紙を取り出す。

「今日は、
　なんとなくいい日かもな」

そう言って、
また歩き出す。

旅人は首をかしげる。

「何かあったのかな」

黒猫は、
静かに言う。

「たぶん、
　何もないよ」

店の前では、
扉がすっと開く。

重くもなく、
軽すぎもしない。

ちょうどいい力で、
開く。

中に入ると、
席がひとつ空いている。

頼んだものが、
少しだけちょうどいい温度で出てくる。

旅人は、
小さく言う。

「うまくいってる感じがする」

黒猫はうなずく。

「引っかからない日だね」

昼。

広場では、
人々がそれぞれ過ごしている。

笑っている人もいる。
静かな人もいる。

でも、
どちらも無理をしていない。

通りの端で、
ひとりの女性が空を見ている。

「いい天気、ってほどでもないけど」

少し考えてから、
続ける。

「悪くないね」

その言葉は、
どこにもぶつからず、
そのまま空に溶ける。

旅人は言う。

「すごく良い日じゃないのに、
　なんだかいいね」

黒猫は、
少しだけ目を細める。

「良すぎないからかもね」

夕方。

予定していたことが、
ひとつだけずれる。

店が閉まっている。

でも、
近くに別の店がある。

そこも、
悪くない。

旅人は、
少し笑う。

「まあ、いいか」

その言葉は、
どこにも無理がない。

黒猫は言う。

「この国ではね」

「うまくいかないことも、
　邪魔にならない」

夜。

街には、
やわらかい灯りがある。

特別にきれいでもない。
でも、
見ていられる光。

旅人は、
窓の外を見ながらつぶやく。

「何が良かったのか、
　説明できないな」

黒猫は、
静かに答える。

「説明できないから、
　残るんだよ」

しばらく沈黙が続く。

遠くで、
誰かが小さく笑う。

その音も、
強くはない。

でも、
消えない。

旅人は言う。

「こういう日って、
　いつもは気づかないのかもね」

黒猫は、
やわらかくうなずく。

「大きなことがないと、
　見えにくいからね」

風が吹く。

カーテンが、
少しだけ揺れる。

それだけで、
何かがちょうどいい場所に収まる。

この国では、
「なんとなく良い日」は、
特別に扱われない。

記録もされない。

理由も、
探されない。

それでも人は、
そういう日を、
少しだけ覚えている。

名前をつけないまま、
忘れきらない。

夜の中で、
いくつもの一日が静かに重なっている。

その中に、
はっきりしないまま、

確かに、
良かった日が混ざっている。

旅人は目を閉じる。

思い出そうとしなくても、
今日が少しだけ残る気がした。

黒猫は、何も言わない。

ただ、
その残り方を見ている。

それは、
救いと呼ぶには小さすぎる。

でも、
消えない程度には、
確かだった。`},
  {num:330,title:"『役割を降りられない国』",body:`その国では、
人はそれぞれ、
決められた役割を持っている。

役割は、
服のように与えられる。

脱ぐことは、
できない。

旅人が最初に見たのは、
笑い続ける人だった。

通りの真ん中で、
誰に対しても笑っている。

嬉しそうに、ではない。
ただ、
決められているように。

旅人は近づく。

「楽しいの？」

その人は、
少しだけ間を置いて言う。

「わからない」

それでも、
口元は笑ったままだった。

黒猫は、
その顔を見上げる。

「役割だね」

通りを歩くと、
泣き続ける人もいた。

涙は止まらない。

けれど、
声は出ていない。

静かなまま、
ずっと泣いている。

旅人は
戸惑う。

「悲しいの？」

その人は、
目を伏せたまま言う。

「そういうことになってる」

広場では、
怒り続ける人がいた。

誰かを責めているわけではない。

ただ、
怒っている。

声も、表情も、
ずっと同じまま。

旅人は言う。

「疲れないのかな」

黒猫は、
短く答える。

「疲れても、
　降りられない」

旅人は気づく。

誰も、
役割について話さない。

当たり前のように、
それを生きている。

夕方。

小さな店で、
ひとりの女性が座っていた。

「優しい人」という役割のようだった。

誰に対しても、
やわらかく接する。

声も、
仕草も、
丁寧だ。

旅人は、
少しだけ聞く。

「ずっと優しくするの、
　大変じゃない？」

女性は、
少しだけ笑う。

「大変なときもある」

少し間を置く。

「でも、
　やめると困る人もいるから」

その言葉は、
誰かのためのようで、
どこか遠かった。

黒猫は言う。

「役割はね」

「自分だけのものじゃない」

夜。

宿の窓から、
街を見下ろす。

笑う人。
泣く人。
怒る人。

それぞれが、
同じ形を保ったまま、
動いている。

少しも崩れない。

少しも変わらない。

旅人は、
静かにつぶやく。

「本当の気持ちは、
　どこにあるんだろう」

黒猫は、
しばらく黙ってから言う。

「中にあるよ」

「でも、
　外に出る場所がないだけ」

そのとき。

通りの端で、
ひとりの少年が立ち止まる。

「強い人」の役割を着ている。

背筋を伸ばし、
まっすぐ前を見る。

でも、
ほんの一瞬だけ、

肩が、
わずかに落ちた。

すぐに、戻る。

誰にも気づかれないほどの、
小さなゆらぎ。

旅人は、
それを見て言う。

「今、少しだけ…」

黒猫はうなずく。

「降りかけたね」

しばらく沈黙が続く。

夜の中で、
役割たちは揺れない。

それでも、
どこかで、ほんの少しだけ、

形がゆるむ瞬間がある。

旅人は小さく言う。

「降りられないなら、
　どうするんだろう」

黒猫は、
静かに答える。

「少しだけ、
　ずらすんだよ」

風が吹く。

笑っている人の目が、
ほんの一瞬だけ、休む。

泣いている人の手が、
少しだけ止まる。

怒っている人の声が、
わずかに途切れる。

それは、
誰にも見えないくらい小さい。

でも、
確かにそこにある。

この国では、
役割は脱げない。

でも、
完全に閉じてもいない。

夜の中で、
人々はそれぞれの役割をまといながら、

ほんの少しだけ、
自分の重さをずらしている。

それは、
降りることではない。

けれど、
消えていない証のようだった。`},
  {num:329,title:"『思い込みが現実になる国』",body:`その国では、
思い込みが、
少しだけ現実になる。

強く願えば叶う、
というほどではない。

ただ、
そう思った方向に、
世界がわずかに傾く。

旅人がそのことに気づいたのは、
小さな通りだった。

ひとりの男性が、
店の前で立ち止まっている。

「この店、入りづらいな」

その瞬間、
扉が少し重く見える。

中の灯りも、
わずかに暗く感じる。

旅人は首をかしげる。

さっき見たときは、
そんなふうではなかった。

黒猫は
静かに言う。

「思い込みが、
　世界の見え方を変える」

しばらくして、
別の人がその店の前に立つ。

「ここ、いい店なんだよね」

その人がそう言うと、
扉は軽く開き、

中の空気が、
やわらかく流れ出る。

旅人は
小さくつぶやく。

「同じ場所なのに」

黒猫はうなずく。

「見てる世界が、
　少し違うからね」

広場では、
ふたりが向かい合っている。

片方は、
少し不安そうに言う。

「嫌われてる気がする」

その言葉に合わせて、
相手の表情が
少しだけ硬く見える。

声の調子も、
少し遠く感じる。

でも、
もうひとりは言う。

「気のせいだよ」

その一言で、
空気がわずかにやわらぐ。

同じ表情が、
少し違って見える。

旅人は
その様子を見て言う。

「どっちが本当なの？」

黒猫は
少し間を置いて答える。

「どっちも、
　少しずつ本当」

夕方。

空の色が、
はっきりしないまま変わっていく。

旅人は、
静かに言う。

「思い込みって、
　間違いじゃないの？」

黒猫は
やわらかく答える。

「間違いもある」

「でも」

「それだけで
　できてるわけでもない」

通りの端で、
ひとりの女性が立ち止まる。

「大丈夫、うまくいく」

小さくつぶやく。

その言葉に合わせて、
足取りが
ほんの少し軽くなる。

道も、
少しだけ開けて見える。

夜。

街には、
いくつもの現実がある。

同じ場所にいても、
少しずつ違う世界を見ている。

重なっているけれど、
完全には重ならない。

旅人は
窓の外を見ながら言う。

「全部、思い込みなのかな」

黒猫は
静かに首を振る。

「全部じゃない」

「でも、
　何も影響しないわけでもない」

しばらくして、
旅人は小さくつぶやく。

「じゃあ、
　何を信じたらいいんだろう」

黒猫は
やわらかく答える。

「ずれてることを、
　知ったままでいい」

この国では、
思い込みは消えない。

正すことも、
完全にはできない。

ただ、
そのズレの中で、

人は少しずつ
現実と重なろうとしている。

夜の中で、
いくつもの見え方が、
静かに並んでいる。

どれも少し違って、
どれも完全ではない。

それでも人は、
その中からひとつを選び、

少し傾いた世界を、
まっすぐ歩こうとしていた。`},
  {num:328,title:"『温度で気持ちが変わる国』",body:`その国では、
気持ちは心ではなく、
温度で変わる。

寒いと、
人は少し閉じる。

あたたかいと、
人は少しひらく。

理由は、
あとからついてくる。

旅人がその国に入ったとき、
風はひんやりしていた。

指先が冷たくなる。

肩が、
少しだけ上がる。

自然と、
歩く速さが変わる。

通りで声をかけられる。

「道、わかる？」

旅人は、
少し間を置いて答える。

「……うん」

言葉は短く、
どこか固い。

黒猫は
その様子を見て言う。

「寒いとね」

「言葉も、
　少し閉じる」

昼。

陽が出て、
空気がやわらぐ。

手のひらに、
少しだけ熱が戻る。

肩の力が抜ける。

同じ通りで、
また声をかけられる。

「さっきの店、
　知ってる？」

旅人は、
今度はすぐに答える。

「知ってるよ、
　あっち」

指も、
自然に動く。

旅人は
少し驚く。

「さっきと、
　同じこと聞かれたのに」

黒猫は
静かに言う。

「体が先なんだよ」

広場では、
人々が思い思いに過ごしている。

日なたにいる人は、
少し距離が近い。

声もやわらかい。

日陰にいる人は、
少し静かだ。

言葉も少ない。

旅人は
その違いを見つめる。

「気持ちが変わったっていうより、
　変わっていく感じだね」

黒猫は
うなずく。

「考える前に、
　もう始まってる」

夕方。

風がまた冷たくなる。

指先が、
少しずつ冷える。

さっきまで笑っていた人が、
少し口数を減らす。

旅人は
小さくつぶやく。

「なんだか、
　戻っていくね」

黒猫は
やわらかく答える。

「戻るんじゃなくて、
　移ってる」

通りの端で、
ひとりの女性が立ち止まっている。

冷えた手を、
もう片方の手で包む。

少しだけ、
息を吐く。

そのあと、
誰かに声をかける。

「寒いね」

その一言で、
ふたりの距離が
少しだけ近くなる。

夜。

街は冷える。

でも、
窓の内側には
あたたかい灯りがある。

人は自然と、
その中に集まる。

旅人は
手をこすりながら言う。

「気持ちって、
　こんなに簡単に変わるんだね」

黒猫は
静かに答える。

「簡単に変わるんじゃない」

「動かされてるだけ」

しばらくして、
旅人は火のそばに座る。

指先が、
ゆっくりほどけていく。

それだけで、
少し安心する。

理由は、
特にない。

この国では、
気持ちは説明されない。

ただ、
体の中で起きて、

あとから言葉になる。

旅人は
目を閉じる。

冷たさも、
あたたかさも、

どちらも
自分の中に残っている。

夜の中で、
人々はそれぞれの温度で、

少しずつ近づいたり、
少しずつ離れたりしている。

そのすべてが、
考える前に始まって、

静かに、
気持ちになっていく。`},
  {num:327,title:"『関係を手放す国』",body:`その国では、
関係を手放すことができる。

壊すのではなく、
終わらせるのでもなく、

そっと、
置いていく。

旅人がそのことを知ったのは、
広場の端にある
小さな場所だった。

そこには、
何も書かれていない棚が並んでいる。

人々は、
そこに何かを置いていく。

手紙のようなもの。
写真のようなもの。
言葉にならない何か。

旅人は
近くにいた人に聞く。

「ここは、何？」

その人は
静かに答える。

「関係を、
　置いていく場所」

黒猫は
棚を見上げながら言う。

「この国ではね」

「無理に続けなくていい」

「でも、
　なかったことにも
　しない」

通りを歩くと、
ふたりで話していた人たちが、
静かに立ち止まる。

どちらも、
怒っていない。

泣いてもいない。

少しだけ、
間がある。

やがて、
ひとりが言う。

「ここまでにしよう」

もうひとりは、
小さくうなずく。

それだけで、
ふたりのあいだの線が、
ゆっくりとほどけていく。

消えるわけではない。

ただ、
結ばれていた形が
やわらかく解ける。

旅人は
その様子を見てつぶやく。

「こんなに静かに、
　終わることもあるんだね」

黒猫は
やわらかく答える。

「終わるというより、
　手放してるんだよ」

夕方。

棚の前で、
ひとりの女性が立っている。

手の中には、
古い手紙。

しばらく見つめて、
そっと棚に置く。

指が、少しだけ止まる。

でも、
戻さない。

旅人は
小さく聞く。

「それで、いいの？」

女性は
少し考えてから言う。

「いいかどうかは、
　わからない」

「でも、
　持ち続けるより
　軽い」

黒猫は
静かに言う。

「関係はね」

「続けるだけが
　正解じゃない」

「手放すことで、
　守られるものもある」

夜。

街には、
いつも通り灯りがある。

誰かは誰かと歩き、
誰かはひとりで歩く。

さっき別れたふたりも、
それぞれの道を進んでいる。

歩き方は、
少しだけ軽い。

旅人は
窓の外を見ながら言う。

「消えたわけじゃないんだね」

黒猫は
うなずく。

「形が変わっただけ」

しばらくして、
旅人は小さくつぶやく。

「手放すって、
　寂しいね」

黒猫は
やわらかく答える。

「寂しいよ」

「でもね」

「やさしい寂しさもある」

風が吹く。

どこかで、
またひとつ関係が
そっと置かれる。

この国では、
関係は
無理に引き止めない。

でも、
雑に捨てもしない。

ただ、
大事だった形のまま、

静かに
手のひらから離していく。

夜の中で、
いくつもの関係が、

消えずに、
残らずに、

ただ、
やわらかくほどけていく。

それは、
終わりというより、

少しだけ距離を変えた、
やさしい別れだった。`},
  {num:326,title:"『誰かの選択で変わる国』",body:`その国では、
誰かの選択が、
少しだけ世界を変える。

大きくは変わらない。

でも、
確かにどこかが
ずれる。

旅人がそのことに気づいたのは、
小さな通りだった。

ひとりの青年が、
道の前で立ち止まっている。

右に行くか、
左に行くか。

ほんの小さな分かれ道。

青年はしばらく迷い、
やがて右へ進む。

その瞬間、

遠くで
風の向きが
ほんの少し変わる。

旅人は足を止める。

「今、何か…変わった？」

黒猫は
静かにうなずく。

「選んだからね」

通りを進むと、
さっきとは少し違う景色がある。

店の並び。
人の流れ。

大きくは変わらない。

でも、
どこかが
ほんの少し違う。

旅人は言う。

「こんな小さなことで？」

黒猫は答える。

「小さいからだよ」

「気づかれないくらいの変化が、
　いちばん遠くまで届く」

広場では、
ひとりの女性が
手紙を持っている。

渡すか、
渡さないか。

しばらく迷って、

そのまま
ポケットにしまう。

その瞬間、
誰かの一日が、
少しだけ静かになる。

出会うはずだった言葉が、
届かないまま終わる。

旅人は
その様子を見てつぶやく。

「選ばなかったことも、
　影響するんだね」

黒猫は
やわらかく答える。

「むしろ、
　そっちのほうが長く残ることもある」

夕方。

街はいつも通りに見える。

でも、
どこかで少しだけ
流れが変わっている。

気づく人はいない。

それでも、
確かに変わっている。

旅人は
静かに言う。

「もし違う選択をしてたら、
　違う世界だったのかな」

黒猫は
少し考えてから答える。

「今の世界が、
　その答えだよ」

夜。

街の灯りが、
ぽつぽつとともる。

それぞれの灯りの下で、
誰かが何かを選んでいる。

言うか、言わないか。
進むか、止まるか。

旅人は
窓の外を見ながらつぶやく。

「全部つながってるんだね」

黒猫は
静かに言う。

「切り離せる選択なんて、
　ほとんどない」

しばらくして、
旅人は小さく言う。

「……じゃあ」

「後悔って、
　なくならないね」

黒猫は
やわらかく答える。

「なくならないよ」

「でもね」

「後悔も、
　ひとつの選択の続きなんだ」

風が吹く。

どこかで、
誰かが何かを決める。

それだけで、
世界は少しだけ動く。

この国では、
変化は静かだ。

叫ばない。
主張しない。

でも、
確かに広がっていく。

旅人は
目を閉じる。

これまでの選択が、
どこかに届いている気がする。

見えない場所で、
誰かの一日を
少しだけ変えているかもしれない。

夜の中で、
またひとつ、

誰かが
何かを選ぶ。

その小さな決断は、
気づかれないまま、

それでも確かに、
世界を少しだけ変えていた。`},
  {num:325,title:"『天気を選べない国』",body:`その国では、
天気を選べない。

晴れたい日に、
雨が降ることもある。

出かけたい日に、
風が強くなることもある。

誰にも、
決められない。

旅人がその国に入った日は、
朝から雨だった。

細く、
止みそうで止まない雨。

旅人は
少し空を見上げる。

「せっかく来たのに、雨か」

黒猫は
濡れた石畳を見ながら言う。

「ここでは、
　そういう日もある」

通りを歩くと、
人々は傘をさしている。

急いでいる人もいれば、
ゆっくり歩く人もいる。

でも、
空に文句を言う人は、
あまりいない。

旅人は聞く。

「みんな、
　嫌じゃないのかな」

黒猫は
少し考えてから答える。

「嫌な人もいるよ」

「でも」

「変えられないことに、
　長くとどまらない」

広場では、
子どもが水たまりを踏んでいる。

靴は濡れている。

でも、
笑っている。

その横で、
大人は少しだけ
肩をすくめている。

濡れるのは、
仕方がない。

旅人は
その様子を見て言う。

「諦めてるの？」

黒猫は
静かに首を振る。

「違うよ」

「受け取ってる」

昼を過ぎると、
雨は少し強くなる。

予定していたらしい店は、
今日は開いていない。

旅人は
少し困った顔をする。

「こういうの、
　ずれるね」

黒猫は
やわらかく言う。

「ここでは、
　予定のほうが
　天気に合わせる」

通りの端で、
ひとりの女性が
濡れた花を見ている。

旅人が聞く。

「大丈夫ですか？」

女性は
少し笑う。

「晴れてほしかったけどね」

少し間を置いて、続ける。

「でも、
　この雨で咲く花もあるの」

黒猫は
その花を見る。

「全部が
　思い通りにはならない」

「でも」

「思い通りじゃない中にも、
　何かは起きてる」

夕方。

雨はやっと、
弱くなる。

空は、
はっきりしないまま明るい。

晴れとも、
曇りとも言えない色。

旅人は
静かに言う。

「選べないって、
　不便だね」

黒猫は
少しだけ目を細める。

「選べないから、
　出会うものもある」

夜。

街には、
濡れた石の匂いが残っている。

水たまりに、
灯りが揺れる。

昼とは違う景色。

旅人は
窓の外を見ながらつぶやく。

「もし選べたら、
　ずっと晴れにするかも」

黒猫は
静かに答える。

「たぶん、
　途中で飽きるよ」

しばらく沈黙が続く。

雨の名残が、
屋根から落ちる。

ぽつ、
ぽつ、と。

旅人は
小さく言う。

「選べないって、
　悪いことだけじゃないのかもね」

黒猫は
うなずく。

「不条理ってね」

「全部が敵じゃない」

この国では、
天気は選べない。

でも人々は、
その日の空の中で
生き方を選んでいる。

夜の空は、
まだ完全には晴れていない。

それでも、
どこか少しだけ
軽くなっている。

旅人は
もう一度、空を見る。

それは
思い通りではないけれど、

確かに、
今日の空だった。`},
  {num:324,title:"『境界線が見える国』",body:`その国では、
人と人のあいだに、
うっすらと線が見える。

はっきりした線ではない。

光のようにも、
影のようにも見える、
曖昧な境界。

旅人は、
最初それに気づかなかった。

市場で、
店主が客に笑いかけている。

「いらっしゃい」

声はやわらかく、
距離も近い。

けれど、
別の客が近づくと、

ほんの少しだけ、
空気が変わる。

言葉は同じでも、
温度が違う。

旅人は
目を凝らす。

そこに、
細い線があった。

「……あれ、何？」

黒猫は
静かに答える。

「あれはね」

「境界線」

「内側にいる人と、
　外側にいる人を分ける線」

通りを歩くと、
あちこちに線が見える。

線の内側にいる人には、
声がやわらかくなる。

少し距離が縮まり、
言葉が増える。

けれど、
線の外にいる人には、

必要なことだけを話す。

それ以上は、
踏み込まない。

旅人は言う。

「なんだか、
　はっきりしすぎてるね」

黒猫は
少しだけ首をかしげる。

「見えるだけで、
　どこでもあるよ」

広場の端で、
ひとりの青年が
誰かと話している。

最初は、
少し距離がある。

線は、
二人のあいだにある。

けれど、
会話が続くうちに、

その線が、
ゆっくりと揺れる。

少しずつ、
近づく。

やがて、
ふっと消える。

青年の声が、
やわらかくなる。

旅人は
小さくつぶやく。

「線って、動くんだね」

黒猫は
うなずく。

「言葉や、空気でね」

「近づいたり、
　離れたりする」

夕方。

同じ青年が、
別の場所で誰かと話している。

今度は、
線が遠い。

声は、
少しだけ硬い。

同じ人なのに、
さっきとは違う。

旅人は言う。

「場所が変わると、
　こんなに違うんだ」

黒猫は
静かに答える。

「関係も、
　場所と一緒に動くからね」

夜。

旅人は、
街の灯りを見ている。

いくつもの線が、
交差している。

重なったり、
離れたり、

ときどき、
消えたり。

旅人は言う。

「線の外にいると、
　少し寂しいね」

黒猫は
少し間を置いて答える。

「内側にいると、
　少し安心する」

「どっちも、
　人の形だよ」

しばらくして、
旅人は
自分のまわりを見る。

自分と黒猫のあいだには、
線はない。

でも、
さっきすれ違った人とは、
少し距離がある。

うっすらと、
線が見える。

旅人は
小さくつぶやく。

「この線、
　消せるのかな」

黒猫は
やわらかく答える。

「消すものじゃないよ」

「動かすもの」

風が吹く。

遠くで、
誰かが笑う。

そのあいだで、
またひとつ、

線が
少しだけ揺れる。

この国では、
人と人のあいだに、
境界線がある。

でもそれは、
閉じるためのものじゃない。

少しずつ、
近づくための、

目に見える距離だった。`},
  {num:323,title:"『名前のない希望の国』",body:`その国には、
希望という言葉がなかった。

看板にも、
本にも、
誰の口からも、

その言葉は出てこない。

旅人は、
最初それを不思議に思った。

「ここには、
　希望ってないの？」

黒猫は、
少し考えてから答える。

「あるよ」

「ただ、
　名前がついてないだけ」

通りを歩くと、
人々は静かに暮らしている。

誰かが、
壊れかけた椅子を直している。

誰かが、
まだ暗い朝に
パンを焼いている。

誰かが、
小さな灯りを
窓辺に置く。

どれも、
大きな出来事ではない。

でも、
やめていない。

旅人は
その様子を見て言う。

「なんだか…
　続いてるね」

黒猫は
うなずく。

「ここではね」

「“よくなる”って
　言い切らない」

「でも、
　やめもしない」

広場の端で、
ひとりの女性が
土に種を埋めている。

旅人が聞く。

「それ、
　ちゃんと育つの？」

女性は、
少し笑う。

「わからない」

「でも、
　植えることはできる」

土をならす手は、
迷いがない。

黒猫は
静かに言う。

「この国ではね」

「未来を
　約束しない」

「だから、
　裏切られもしない」

夕方。

空は、
はっきりしない色をしている。

明るくなるとも、
暗くなるとも言い切れない。

旅人は、
その空を見ながら言う。

「名前がないと、
　不便じゃない？」

黒猫は
やわらかく答える。

「名前をつけるとね」

「形が決まる」

「でも、
　ここにあるものは、
　まだ決まってない」

夜。

街のあちこちに、
小さな灯りがある。

強くはない。

遠くまで届くほどでもない。

でも、
消えてはいない。

旅人は
その光を見つめる。

「これが…？」

黒猫は
うなずく。

「そう」

「名前のない、
　あの感じ」

旅人は、
しばらく何も言わない。

言葉にしようとすると、
少し違ってしまう気がする。

でも、
確かに感じる。

まだ終わっていない感じ。
少しだけ、続いていく感じ。

この国では、
希望は呼ばれない。

代わりに、
日々の中に
静かに置かれている。

帰り道。

旅人は
小さくつぶやく。

「名前がなくても、
　あるんだね」

黒猫は
静かに答える。

「むしろ」

「名前がないから、
　消えにくいのかもしれない」

夜の中で、
いくつもの小さな灯りが、
揺れている。

それは、
誰にも呼ばれないまま、

それでも確かに、
そこにあった。`},
  {num:322,title:"『一人称で性格が決まる国』",body:`その国では、
自分をどう呼ぶかで、
少しだけ性格が変わる。

「俺」は強くなり、
「僕」はやわらかくなり、
「私」は整う。

同じ人でも、
言葉ひとつで
違う輪郭を持つ。

旅人は、
通りで立ち止まる。

ひとりの青年が、
何かを言いかけていた。

「……俺は」

その声は、
少しだけ強い。

でも、
途中で止まる。

青年は
小さく首を振る。

「……僕は」

言い直すと、
空気がやわらぐ。

旅人は
そっと聞く。

「どうして、言い直したの？」

青年は
少し考えてから言う。

「どの自分で話すか、
　迷うことがあるんだ」

黒猫は
静かに言う。

「この国ではね」

「一人称を選ぶたびに、
　少し違う自分になる」

広場では、
人々がそれぞれの言葉で話している。

「あたし」は軽やかで、
「自分は」は少し距離がある。

どれも、
間違ってはいない。

通りの端で、
女性が誰かに謝っている。

「私が悪かったです」

その言葉は、
きちんとしている。

でも、
少し遠い。

女性は
言い直す。

「……あたしが、悪かった」

声が、
少しだけ近くなる。

相手は、
小さくうなずく。

旅人は言う。

「同じ意味なのに、
　少し違うね」

黒猫は
やわらかく答える。

「言葉はね」

「意味だけじゃなくて、
　距離も運ぶ」

夕方。

空は、
ひとつの色に決まらないまま、
ゆっくり変わっていく。

旅人は
その空を見ながら言う。

「自分って、
　ひとつじゃないのかもしれないね」

黒猫は
静かにうなずく。

「ひとつにすると、
　こぼれるものもある」

夜。

街には、
いくつもの声がある。

同じ人が、
少しだけ言い直す。

そのたびに、
空気が少し変わる。

旅人は
窓の外を見ながらつぶやく。

「どれが本当なんだろう」

黒猫は
少し間を置いて言う。

「どれも、本当だよ」

「そのとき選んだ言葉が、
　そのときの自分だから」

しばらくして、
旅人は口を開く。

「……僕は」

言ってから、
少しだけ考える。

でも、
言い直さない。

その言葉は、
はっきりしすぎないまま、
静かに残る。

黒猫は何も言わない。

ただ、
その選び方を見ている。

この国では、
一人称は
自分を決めるものではない。

そのときの気持ちや距離に合わせて、
少しだけ形を変えるもの。

夜は深い。

それでも人々は、
ひとつに決めきらないまま、
歩いている。

旅人はもう一度、
小さくつぶやく。

「……僕は」

その言葉は、
夜の中に
やわらかく溶けていった。`},
  {num:321,title:"『情緒のある国』",body:`その国では、
出来事よりも先に、
余韻がある。

大きなことは、
あまり起きない。

でも、
小さなことが
長く残る。

旅人がその国に入ったとき、
ちょうど
夕方だった。

空は、
はっきりとした色ではなく、
どこか曖昧な
あいだの色をしている。

「なんだか…」

旅人は言葉を探す。

「説明しにくいね」

黒猫は
静かに答える。

「ここではね」

「感じたままが、答えなんだ」

通りを歩くと、
誰かが
風鈴を鳴らしている。

音は、
短い。

でも、
そのあとに
静けさが残る。

その静けさのほうが、
長い。

旅人は
足を止める。

「今の音より、
　その後のほうが気になる」

黒猫は
うなずく。

「それが
　この国の中心」

広場では、
人々が
静かに座っている。

話している人もいる。
でも、
会話は続かない。

言葉と言葉のあいだに、
長い間がある。

沈黙は、
埋めるものではなく、
置いておくもの。

通りの端で、
女性が
古い手紙を読んでいる。

読み終えても、
すぐには閉じない。

そのまま、
しばらく
何もせずにいる。

旅人は
そっと聞く。

「何か思い出してるの？」

女性は
少しだけ笑う。

「思い出してるというより」

「まだ
　終わってない感じ」

黒猫は
静かに言う。

「ここでは」

「感情は
　すぐに片づけない」

夕暮れは
なかなか終わらない。

夜になりきらない時間が、
長く続く。

街の灯りも、
一気には点かない。

ひとつ、
またひとつ。

ゆっくりと増えていく。

旅人は
その様子を見ながら言う。

「はっきりしないね」

黒猫は
やわらかく答える。

「はっきりしないものの中に」

「大事なものが
　残ることもある」

夜。

遠くで
誰かが笑う。

その声は
すぐに消える。

でも、
消えたあとに
温かさが残る。

旅人は
静かに言う。

「ここって」

「出来事より
　そのあとが大事なんだね」

黒猫は
うなずく。

「出来事は
　一瞬」

「でも」

「情緒は、
　そこに居続ける」

旅人は
目を閉じる。

風の気配。
遠くの音。
消えかけの光。

どれも、
はっきりしない。

でも、
確かに感じる。

この国では、
何かを強く言い切らない。

代わりに、
少しだけ残す。

その残りが、
人の中で
ゆっくり広がる。

黒猫は
静かに言った。

「全部を説明しなくても」

「伝わるものがある」

旅人は
その言葉を
言葉のままではなく、

感覚として
受け取る。

この国の情緒は、
語られないまま、

それでも確かに
そこにあった。`},
  {num:320,title:"『小さな朝が来る国』",body:`その国の朝は、
とても小さい。

夜が終わるときも、
急に明るくなったりはしない。

ただ、
気づかないくらいの変化が、
ゆっくりと始まる。

旅人は、
最初それに気づかなかった。

「まだ夜だね」

そう言って、
歩き続ける。

でも、
黒猫は立ち止まる。

「もうすぐだよ」

旅人は
空を見上げる。

暗いまま。

何も変わっていないように見える。

「どこが？」

黒猫は
少しだけ耳を動かす。

「ほんの少しだけ
　色が変わってる」

旅人は
目を細める。

よく見ると、
夜の黒が
ほんの少しだけ
やわらいでいる。

でも、
言われなければ
見逃してしまうくらいの変化。

やがて、
遠くの家の窓に
小さな灯りがつく。

それもまた、
大きな出来事ではない。

静かで、
ささやかな光。

通りでは、
ひとりの人が
ゆっくりと歩き始める。

まだ眠そうな顔で、
でも確かに
前に進んでいる。

旅人は言う。

「なんだか…」

「始まった感じがしないね」

黒猫は
静かに答える。

「この国の朝はね」

「始まりを主張しない」

しばらく歩くと、
パン屋の扉が
少しだけ開く。

焼きたての香りが
細く外に漏れる。

誰かが
それに気づいて
足を止める。

小さな出来事が、
少しずつ
重なっていく。

旅人は
ふと気づく。

「あれ」

「いつの間にか
　明るくなってる」

黒猫は
ゆっくりうなずく。

「大きな朝じゃなくても」

「ちゃんと
　朝は来る」

旅人は
その言葉を
繰り返すように言う。

「小さくても、
　いいんだ」

黒猫は
静かに答える。

「むしろ」

「そのほうが
　気づけることもある」

完全な暗闇から、
一気に光になるわけじゃない。

ほんの少しずつ、
見えるものが増えていく。

昨日の続きのように、
でも確かに
新しい時間が始まっている。

旅人は
ゆっくり歩きながら言う。

「こういう朝なら」

「起きられる気がする」

黒猫は
小さく目を細める。

「大きな変化がなくても」

「進んでることはある」

空はもう、
すっかり明るい。

でも、
その始まりは

誰にも気づかれないくらい
小さかった。

この国では、
朝は叫ばない。

ただ、
静かにやってくる。

それでも――

今日を始めるには
　それで十分だった。`},
  {num:319,title:"『灰の中から光る国』",body:`その国では、
人の心が燃え尽きたあと、
少しだけ
光る。

強い光ではない。
遠くから見えるほどでもない。

ただ、
近くにいるとわかるくらいの、
かすかな灯り。

旅人は
その光を最初、
見間違えた。

夜の通りで、
うずくまる人がいる。

何かが
終わってしまったような姿。

でも、
その人のまわりに、
ほんの少し
淡い光がある。

旅人は言う。

「…あの人、
　大丈夫かな」

黒猫は
静かに近づきながら答える。

「たぶん」

「燃え尽きたあとだね」

旅人は
その言葉に
立ち止まる。

「燃え尽きたら、
　終わりじゃないの？」

黒猫は
首を振る。

「終わるものもある」

「でも」

「全部は
　消えない」

その人は
ゆっくりと顔を上げる。

目には、
もう強い意志はない。

でも、
完全な空っぽでもない。

かすかに
温もりが残っている。

旅人は
小さく声をかける。

「何か、
　失ったんですか」

その人は
少し考えてから言う。

「うん」

「大事にしてたもの」

「全部、
　使い切った」

旅人は
言葉を探す。

でも、
何も出てこない。

黒猫が
代わりに言う。

「それでも」

「残るものがある」

その人は
自分の手を見る。

手のひらに、
わずかな光。

「これ？」

黒猫は
うなずく。

「燃えたあとに残る、
　温度みたいなもの」

「それはね」

「次の火の
　種になる」

旅人は
その光を見つめる。

弱い。
今にも消えそう。

でも、
確かにある。

街を歩くと、
同じような光が
いくつも見える。

誰かの手の中。
誰かの胸の奥。
誰かの影の中。

みんな、
一度は燃え尽きている。

でも、
そのあとに
何かが残っている。

旅人は言う。

「みんな
　また燃えるの？」

黒猫は
少し考えてから答える。

「無理に燃えなくていい」

「でも」

「その光がある限り」

「完全には終わらない」

夜は深い。

でも、
この国の夜は
完全な闇にはならない。

小さな光が、
あちこちにあるから。

旅人は
静かに言う。

「燃え尽きても、
　意味は消えないんだね」

黒猫は
やわらかく答える。

「むしろ」

「燃え尽きたあとにしか
　残らないものもある」

旅人は
もう一度、
あの人の手の光を見る。

弱くて、
不安定で、

でも、
どこか
やさしい光。

この国では、
終わりのあとに、
何かが始まる。

それは
大きな再生じゃない。

ただ、
小さく光るだけ。

それでも――

もう一度、生きていけるくらいには
　あたたかい光だった。`},
  {num:318,title:"『雨の音の国』",body:`その国では、
雨がよく降る。

でも人々は、
傘をさして
急いで帰ったりしない。

むしろ、
雨の日になると
少し遠くまで歩く。

旅人は
その様子を見て言う。

「変わってるね」

「普通は
　雨の日って
　家に帰るものじゃない？」

黒猫は
静かに耳を立てる。

「ここではね」

「雨を聞きに行く」

旅人は
首をかしげる。

「雨って
　同じ音じゃないの？」

黒猫は
ゆっくり歩き出す。

「この国では」

「百以上ある」

道を進むと、
最初の雨の音が聞こえる。

屋根の上に落ちる、
軽い音。

ぱら、ぱら、ぱら。

旅人は
少し笑う。

「これは
　優しい音だね」

黒猫は
うなずく。

「でも」

「まだ
　旅の最初」

もう少し歩くと、
今度は
石畳の道。

雨は
少し強い。

ぱち、ぱち、ぱち。

硬い音。

旅人は
耳をすませる。

「さっきと
　全然違う」

黒猫は
言う。

「心もね」

「同じ場所じゃ
　同じ音しか
　聞こえない」

森に入ると、
葉の上に落ちる雨。

しと、しと、しと。

柔らかい音。

旅人は
立ち止まる。

「この音
　なんだか落ち着く」

黒猫は
少しだけ微笑むように
目を細める。

「それが」

「自分の雨かもしれない」

さらに奥へ行くと、
川のそば。

水と雨が
混ざり合う音。

ざああ、
さらさら、
ときどき
石に当たる小さな響き。

旅人は
しばらく
何も言わない。

ただ
耳を澄ます。

胸の奥が
静かになっていく。

やがて
旅人は言う。

「ここだ」

「この音
　好きだな」

黒猫は
ゆっくり言う。

「この国の人はね」

「みんな」

「自分の雨音を
　探して歩く」

旅人は
川を見つめながら聞く。

「見つけると
　どうなるの？」

黒猫は
答える。

「心が
　少し静かになる」

夜。

雨は
まだ降っている。

街のあちこちで
人々が
それぞれの場所に立っている。

屋根の下。
橋の上。
森の中。

同じ雨なのに、
聞こえる音は
それぞれ違う。

旅人は
川の音を聞きながら言う。

「雨って
　こんなに
　いろんな音があるんだね」

黒猫は
静かに答える。

「世界も
　同じ」

「聞こうとすると」

「いろんな静けさが
　見つかる」

旅人は
目を閉じる。

雨の音が
やさしく続いている。

この国では、
雨はただの天気じゃない。

人が
自分の静けさを見つけるための音なのだ。`},
  {num:317,title:"『時間が遅れる国』",body:`その国では、
少し奇妙なことが起きる。

出来事と、
感情の時間が
ずれている。

旅人がそのことに気づいたのは、
市場だった。

果物屋の前で
少年が転ぶ。

膝を打ったはずなのに、
少年は
普通に立ち上がる。

泣かない。

旅人は
少し驚く。

「大丈夫？」

少年は
首をかしげる。

「うん？」

黒猫が
静かに言う。

「この国ではね」

「感情が遅れて来る」

旅人は
目を丸くする。

「遅れて？」

黒猫は
うなずく。

「泣くのも」

「笑うのも」

「数日あと」

通りを歩くと、
突然
笑い出す人がいる。

かと思えば、
誰かが
静かに泣いている。

でも
今この瞬間、
何か起きているわけではない。

旅人が
戸惑って聞く。

「どうして？」

黒猫は
答える。

「三日前の出来事」

旅人は
思い出す。

三日前、
広場で
人々が楽しそうに踊っていた。

あのとき
みんな
普通の顔だった。

「じゃあ…」

「今笑ってるのは…」

黒猫が
小さく言う。

「そのときの嬉しさ」

夕方。

広場では
年配の人が
静かに泣いている。

旅人は
心配して声をかける。

「何かあったんですか？」

年配の人は
涙をぬぐいながら言う。

「三日前にね」

「友達が
　帰ってきたんだ」

旅人は
少し混乱する。

「嬉しい話なのに？」

その人は
笑う。

「嬉しいのも
　泣くのも」

「やっと来た」

黒猫は
旅人の横で
静かに言う。

「感情ってね」

「すぐには
　追いつかないこともある」

夜。

旅人は
宿の窓から
街を見ている。

昼間
何も感じなかった出来事が
頭に浮かぶ。

ふと、
胸が
少しだけ温かくなる。

「あ…」

旅人は
小さくつぶやく。

「これ
　遅れて来たのかな」

黒猫は
丸くなりながら言う。

「たぶん」

「人の心はね」

「今ここに
　追いつくのが
　少し苦手なんだ」

遠くで
誰かが笑い、

どこかで
誰かが泣く。

それは
今の出来事ではない。

でも、
確かに
その人の時間の中にある。

旅人は
ゆっくり言う。

「じゃあ」

「今日の気持ちも
　いつか来るのかな」

黒猫は
静かに答える。

「来るよ」

「忘れたころに」

この国では、
感情は
少し遅れて歩いている。

だから人々は、
急いで
気持ちを決めない。

心が
追いつくまで、
少し待つ。`},
  {num:316,title:"『優しさが追いつかない国』",body:`その国では、
優しい人ほど
少し疲れていた。

通りでは、
誰かが荷物を持ってあげる。
誰かが落とし物を拾う。
誰かが困っている人に声をかける。

優しさは、
確かにある。

でも、
なぜか
人々の肩は
少し重そうだった。

旅人は言う。

「みんな
　いい人なのに」

「どうして
　疲れてるんだろう」

黒猫は
静かに歩きながら答える。

「優しさがね」

「追いつかないんだ」

広場のベンチに、
女性が座っている。

さっきまで
誰かの相談を聞いていたらしい。

その人が帰ると、
女性は
深く息をつく。

旅人が聞く。

「大丈夫ですか？」

女性は
少し笑う。

「大丈夫」

「ただ…
　少しだけ」

「世界の困りごとは
　多すぎるの」

その言葉に、
旅人は
何も言えなくなる。

通りでは、
また別の人が
誰かを助けている。

でも、
助けきれない人も
いる。

黒猫は言う。

「優しい人はね」

「全部に
　手を伸ばそうとする」

「でも」

「腕の長さは
　決まってる」

旅人は
ゆっくり歩きながら考える。

「じゃあ
　優しくないほうが
　いいの？」

黒猫は
首を振る。

「違う」

「優しさを
　守らないといけない」

夕方。

広場には
小さな掲示板がある。

そこには
短い言葉が書かれている。

《今日はここまで》

《ここから先は明日》

《できなかった分は
　誰かが引き受ける》

旅人は
それを見て言う。

「優しさを
　分けてるんだ」

黒猫は
静かにうなずく。

「優しさはね」

「燃料みたいなもの」

「無限じゃない」

「だから」

「使い切らないように
　守る」

夜。

街には
まだ助け合いがある。

でも
誰も
倒れるまで頑張らない。

誰かが疲れると、
別の誰かが
少しだけ引き受ける。

旅人は
その景色を見ながら言う。

「優しさって
　守らないと
　消えるんだね」

黒猫は
静かに答える。

「優しい人が
　壊れたら」

「その優しさも
　消えるから」

旅人は
少し考えてから言う。

「じゃあ
　優しさを守ることも
　優しさなんだ」

黒猫は
ゆっくり目を細める。

「たぶん」

「それが
　長く続く優しさ」

遠くで、
誰かが
誰かを助けている。

でも
その隣では、

誰かが
静かに休んでいる。

この国では、
優しさは
尽きないものではない。

だからこそ
人々は
それを大事に扱う。

追いつかない優しさを、
消さないために。`},
  {num:315,title:"『少しだけ重なる世界の国』",body:`その国では、
人はそれぞれ
自分の世界を持っている。

完全に同じ世界は、
ひとつもない。

見える景色も、
感じる温度も、
大事にしているものも違う。

旅人は
通りを歩きながら言う。

「みんな、
　同じ場所にいるのに」

「少しずつ
　違う世界にいるみたいだ」

黒猫は
静かにうなずく。

「そうだよ」

「ここでは
　それを隠さない」

広場では、
何人かが
円になって座っている。

でも、
全員が同じ方向を
見ているわけではない。

ある人は
空を見ている。

ある人は
足元の草を見ている。

ある人は
ただ目を閉じている。

旅人は
少し不思議に思う。

「話してないの？」

黒猫は
言う。

「話すこともある」

「でも
　同じ景色を見なくても
　隣にいられる」

そのとき、
少年が
紙飛行機を飛ばす。

飛行機は
少し曲がって
別の人の足元に落ちる。

その人は
拾って
また飛ばす。

今度は
少し遠くへ飛ぶ。

誰かが笑う。

大きな会話はない。

でも、
小さなつながりが
生まれている。

旅人は
その様子を見て言う。

「完全に同じじゃなくても
　一緒にいられるんだね」

黒猫は
ゆっくり答える。

「世界はね」

「重なりすぎると
　息苦しい」

「でも」

「少しも重ならないと
　出会えない」

夕方。

広場の影が
少しずつ伸びる。

人々は
それぞれの場所へ
帰っていく。

でも、
さっきの紙飛行機だけは
まだ芝生の上にある。

旅人は
それを拾う。

少し折れている。

でも
まだ飛びそうだ。

旅人は
そっと
空へ投げる。

飛行機は
風に乗って
少しだけ進む。

黒猫が
静かに言う。

「世界は
　全部重ならなくていい」

「少しだけでいい」

旅人は
その言葉を聞きながら、
遠くに飛んでいく
紙飛行機を見送る。

完全に
同じ世界じゃなくても。

ほんの少し
重なるだけで、

人は
同じ空の下を
歩いていけるのかもしれない。`},
  {num:314,title:"『小さな火を渡す国』",body:`その国では、
夜になると
人々は小さな灯りを持つ。

大きな松明ではない。
手のひらに収まるくらいの、
小さな火。

広場の真ん中には、
大きな焚き火がある。

でも、
人々はそこに
ずっと集まってはいない。

火を
少しだけ分けてもらうと、
それぞれの場所へ帰っていく。

旅人は
その様子を見て言う。

「なんで
　焚き火のそばに
　いないの？」

黒猫は
静かに答える。

「火はね」

「持って帰るものなんだ」

通りを歩くと、
ひとりの女性が
座っている。

灯りは
消えかけている。

すると、
通りかかった人が
自分の火を
少しだけ近づける。

ぱち、と
火が移る。

女性は
小さく言う。

「ありがとう」

その人は
うなずいて
歩き去る。

旅人は
その光景を見て
つぶやく。

「助けたんだね」

黒猫は
首を振る。

「渡しただけ」

「火は
　奪うものじゃない」

「分けても
　減らないから」

旅人は
自分の灯りを見る。

小さな火。

大きくはない。

でも、
確かに燃えている。

広場に戻ると、
焚き火の周りに
いろいろな人がいる。

話している人。
黙っている人。
ただ火を見ている人。

誰も
長居はしない。

少し暖まると、
また
それぞれの場所へ戻る。

旅人は
黒猫に言う。

「みんな、
　自分の火を持ってるんだね」

黒猫は
やわらかく答える。

「そして」

「ときどき
　誰かの火になる」

夜が深くなる。

遠くの家にも
小さな灯りがある。

どれも
大きくはない。

でも、
消えてはいない。

旅人は
火を見つめながら言う。

「世界って
　思ったより
　暗くないのかも」

黒猫は
静かに言う。

「暗い夜はある」

「でもね」

「火を
　ひとつ渡すだけで」

「夜は
　少しだけ
　変わる」

旅人は
そっと
自分の灯りを持ち上げる。

この火は
特別じゃない。

小さい。

でも、
誰かに渡せるくらいには
温かい。

そして
また歩き出す。

次の誰かに
小さな火を渡すために。`},
  {num:313,title:"『情熱が伝播する国』",body:`その国の空気には、
不思議な熱があった。

暑いわけではない。
でも、
どこかで
何かが燃えている気配がする。

広場では、
一人の人が
夢中で絵を描いている。

通りの奥では、
誰かが
壊れた楽器を直している。

屋台では、
パン職人が
新しい配合を試している。

旅人は
その様子を見て言う。

「みんな、
　ずいぶん熱心だね」

黒猫は
ゆっくりしっぽを揺らす。

「ここはね」

「情熱が伝わる国なんだ」

旅人は
首をかしげる。

「伝わる？」

そのとき、
広場で絵を描いていた青年が
筆を止める。

近くで見ていた子どもが
言う。

「すごい」

青年は
少し照れる。

でも
また描き始める。

それを見て、
別の人が
スケッチを始める。

小さな連鎖。

旅人は
それを見て
少し驚く。

「やりたいことが
　移ってるみたい」

黒猫は
静かに言う。

「情熱ってね」

「感染する」

「言葉より
　静かに」

通りを歩くと、
今度は
年配の人が
古い本を読んでいる。

横には
何冊ものノート。

旅人が聞く。

「研究ですか？」

年配の人は
笑う。

「ただの好きですよ」

「この本が
　面白くて」

その話を聞いて、
旅人は
その本を
少し読みたくなる。

黒猫が
小さく言う。

「ほらね」

旅人は
歩きながら
考える。

「でも、
　自分に情熱がないときは
　どうするの？」

黒猫は
少し空を見上げる。

「借りればいい」

「この世界には
　たくさん
　転がってる」

夕方。

広場では
人が集まっている。

誰かが
歌い始める。

完璧じゃない。
でも
楽しそうだ。

それを聞いて、
別の人が
手拍子をする。

また一人
笑う。

旅人は
その輪の外で
しばらく見ている。

胸の奥に、
小さな火が
灯る気がする。

黒猫は
静かに言う。

「孤独と戦うのに」

「必ずしも
　自分の情熱じゃなくていい」

「誰かの火を
　少し
　分けてもらえばいい」

夜。

街のあちこちに
小さな灯りがある。

それは
それぞれの人の情熱。

全部
違う火。

でも
その光は
静かに
街を照らしている。

旅人は
小さくつぶやく。

「世界って
　思ったより
　燃えてるんだね」

黒猫は
やわらかく答える。

「だから」

「感じられる人は
　ひとりでも
　真っ暗にはならない」

旅人は
その言葉を胸に、
もう一度
広場の灯りを見た。

世界を
もう一度
好きになるには、

もしかすると
ひとつの情熱の火で
十分なのかもしれない。`},
  {num:312,title:"『ひとり分の世界の国』",body:`その国の地図は、
少し変わっていた。

大きな世界地図の代わりに、
人々は
小さな円を持っている。

半径は、
腕を広げたくらい。

その円の中に、
小さくこう書かれている。

《ここが、ひとり分の世界》

旅人は
驚いて言う。

「世界って、
　こんなに小さいの？」

黒猫は
静かに答える。

「触れられる世界はね」

「だいたい
　それくらい」

広場では、
人々がそれぞれ
自分の円の中で
何かをしている。

花に水をやる人。
道を掃く人。
誰かの話を聞く人。

どれも、
遠くまでは届かない。

でも、
確かに
そこに影響している。

旅人は
少し考える。

「でも、
　世界には
　もっと大きな問題があるよ」

「戦争とか、
　貧しさとか」

黒猫は
ゆっくり歩きながら言う。

「そうだね」

「でも
　全部を背負うと」

「人は
　動けなくなる」

通りの端で、
年配の人が
壊れたベンチを直している。

旅人が聞く。

「それ、
　国の仕事じゃない？」

年配の人は
笑う。

「これは
　私の円の中だからね」

ベンチは
小さなもの。

世界を
変えるわけではない。

でも、
そこに座る誰かは
助かる。

旅人は
ベンチを見つめる。

「ひとり分でも、
　意味あるんだ」

黒猫は
うなずく。

「責任も、
　ひとり分」

「でもね」

「限界も、
　ひとり分でいい」

夕方。

旅人は
自分の手を
そっと広げてみる。

届く範囲は
広くない。

でも、
ゼロでもない。

この国では、
世界は
小さく区切られている。

だからこそ、
誰かが
必ず手を伸ばせる場所がある。

夜。

旅人は
黒猫に言う。

「世界全部を
　背負わなくていいんだね」

黒猫は
静かに答える。

「その代わり」

「自分の円から
　逃げないこと」

旅人は
うなずく。

世界は広い。

でも
自分が触れられるのは、
ひとり分。

それで
十分かもしれないと、
少し思いながら。`},
  {num:311,title:"『孤独を直さない国』",body:`その国には、
奇妙な看板があった。

《孤独相談所　ありません》

旅人は
思わず読み返す。

「え？」

その下には
小さく続きがある。

《ここでは
　孤独は修理しません》

旅人は
首をかしげる。

「孤独って、
　直すものじゃないの？」

黒猫は
静かに歩きながら答える。

「この国ではね」

「孤独は
　壊れた状態じゃない」

通りには
人がいる。

誰かと話している人もいる。
一人で座っている人もいる。
黙って空を見ている人もいる。

でも、
どの姿も
特別視されていない。

広場のベンチで、
青年が
本を読んでいる。

周りには
人がいるけれど、
誰も話しかけない。

旅人は
少し心配になる。

「大丈夫かな」

黒猫は
軽く首を振る。

「助けが必要な顔じゃない」

旅人は
少し考える。

「でも、
　孤独って
　つらいものじゃない？」

黒猫は
少しだけ
立ち止まる。

「つらい孤独もある」

「でもね」

「孤独＝間違い
　って決めてしまうと」

「ひとりでいる人は
　ずっと
　“修理待ち”になる」

風が吹く。

青年は
ページをめくる。

しばらくして
本を閉じると、
ゆっくり立ち上がる。

誰かと話すわけでもない。

でも、
歩き方は
重くない。

旅人は
その背中を見る。

「孤独なのに、
　大丈夫そうだね」

黒猫は
うなずく。

「孤独でも
　壊れてないから」

この国では、
孤独は
状態のひとつ。

晴れの日。
雨の日。
風の日。

それと
同じように扱われる。

夕方。

広場には
人がぽつぽついる。

誰かは
誰かと話し、
誰かは
ひとりで座る。

どちらも
特別ではない。

旅人は
静かに言う。

「孤独って、
　直さなくても
　いいのかな」

黒猫は
やわらかく答える。

「直さなくても、
　生きられる」

「そしてね」

「直そうとされない孤独は、
　少し呼吸しやすい」

夜。

旅人は
宿の窓から
街を眺める。

ひとりの灯り。
ふたりの灯り。
またひとりの灯り。

どれも
同じ夜の中にある。

黒猫は
静かに丸くなって言う。

「孤独は
　欠陥じゃない」

「ただ、
　ひとりの形」

旅人は
その言葉を
胸の中でゆっくり転がす。

直さなくてもいい。

その考えは、
思ったより
やさしい重さで
そこにあった。`},
  {num:310,title:"『猫の都合の国』",body:`その国では、
時間はあるけれど、
予定はあまり守られない。

朝市は、
朝に始まることもあるし、
昼になることもある。

店は開いている日もあれば、
「今日はなんとなく休み」の日もある。

門には、
小さくこう書いてあった。

《気が向いたら、始めます》

旅人は
少し困った顔をする。

「これじゃ、
　何も決まらないじゃない」

黒猫は
しっぽをゆらしながら言う。

「決めないことも、
　決まりのひとつだよ」

広場に行くと、
人々はそれぞれ
思い思いに過ごしている。

昼寝している人。
急に歌い出す人。
途中で散歩に出る人。

通りの端で、
青年が
店を開けようとしている。

看板を出す。
でも、
ふと空を見上げる。

雲がきれいだ。

青年は
看板を戻して
そのまま歩き出す。

旅人は
思わず言う。

「店は？」

青年は
肩をすくめる。

「また今度」

旅人は
呆れる。

「そんなので
　大丈夫なの？」

黒猫は
少し笑う。

「ここでは、
　無理に続けない」

「疲れたら休む。
　気が向いたら動く」

旅人は
まだ納得できない。

「でも、
　それじゃ
　国は回らないよ」

黒猫は
静かに言う。

「回ってるよ」

旅人は
周りを見渡す。

確かに、
人々はのんびりしている。

でも、
困っている顔は
あまりない。

パン屋は
遅れて開く。
でも
誰かが余分に焼いている。

店が休みでも、
別の人が
分けてくれる。

この国では、
きっちりとは
噛み合わない。

でも、
なんとなく回る。

夕方。

さっきの青年が
戻ってきて
やっと店を開けた。

すると
人がぽつぽつ集まる。

旅人は
少し笑う。

「みんな、
　待ってたの？」

青年は
首を振る。

「たまたま」

黒猫は
旅人を見上げて言う。

「猫の世界ってね」

「だいたい
　こんな感じ」

「気が向いたら近づく。
　気が向いたら離れる」

「でも、
　それでも
　ちゃんと一緒に暮らしてる」

夜。

旅人は
宿の窓から
街を見る。

人は
急がない。

でも
止まってもいない。

黒猫は
静かに言った。

「人間は
　計画で動く」

「猫は
　都合で動く」

「この国は、
　その間にある」

旅人は
小さく笑う。

少しだけ
肩の力が抜ける。

明日の予定は、
まだ決まっていない。

でも
それでもいい気がした。

黒猫は
丸くなりながら言う。

「明日は明日の
　猫の都合」

旅人は
その言葉を聞きながら、
静かな夜に
ゆっくりと眠りについた。`},
  {num:309,title:"『すれ違う誠実な国』",body:`その国では、
人々はとても誠実だった。

思ったことは言う。
気づいたことは言う。
間違っていると思えば言う。

遠回しにしない。
ごまかさない。

それが、この国の礼儀だった。

旅人と黒猫が
町に入ったとき、

広場で
一人の青年が
店の人に言っていた。

「このパン、
　昨日のより少し固いです」

店の人は
少し考えてから言う。

「本当ですね。
　焼きすぎました」

そして
少し安く売った。

旅人は
少し驚く。

「正直すぎない？」

「普通、
　もう少し言い方があるんじゃ…」

黒猫は
静かに答える。

「ここでは
　それが誠実なんだ」

しかし
少し歩くと、
別の場面に出会う。

広場のベンチで
女性が
友人に言っていた。

「その服、
　似合ってないと思う」

友人は
少し黙る。

「……そう？」

「うん。
　色が合ってない」

空気が
少し固くなる。

旅人は
小声で言う。

「ほら、やっぱり」

「誠実でも、
　傷つくことあるよ」

黒猫は
その様子を見て
ゆっくり言う。

「誠実は、
　いつも優しいとは限らない」

「でもね」

「嘘より
　扱い方が難しいだけなんだ」

そのとき、
さっきの友人が
小さく笑った。

「じゃあ、
　どの服ならいい？」

「この色。
　前に着てたやつ」

二人は
しばらく服の話をする。

さっきの言葉は
消えていない。

でも、
関係も消えていない。

旅人は
まだ少し戸惑う。

「なんだか
　ぎこちない国だね」

黒猫は
少しだけ
旅人を見上げる。

「この国の人はね」

「嘘で滑らかにするより、
　本当で引っかかる方を選ぶ」

「だから、
　ときどき
　すれ違う」

夕方、
旅人が宿で
夕食を食べていると、

隣の席の年配の人が
声をかけてきた。

「旅人さん」

「あなた、
　少し疲れてますね」

旅人は
驚く。

「え？」

「歩き方が
　重いです」

正直すぎる言葉。

でも
その人は続けた。

「無理しないでください」

「この国の宿は、
　もう一泊しても
　怒られません」

旅人は
少し黙ってから
笑った。

黒猫が
静かに言う。

「ほら」

「誠実は、
　たまに
　まっすぐ届く」

夜。

旅人は
空を見上げる。

この国では、
言葉が少し
ぶつかる。

少し
ずれる。

でも
それでも人々は
話し続けている。

黒猫は
静かに言った。

「誠実には
　いろんな形がある」

「この国は、
　まっすぐすぎる誠実の国」

「だから
　ときどき
　すれ違う」

「でも、
　それでも
　嘘より遠くへ行ける」

旅人は
小さくうなずいた。

この国では、

優しさより先に
正直が歩いているのだと
少しだけ
理解しながら。


『少しずれた誠実な国』


その国に入ってすぐ、
旅人は少し困った顔をした。

市場で、
ある青年が店主に言っていた。

「このパン、
　少し焼きすぎだと思います」

店主は怒らない。
むしろ頷く。

「そうかもしれないね」

「でも、
　今日の小麦は水分が多かったから
　これが一番いい焼き方だったんだ」

青年は考えて、
もう一度言う。

「なるほど。
　でも、少し硬いです」

店主は笑う。

「正直だね」

そして、
少し安くして渡した。

旅人は小声で言う。

「ずいぶん
　はっきり言うんだね」

黒猫は静かに歩きながら答える。

「この国では
　それを誠実だと思ってる」

少し進むと、
今度は広場で
女性と年配の人が話している。

女性が言う。

「その話、
　少し長いです」

年配の人は
一瞬止まる。

それから頷く。

「そうか。
　大事なところから話そう」

旅人は
思わず小さく言う。

「失礼じゃないの？」

黒猫は
旅人の足元で止まり、
ゆっくり振り返る。

「そう思う？」

旅人は困った顔になる。

「だって、
　普通はもっと
　遠回しに言うでしょ」

黒猫は言う。

「遠回しは
　優しさになることもある」

「でもね」

「遠回しが
　分からない人もいる」

旅人は
少し黙る。

夕方、
二人はベンチに座っている
少女と出会う。

少女は旅人を見ると
真っ直ぐ言った。

「あなた、
　少し疲れてます」

旅人は驚く。

「え？」

少女は続ける。

「歩き方が
　少し重いです」

「でも、
　止まりたいほどではない感じ」

旅人は
思わず笑ってしまう。

「そんなに分かる？」

少女は頷く。

「見えるものを
　そのまま言っただけです」

少女はそれだけ言うと
本を読み始めた。

旅人は
黒猫を見る。

「この国の人は
　みんなこうなの？」

黒猫は答える。

「思ったことを
　そのまま言う」

「正しいと思うことを
　そのまま言う」

「少し
　ずれることもある」

旅人は
市場のことを思い出す。

青年。
店主。
広場の会話。

確かに
少しだけ
普通と違う。

でも――

誰も
傷ついていない。

むしろ、
会話は
すぐに本題に届く。

黒猫は静かに言う。

「誠実にも
　いろいろな形がある」

「この国の誠実は
　少しだけ真っ直ぐすぎる」

「だから
　最初は戸惑う」

旅人は
空を見上げる。

「でも、
　悪くないね」

黒猫は
小さく目を細める。

「誠実が
　少しずれるとね」

「嘘が
　入り込む隙が
　少なくなるんだ」

夜の市場には、
正直な会話が
ぽつぽつ灯っている。

旅人は
その中を歩きながら思う。

この国の誠実は、
確かに少し
ずれている。

けれど――

まっすぐすぎる優しさも、
世界には
あっていいのかもしれない。`},
  {num:308,title:"『わかり合えないまま共存する国』",body:`その国の広場には、
大きな机が置かれている。

丸い机。
誰でも座れる。

けれど、
そこでは不思議な決まりがあった。

「完全に理解できたと思ってはいけない」

旅人は首をかしげる。
「理解するのは、
　いいことじゃないの？」

黒猫は静かに言う。
「いいことだよ」

「でも、
　理解した“つもり”が
　一番遠くすることもある」

広場の机には
いろいろな人が座っている。

年配の人。
働く人。
黙っている人。
遠くから来た人。

話している。

でも、
時々止まる。

「それは違う」
「いや、そうじゃない」

完全には
重ならない。

旅人は
少し不安になる。
「それで、
　大丈夫なの？」

そのとき、
机の端に座っていた女性が
笑って言った。

「大丈夫ですよ」

「ここでは
　分かり合うことより、
　席を立たないことが
　大事なんです」

旅人は
その言葉を
ゆっくり考える。

理解できなくても、
席を立たない。

怒っても、
すぐには去らない。

黙っていても、
同じ机にいる。

この国では、
それを共存と呼ぶ。

黒猫は
机の下で
丸くなりながら言う。

「完全な理解は
　ほとんど起きない」

「でもね、
　隣に座ることは
　できる」

夕方になると、
広場の人たちは
少しずつ帰っていく。

議論は
終わらない。

答えも
出ない。

それでも、
机は片づけられない。

明日また
誰かが座るから。

旅人は
最後に振り返る。

机には
まだ数人残っている。

話している人。
黙っている人。

同じ場所にいる。

黒猫は
静かに言う。

「わかり合えないことは、
　失敗じゃない」

「離れないことが、
　成功なんだ」

旅人は
少しだけ
安心して歩き出す。

世界には
理解より先に、

隣に座る勇気で
成り立っている場所が
あるのだと知りながら。`},
  {num:307,title:"『少しづつ（poco a poco）の国』",body:`その国の石畳には、
小さな段差がある。

気づかないほど、
ほんの少し。

けれど、
歩いていくと
いつのまにか
景色が高くなっている。

門には
こう刻まれている。

《急がなくていい
　少しずつでいい》

旅人は
足元を見る。
確かに、
一歩では変わらない。

でも、
十歩、百歩と重なれば、
確実に高さが変わる。

黒猫は
静かに言う。
「大きく跳ぶと、
　戻るのも大きい」

「でも、
　少しずつは
　戻りにくい」

通りの端で、
青年が
小さな苗に水をやっている。

毎日、
ほんの少し。

旅人が聞く。
「それで、
　変わるの？」

青年は
うなずく。
「昨日より、
　ほんの少しだけ」

苗は、
劇的には伸びない。

けれど、
昨日の高さには
戻らない。

この国では、
変化は
音を立てない。

誰も拍手しない。
誰も祝わない。

でも、
確実に積み上がる。

黒猫は
苗を見つめながら言う。
「少しずつは、
　弱く見える」

「でもね、
　時間と組むと
　強い」

旅人は
自分の歩幅を
少しだけ小さくする。

速くなくていい。
止まらなければいい。

夕方、
青年は
苗の横に小さな印をつける。

今日の高さ。

それだけで、
十分。

国を出るころ、
旅人は振り返る。

景色は
劇的には変わっていない。

それでも、
確かに
昨日とは違う場所にいる。

黒猫は
歩きながら言う。
「少しずつはね、
　裏切らない」

「大きな変化は
　揺れやすいけど、
　小さな変化は
　根を張る」

旅人は
うなずく。

一歩ずつ。

目立たなくても、
派手でなくても。

その積み重ねが、
いつか
振り返ったときの
高さになると知りながら。

そしてまた、
今日の一歩を
静かに踏み出す。`},
  {num:306,title:"『語られなかった物語の国』",body:`その国は、
とても静かだった。

声がないわけではない。
けれど、
どこかで
止まっている。

話しかけようとして、
飲み込まれた言葉。
書きかけで
閉じられた手帳。
送られなかった手紙。

それらが、
空気の中に
薄く漂っている。

旅人は
小さくつぶやく。
「ここには、
　続きがある気がする」

黒猫は
うなずく。
「語られなかっただけで、
　終わったわけじゃない」

広場には、
半分だけ灯った灯りがある。

誰かが
途中まで話し、
途中でやめた物語。

通りの端で、
青年が
古いベンチに座っている。

手には、
開かれていない封筒。

旅人は
そっと隣に立つ。

「渡さなかったの？」

青年は
少し笑う。
「渡せなかった」

風が吹く。

封筒の角が
わずかに揺れる。

「言えばよかったって、
　思うことはある？」

旅人の問いに、
青年は
ゆっくりうなずく。

「でも、
　言わなかった時間も、
　確かだった」

黒猫は
静かに言う。
「語られなかった物語は、
　失敗じゃない」

「守られた物語もある」

この国では、
すべてを話さなくていい。

理解されなくても、
価値は減らない。

語られなかった物語は、
持ち主の胸の中で
静かに灯り続ける。

夕暮れ、
青年は
封筒を胸ポケットに戻す。

燃やさない。
破らない。

持ったまま、
立ち上がる。

旅人は
黒猫に言う。
「全部話さなくても、
　いいんだね」

黒猫は
やわらかく答える。
「語らないことも、
　選択だよ」

「物語は、
　外に出た分だけじゃない」

夜。

街のあちこちに、
小さな灯りが残る。

誰にも読まれなかった日記。
口にされなかった想い。
届かなかった言葉。

それでも、
そこにあった時間。

国を出るとき、
旅人は
振り返る。

静けさは、
空白ではなかった。

それは、
語られなかった物語たちの
やわらかな重なり。

黒猫は
歩きながら言う。
「全部を聞けなくても、
　敬うことはできる」

旅人は
うなずく。

語られなかった一部に出会ったことで、
世界は
少しだけ
深くなっていた。`},
  {num:305,title:"『好きが重なる国』",body:`その国では、
人と人は
意見ではなく、
“好き”で出会う。

正しさより、
熱量。

主張より、
ときめき。

街の壁には、
色とりどりの紙が貼られている。

「この音が好き」
「この匂いが好き」
「この時間が好き」

理由は、
書いていない。

旅人は
目を細める。
「証明しなくていいんだね」

黒猫は
うなずく。
「好きは、
　証明するものじゃない」

広場では、
小さな円がいくつもできている。

同じ映画を好きな人。
同じ星座を好きな人。
同じパンの端っこを好きな人。

重なった部分だけで、
輪ができる。

全部が一致しなくても、
いい。

通りの端で、
青年が
一枚の紙を見つめている。

そこには、
こう書いてある。

「雨の匂いが好き」

青年は
少し迷いながら、
その隣に
小さく書き足す。

「静かな雷も、好き」

旅人が
そっと聞く。
「同じ人がいるかな」

青年は
肩をすくめる。
「いなくてもいい」

少し間を置いて、
続ける。
「でも、
　いたらうれしい」

黒猫は
やわらかく言う。
「重なるって、
　全部同じってことじゃない」

「一部が触れること」

やがて、
別の誰かが
その紙の前で足を止める。

何も言わない。

でも、
同じ匂いを思い出した顔をする。

それだけで、
少し空気が温かくなる。

この国では、
好きは競わない。
奪わない。

重なっても、
消えない。

夕方、
広場の輪は
ほどけたり、
またできたりする。

固定されない。

でも、
消えない。

旅人は
黒猫に言う。
「好きが重なると、
　安心するね」

黒猫は
静かに答える。
「ひとりで持つ好きも、
　強い」

「でも、
　重なった好きは、
　少しあたたかい」

国を出るとき、
旅人は
自分の好きなものを
ひとつ思い出す。

まだ、
誰にも言っていない。

でも、
どこかで
重なるかもしれない。

黒猫は
歩きながら言う。
「好きはね、
　橋になる」

旅人は
うなずく。

全部を渡らなくても、
一歩だけ
重なればいい。

その一歩が、
また
誰かへと
つながっていく。`},
  {num:304,title:"『混ざらないまま歩く国』",body:`その国では、
色は混ざらない。

赤は赤のまま。
青は青のまま。
無理に紫にはしない。

街を歩く人々も、
どこかはっきりしている。

考えも、
好みも、
歩き方も。

けれど、
争いは少ない。

旅人は
首をかしげる。
「混ざらないなら、
　ぶつからない？」

黒猫は
静かに答える。
「混ざらないと決めてるから、
　壊そうとしない」

広場には
長い道が一本、
まっすぐ伸びている。

人々は
同じ方向へ歩いているが、
距離も、
速さも、
揃っていない。

通りの端で、
青年が
立ち止まっている。

その隣を、
別の誰かが
何も言わずに通り過ぎる。

旅人が
青年に聞く。
「一緒に歩かないの？」

青年は
少し笑う。
「歩いてるよ」

「でも、
　同じじゃなくていい」

黒猫は
ゆっくり言う。
「ここでは、
　分かり合うより
　分かれたままを尊重する」

意見は
一致しない。

価値観も
揃わない。

それでも、
道は共有できる。

夕方、
空は
それぞれの色を保ったまま
並んでいる。

赤も、
紫も、
まだ混ざりきらない青も。

でも、
ひとつの空だ。

旅人は
黒猫に言う。
「混ざらないって、
　寂しくない？」

黒猫は
やわらかく答える。
「混ざることだけが、
　近さじゃない」

「形を変えずに
　並べることも、
　共にいるってこと」

青年は
また歩き出す。

隣の人と、
触れない距離で。

でも、
同じ地面を踏みしめている。

国を出るとき、
旅人は
自分の色を思う。

誰かと同じにならなくても、
誰かを塗り替えなくても、

一緒に歩ける。

黒猫は
静かに言う。
「混ざらないまま歩けるなら、
　それは
　成熟だよ」

旅人は
うなずき、
自分の色を
そのまま抱えて
また歩き出す。`},
  {num:303,title:"『帰郷の国』",body:`その国の門は、
外へ向かってではなく、
内へ向かって開いている。

そこに集まるのは、
これから旅に出る人ではなく、
旅から戻ってきた人たち。

荷物は、
少し軽くなっている。
けれど、
目はどこか遠い。

旅人は
不思議そうに言う。
「みんな、
　もう終わった人たち？」

黒猫は
首を振る。
「終わったんじゃない」

「持ち帰った人たちだよ」

広場では、
焚き火がいくつも灯っている。

その火のまわりで、
帰ってきた人たちが
静かに話している。

武勇伝ではない。
成功談でもない。

迷った話。
泣いた夜。
進めなかった日。

それでも、
戻ってきたという事実。

通りの端で、
青年が
焚き火を見つめている。

旅人が
隣に座る。

「どこまで行ったの？」

青年は
少し笑う。
「思ってたより、
　遠くは行けなかった」

火を見つめたまま、
続ける。
「でも、
　思ってたより、
　深くは行った」

黒猫は
静かに言う。
「距離より、
　深さを持って帰る人もいる」

この国では、
“帰る”ことは
敗北ではない。

逃げでもない。

帰ってきた人は、
少し静かだ。

でも、
前よりも
自分の足音を
知っている。

旅人は
問いかける。
「また、
　出るの？」

青年は
火に小枝をくべる。
「うん」

「でも、
　次は、
　少し違う歩き方で」

夜が深まる。

帰郷した人たちの話は、
静かに混ざり合い、
やがて
それぞれの胸に戻っていく。

旅人は
黒猫に言う。
「帰る場所があるって、
　強いね」

黒猫は
やわらかく答える。
「帰れる人はね、
　また出られる」

門を出るとき、
旅人は振り返る。

焚き火の灯りが、
夜の中で
小さく揺れている。

あれは、
終わりの火ではない。

再び歩き出すための、
あたたかな火。

黒猫は
歩きながら言う。
「旅は、
　出発と帰郷の
　あいだだけじゃない」

「帰ったあとの時間も、
　旅の続きだよ」

旅人は
うなずく。

いつか自分も、
あの火のそばで
話す日が来るのだろうか。

そう思いながら、
まだ帰らない道を
静かに歩いていく。`},
  {num:302,title:"『ひとり分の距離の国』",body:`その国では、
人と人のあいだに
必ず“ひとり分”の空間がある。

広すぎない。
狭すぎない。

手を伸ばせば届くけれど、
勝手には触れない距離。

街を歩く人々は、
自然とその幅を保っている。

押し合わない。
詰め寄らない。
でも、
遠ざかりすぎもしない。

旅人は
少し安心した顔で言う。
「静かだね」

黒猫は
うなずく。
「ここでは、
　近さで証明しなくていい」

広場のベンチ。
青年が座っている。

その隣は、
空いている。

でも、
ぽっかりと寂しいわけではない。

旅人は
ひとり分あけて座る。

青年は
何も言わない。

それでも、
空気は固くならない。

しばらくして、
青年がぽつりと言う。
「前の国では、
　近づかれすぎて
　息ができなかった」

少し間を置いて、
続ける。
「離れたら、
　冷たいって言われた」

黒猫は
静かに答える。
「ここでは、
　距離は拒絶じゃない」

「自分を保つための
　余白だよ」

風が通る。

その“ひとり分”の空間を、
やわらかく抜けていく。

この国では、
無理に分かち合わない。
無理に共有しない。

それでも、
孤立ではない。

ひとりで立てるから、
隣に立てる。

青年は
ゆっくり立ち上がる。

旅人も、
同じように立つ。

歩き出すときも、
ひとり分の距離。

でも、
同じ方向。

旅人は
黒猫に言う。
「近すぎないのに、
　離れてる感じがしないね」

黒猫は
やわらかく答える。
「信頼はね、
　詰めるものじゃない」

「保てる距離があることだよ」

夕暮れ。
影と影のあいだにも、
ひとり分。

その隙間に、
風と光が入り込む。

国を出るとき、
旅人は思う。

誰かといるために、
自分を縮めなくていい。

離れることで、
壊れなくていい。

ひとり分の距離は、
壁じゃない。

呼吸だ。

黒猫は
静かに言う。
「距離があるから、
　歩幅を合わせられる」

旅人は
うなずき、
その余白を抱えたまま
また歩き出す。`},
  {num:301,title:"『孤独な国』",body:`その国に入ると、
音が減る。

人はいる。
街もある。
けれど、
どこか遠い。

声をかけても、
すぐには返ってこない。

旅人は
小さくつぶやく。
「ひとり、だね」

黒猫は
静かに歩きながら言う。
「ここは、
　ひとりでいることを
　隠さなくていい国」

広場には、
誰もいない。

いや、
正確には
“それぞれが離れている”。

互いに距離を保ち、
自分の影と向き合っている。

通りの端で、
青年が
壁にもたれている。

視線は地面。
言葉は少ない。

旅人が
近づいても、
青年は顔を上げない。

「ここでは、
　誰も助けに来ないんだ」

ぽつりと、
青年が言う。

黒猫は
止まらず答える。
「助けが来ない時間も、
　孤独の一部」

青年は
少しだけ
顔を上げる。

「孤独って、
　なくなるの？」

旅人は
答えられない。

黒猫が
代わりに言う。
「なくならないよ」

風が吹く。
影が伸びる。

「でもね、
　孤独は
　形を変える」

この国では、
孤独から
逃げない。

向き合う。

最初は
寒い。
痛い。
果てがない。

けれど、
歩き続けると
気づく。

孤独は、
“誰もいない”ではなく、
“自分がいる”ということ。

青年は
静かに目を閉じる。

「ひとりだと思ってた」

「でも、
　自分は、
　ここにいる」

黒猫は
やわらかく言う。
「孤独の奥にはね、
　自分がいる」

「そして、
　自分を知った人は、
　誰かに近づくとき、
　本当の距離を測れる」

夕暮れ。
遠くに
別の影が見える。

近づきもしない。
離れもしない。

ただ、
同じ空の下にいる。

旅人は
小さく息を吐く。

孤独は、
終わりじゃない。

さまよい続けた先にあるのは、
空白ではなく、
輪郭。

そして、
いつか
誰かと並ぶときの、
静かな強さ。

黒猫は
歩き出す。
「孤独は、
　罰じゃない」

「深さだよ」

旅人は
うなずき、
ひとりのまま、
でも確かに
歩き出す。

その足音は、
もう
少しだけ
響いていた。`},
  {num:300,title:"『沢山の物語の国』",body:`その国には、
図書館がない。

代わりに、
人がいる。

通りを歩けば、
すれ違う人の胸のあたりが、
かすかに光っている。

近づくと、
そこから
物語の気配がする。

旅人は
不思議そうに言う。
「本がないのに、
　こんなに静かなんだね」

黒猫は
答える。
「ここでは、
　人が一冊だから」

広場には
ベンチがいくつも置かれている。

誰かが座り、
誰かが隣に座る。

話してもいい。
話さなくてもいい。

それでも、
物語は
そこにある。

通りの角で、
青年が
空を見ている。

旅人が声をかける。
「何を考えてるの？」

青年は
少し迷ってから言う。
「うまく話せないこと」

黒猫は
静かに言う。
「話せない物語も、
　ちゃんとある」

この国では、
語られた物語と、
語られなかった物語が、
同じ重さで扱われる。

笑っている人にも、
怒っている人にも、
黙っている人にも、
それぞれの章がある。

誰も、
一ページだけで
判断しない。

旅人は
通りを見渡す。

あの人は、
きっと
長い夜を越えてきた。

あの人は、
今まさに
始まりの途中かもしれない。

でも、
確かめない。

想像する。

黒猫は
歩きながら言う。
「物語があると知るだけで、
　乱暴にならなくなる」

夕方、
青年は
小さく話し始める。

全部ではない。
ほんの一場面だけ。

旅人は
うなずくだけ。

それで、
十分だった。

国を出るころ、
空は群青に染まっている。

旅人は
振り返る。

すれ違った人々の背中が、
静かに光っている。

黒猫は
やわらかく言う。
「人を理解するのに、
　一冊で足りることはない」

「でも、
　一行あれば、
　優しくなれる」

旅人は
うなずく。

沢山の物語の中で、
自分もまた、
一冊であることを
感じながら。

そして、
また
誰かの隣を
静かに歩いていく。`},
  {num:299,title:"『自分の好きを探す国』",body:`その国では、
「何ができるか」より先に、
「何が好きか」を聞かれる。

得意じゃなくていい。
役に立たなくてもいい。

ただ、
好きかどうか。

街の入口には
小さな掲示板がある。

《あなたの“好き”は、
　まだ言葉にならなくていい》

旅人は
少し立ち止まる。
「好きって、
　こんなに曖昧だったかな」

黒猫は
静かに言う。
「曖昧なまま
　持っていていいものだよ」

広場では、
人々が
思い思いのことをしている。

誰かは
古いラジオを分解している。
誰かは
同じ映画を三度も観ている。
誰かは
ただ、
石の手触りを確かめている。

評価はない。
順位もない。

通りの端で、
青年が
棚の前に立っていた。

棚には、
色も形も違う
小さな箱が並んでいる。

旅人が聞く。
「何を選ぶの？」

青年は
首をかしげる。
「分からない」

箱のひとつに
そっと触れる。
「昔、好きだった気がする」

黒猫は
近づいて言う。
「“気がする”で
　十分だよ」

青年は
箱を開ける。

中には、
子どもの頃に描いた
拙い絵。

うまくはない。
けれど、
線は迷いなく
のびのびしている。

青年は
小さく笑う。
「これ、
　楽しかった」

旅人は
胸の奥が
少し温かくなる。

この国では、
好きは
成果に変換されない。

好きは、
ただ
好きのまま
置いておかれる。

黒猫は
ゆっくり言う。
「好きはね、
　自分の輪郭だよ」

「見失っても、
　消えない」

夕方、
青年は
絵を持って帰る。

何かを始めるわけでもない。
宣言もしない。

でも、
その手は
少しだけ
迷いが減っている。

旅人は
黒猫に言う。
「好きって、
　探すものなんだね」

黒猫は
やわらかく答える。
「思い出すものだよ」

国を出るとき、
旅人は
自分の胸に
問いかける。

何ができるか、ではなく。
何が好きか。

すぐに答えは出ない。

それでも、
探してもいいと
知っただけで、
少しだけ
足取りが軽くなる。

黒猫は
隣で言う。
「好きがある人は、
　静かに強い」

旅人は
うなずく。

自分の輪郭を
取り戻すように、
また
歩き出す。`},
  {num:298,title:"『春と共に歩む国』",body:`その国では、
季節を追いかけない。

春が来たら、
春の速さで歩く。

花が咲くより
少し遅れてもいい。
つぼみのままでもいい。

街の入口には
こんな言葉がある。

《咲くことを急がない》

旅人は
やわらかな風を受けて
目を細める。

道端では、
誰かが立ち止まって
桜を見上げている。

満開ではない。
まだ、
ところどころ。

それでも、
人は足を止める。

黒猫は
ゆっくり言う。
「春は、
　一斉に始まらない」

「気づいた人から、
　始まる」

通りで、
青年が
新しい靴を履いている。

けれど、
歩き出さない。

旅人が聞く。
「まだ寒い？」

青年は
首を振る。
「ううん」

少し考えて、
続ける。
「前の国では、
　春＝スタートだった」

「ここでは、
　準備でもいいらしい」

黒猫は
足元の草を見つめる。
「芽は、
　地面の下でも
　春なんだ」

その国では、
芽吹きも、
伸び悩みも、
同じ春として扱われる。

誰かが
新しいことを始める日もあれば、
何も決めずに
空を見上げる日もある。

どちらも
“春の行為”。

夕暮れ、
青年は
一歩だけ歩く。

走らない。
宣言もしない。

ただ、
春の空気を吸って
一歩。

旅人は
黒猫に言う。
「春って、
　変わらなきゃいけない季節だと
　思ってた」

黒猫は
やわらかく答える。
「春は、
　変わる許可が出る季節」

「変わらなくても、
　責められない季節」

夜、
まだ冷たい風の中に
少しだけ
ぬくもりが混ざる。

国を出るとき、
旅人は
振り返る。

花は、
まだ途中。

それでも、
十分に
春だった。

黒猫は
静かに言う。
「春と歩くってね」

「咲くことより、
　息を合わせることだよ」

旅人は
うなずき、
春の速さで
また歩き出す。`},
  {num:297,title:"『進まなかった日も旅の国』",body:`その国の地図には、
白い余白が多かった。

道が描かれていない場所。
足跡のない場所。
印のついていない日。

旅人は
地図を見て、
少し戸惑う。
「これじゃ、
　どこを歩いたのか
　分からない」

黒猫は
静かに答える。
「歩かなかった日も、
　載せてあるんだよ」

その国では、
“何もしなかった日”も
一日として数えられる。

宿の壁には、
不思議なカレンダーが掛かっている。

丸がついている日もあれば、
何も書かれていない日もある。

でも、
どの日も
同じ大きさだ。

通りで、
青年が
石段に座っている。

靴は脱いで、
鞄も閉じたまま。

旅人が聞く。
「今日は、
　歩かなかったの？」

青年は
うなずく。
「うん」

少し黙ってから、
小さく言う。
「でも、
　戻らなかった」

黒猫の耳が、
ぴくりと動く。

青年は続ける。
「前の国では、
　進まない日は
　“後退”だった」

「ここでは、
　ただの
　一日」

空は、
ゆっくり色を変える。

誰も急かさない。
誰も比べない。

旅人は
自分の足を見つめる。

今日は、
遠くへは行かなかった。

でも、
ここにいる。

黒猫は
そっと言う。
「旅は、
　距離だけじゃない」

「立ち止まった日も、
　道の一部」

夜になると、
宿の灯りがともる。

青年は
石段から立ち上がる。

一歩も進んでいない。
それでも、
どこか
少しだけ
整った顔をしている。

旅人は
黒猫に言う。
「進まなかったのに、
　ちゃんと旅なんだね」

黒猫は
やわらかく答える。
「進めなかった日を
　捨てない人は、
　遠くまで行ける」

国を出るとき、
旅人は
地図の余白を
指でなぞる。

何も書かれていない場所。

でも、
そこにも
確かに
自分の時間がある。

今日は進まなかった。

それでも、
旅は
続いている。

そう知りながら、
旅人は
静かに歩き出す。`},
  {num:296,title:"『共存する国』",body:`その国では、
猫と人間が
同じ速さで暮らしていた。

どちらが上でも、
どちらが下でもない。

ただ、
同じ場所で
生きている。

屋根の上には猫がいて、
窓の内側には人がいる。

でも、
境界は
ゆるやかだ。

旅人が
街に入ると、
まず気づくのは
静けさだった。

無理に触らない。
無理に呼ばない。
無理に理解しようとしない。

黒猫は
街の空気を吸い込み、
小さく言う。
「ここは、
　近づきすぎない優しさを
　知ってる」

広場では、
人が本を読んでいる。

その足元で、
猫が眠っている。

人は、
撫でない。

猫は、
逃げない。

ただ、
一緒にいる。

通りの角で、
青年が
座っていた。

少し疲れた顔で、
空を見ている。

その隣に、
知らない猫が
静かに座る。

青年は
何も言わない。
猫も、
何もしない。

旅人が
小さく聞く。
「知ってる猫？」

青年は
首を振る。
「たぶん、
　知らない」

少し間を置いて、
続ける。
「でも、
　今は、
　それでいい」

黒猫は
静かに言う。
「分かり合うことより、
　一緒にいられることを
　選んだ国」

この国では、
役割も、
期待も、
押しつけない。

人は人のまま。
猫は猫のまま。

それでも、
暮らしは
重なっていく。

夕方。
青年は
少しだけ背筋を伸ばす。

猫は
先に立ち上がり、
どこかへ行く。

青年は
引き止めない。

それでも、
寂しそうではない。

旅人は
黒猫に聞く。
「ずっと一緒じゃなくて、
　いいの？」

黒猫は
やわらかく答える。
「一緒にいられた時間が、
　本物ならね」

夜。
窓の灯りと、
屋根の影が、
同じ街をつくる。

国を出るとき、
旅人は
振り返る。

人の気配と、
猫の気配が、
同じ場所に
静かにある。

黒猫は
歩きながら言う。
「共存って、
　混ざることじゃない」

「隣にいられることだよ」

旅人は
うなずく。

違うままでも、
同じ世界を
生きていけると
知りながら。`},
  {num:295,title:"『少しだけでもいい国』",body:`―――

その国の看板には、
大きな字で
こう書かれていた。

《少しだけでも、いい》

その下に、
小さな字。

《やらないより、
　少しだけでも》

旅人は
少し笑う。
「優しい国だね」

黒猫は
通りを見ながら言う。
「続けられる国だよ」

街を歩くと、
人々は
何かをしている。

でも、
どれも
“少しだけ”。

本屋の前では、
一人の人が
立ったまま
本を一ページだけ読む。

掃除をしている人は、
床の一角だけを
きれいにする。

手紙を書いている人は、
一文だけ書いて
封筒を閉じる。

それで、
終わりにする。

通りの端で、
青年が
机に向かっていた。

ノートは開いている。
ペンも持っている。

でも、
書いたのは
一行だけ。

旅人が
声をかける。
「それで、
　終わり？」

青年は
少し恥ずかしそうに笑う。
「うん」

「前は、
　ちゃんとやろうとして
　何もできなかった」

ノートを
指でなぞる。
「一行なら、
　続けられる」

黒猫は
静かに言う。
「少しだけは、
　途切れない」

広場では、
誰かが
花に水をやっている。

全部じゃない。
一株だけ。

でも、
次の日には
別の誰かが
別の株に水をやる。

街は、
少しずつ
整っていく。

旅人は
胸の奥が
少し軽くなるのを感じる。

「全部じゃなくても、
　いいんだね」

黒猫は
うなずく。
「全部やろうとして、
　止まるより」

「少しだけやって、
　明日に残すほうが
　遠くまで行ける」

夕方。
青年は
ノートを閉じる。

それ以上、
書かない。

それでも、
その一行は
確かに
“できたこと”として
残る。

国を出るとき、
旅人は
小さく息を吐く。

今日は、
何かを
少しだけやってみよう。

黒猫は
歩きながら言う。
「少しだけは、
　小さくない」

「続いたとき、
　道になる」

旅人は
うなずき、
一歩だけ
前に進む。

それでも、
十分だと
知りながら。`},
  {num:294,title:"『急がない朝の国』",body:`その国の朝は、
始まる音がしない。

目覚ましの音も、
始業の鐘も、
通勤を急がせる足音もない。

ただ、
少しずつ
光が増えていく。

旅人は
最初、
時間を確かめる。

遅れていないか。
何かに間に合わないんじゃないか。

けれど、
街は
いつも通り動いている。

パン屋は、
人が来たら開ける。

店は、
店主が
「今日は大丈夫」と思えたら
灯りをつける。

黒猫は
ゆっくり伸びをして言う。
「朝は、
　追いかけるものじゃない」

「迎えるものだよ」

通りの角で、
青年が
ベンチに座っていた。

靴は履いている。
鞄も持っている。
でも、
まだ立たない。

旅人が
声をかける。
「行かなくていいの？」

青年は
空を見ながら答える。
「行くよ」

「でも、
　体が
　朝になってから」

少し黙って、
続ける。
「前の国では、
　頭が起きたら
　体も起きてることにされてた」

黒猫は
静かに言う。
「朝は、
　人によって
　来る時間が違う」

近くの家の窓が、
ひとつ開く。

少し遅れて、
別の家のカーテンが
動く。

この国では、
朝は
一斉に始まらない。

重なりながら、
広がっていく。

旅人は
深く息を吸う。

焦りが、
少しだけ
ほどける。

青年は
やがて立ち上がる。

急がない。
でも、
止まらない。

一歩だけ、
前へ。

旅人は
黒猫に小さく言う。
「これでも、
　一日って始まるんだね」

黒猫は
やわらかく答える。
「始めようとした瞬間が、
　その人の朝だよ」

国を出るころ、
太陽は
すっかり高くなっている。

それでも、
遅れた感じはしない。

旅人は
歩きながら思う。

急がなくても、
一日は
ちゃんと始まる。

黒猫は
隣で言う。
「急がない朝は、
　弱い朝じゃない」

「壊れにくい朝だよ」

旅人は
少しだけ
ゆっくり歩く。

その速さでも、
今日が
ちゃんと始まっていると
知りながら。`},
  {num:293,title:"『誰かの続きから始める国』",body:`その国の図書館には、
完成した本が
ほとんど置かれていなかった。

代わりに、
途中までの本が
並んでいる。

しおりが挟まれたまま。
余白が残ったまま。
章の途中で
終わったまま。

入口の札には、
こう書かれている。

《ここから読んでもいい》

旅人は
棚を見渡す。
「終わってない本ばかりだ」

黒猫は
一冊を
静かに押し出す。
「終わってないから、
　始められる」

この国では、
何かを始めるとき、
最初からやらなくていい。

誰かが途中で
休んだ場所から、
続けてもいい。

街を歩くと、
店も、
仕事も、
会話も、
どこか
“途中から”始まる。

通りの窓辺で、
青年が
ノートを開いていた。

最初のページは、
空白。

途中のページから、
文字が並んでいる。

旅人が
声をかける。
「最初、書かないの？」

青年は
首を振る。
「前に、書こうとして
　止まった」

「最初からやり直そうとして、
　何度も
　止まった」

ノートの途中を
指でなぞる。

「ここからなら、
　続けられる気がした」

黒猫は
静かに言う。
「始め直すのは、
　体力がいる」

「続けるのは、
　呼吸に近い」

午後。
広場では、
誰かの作りかけのものを
別の誰かが
少しだけ進めている。

完成させなくてもいい。
壊さなければいい。

旅人は
小さくつぶやく。
「自分の物語なのに、
　途中からでもいいのかな」

黒猫は
やわらかく答える。
「止まっていた時間も、
　物語の中だからね」

夕方。
青年は
ノートに
一行だけ書く。

それだけで、
閉じる。

誰も
少ないとは言わない。

国を出るとき、
旅人は
ふと思う。

全部やり直さなくても、
いいのかもしれない。

黒猫は
歩きながら言う。
「リスタートじゃない」

「再開でいい」

旅人は
小さくうなずく。

物語は、
最初からじゃなくても、
ちゃんと
続いていくのだと知りながら。`},
  {num:292,title:"『歩幅を決めなくていい国』",body:`その国の道には、
線が引かれていなかった。

等間隔の石も、
歩調をそろえる印もない。

ただ、
まっすぐな道と、
少し曲がった道があるだけ。

旅人は
少し歩いてから気づく。

前を歩く人は、
かなり速い。

後ろの人は、
ほとんど進んでいない。

道の端では、
座って空を見ている人もいる。

「……バラバラだね」

旅人が言うと、
黒猫は静かに答える。
「合わせなくていいからね」

この国では、
歩幅も、
速度も、
決められていない。

“続ける”ことは、
同じ速さで進むことじゃない。

止まっても、
遅くても、
戻ってもいい。

通りの途中で、
青年が
道の端に座っていた。

靴を脱いで、
足をさすっている。

旅人が
声をかける。
「疲れた？」

青年は
少し笑う。
「うん」

「前の国で、
　速く歩きすぎて」

少し間を置いて、
続ける。
「ここに来て、
　初めて座った」

旅人は
隣に立つ。
「大丈夫？」

青年は
空を見上げたまま言う。
「大丈夫」

「座っても、
　置いていかれないから」

黒猫は
青年の近くに座る。
「歩くって、
　連続じゃなくていい」

「点でもいい」

しばらく、
三人は何も言わない。

風だけが、
静かに通り過ぎる。

やがて、
青年は立ち上がる。

一歩、
だけ進む。

次の一歩は、
すぐには出さない。

それでも、
誰も
急かさない。

旅人は
黒猫に小さく言う。
「これでも、
　続いてるって言えるの？」

黒猫は
迷わず答える。
「やめてないなら、
　続いてる」

夕方。
道には、
いろんな歩き方が
混ざっている。

速い人。
遅い人。
止まる人。
また歩き出す人。

どれも、
この国では
“同じ道の上”だ。

国を出るとき、
旅人は
少しだけ
歩く速さを落とす。

速く進むより、
続けられる速さを
選ぶ。

黒猫は
隣で言う。
「続くことは、
　強さじゃない」

「続けられる形を、
　見つけることだよ」

旅人は
その言葉を胸に、
自分の歩幅のまま、
歩いていった。`},
  {num:291,title:"『昨日より軽い荷物の国』",body:`その国の入口には、
小さな棚があった。

大きな倉庫ではない。
たくさん置く場所でもない。

ただ、
手の届く高さに、
一段だけ。

横に、
短い言葉が書いてある。

《出発前に、ひとつだけ》

旅人は
自分の鞄を
開いてみる。

服。
水。
地図。
小さな思い出。

どれも、
必要そうに見える。

「……何を置けばいいの？」

黒猫は
棚を見ながら言う。
「全部じゃなくていい」

「ひとつだけ」

街の人たちは、
出発の前に
少しだけ
立ち止まる。

考え込む人もいれば、
すぐに置く人もいる。

通りの端で、
青年が
小さな紙を
握っていた。

旅人が
声をかける。
「置くの？」

青年は
少し迷ってから言う。
「昨日、
　できなかったこと」

「持ってると、
　今日も重くなる気がして」

青年は
紙を棚に置く。

深呼吸をする。

それだけで、
背中が
少しだけ伸びる。

旅人は
自分の鞄を
もう一度見る。

そして、
ポケットから
小さなメモを出す。

そこには、
短く書いてある。

《ちゃんとできなかった》

旅人は
しばらく
それを見つめる。

黒猫は
何も言わない。

急かさない。

旅人は
ゆっくり
棚に置く。

置いた瞬間、
何かが
消えるわけではない。

でも、
握りしめなくて
よくなる。

旅人は
小さく言う。
「忘れていいのかな」

黒猫は
やわらかく答える。
「忘れなくていい」

「今日は、
　持たなくていいだけ」

街の空気は、
少し軽い。

誰も、
空っぽではない。

でも、
昨日より
ひとつだけ軽い。

国を出るとき、
旅人は
何度も
振り返らない。

置いたものが
消えるわけじゃないと
知っているから。

黒猫は
歩きながら言う。
「軽くなるって、
　減ることじゃない」

「持つ日を、
　選べることだよ」

旅人は
うなずく。

その日、
旅人が置いてきたのは――

昨日の、
「ちゃんとできなかった自分」を
責め続ける重さだった。`},
  {num:290,title:"『戻れる前提の国』",body:`その国の門には、
地図が貼られていた。

珍しいことに、
行き先よりも
戻り道のほうが
太く描かれている。

旅人は
思わず聞く。
「逃げ道？」

黒猫は
首を振る。
「帰り道」

街の人たちは、
出かけるとき、
大きな覚悟を持たない。

靴を履いて、
少し遠くまで歩く。

ただ、
それだけ。

広場の端で、
青年が
小さな鞄を持って
立っている。

何度も、
門の外を見ている。

旅人が
声をかける。
「出かけるの？」

青年は
うなずく。
「……たぶん」

「でも、
　行ききれるか
　分からなくて」

黒猫は
門の地図を見る。
「戻ってきても、
　いい」

青年は
苦笑する。
「そんなの、
　当たり前じゃないの？」

黒猫は
静かに答える。
「当たり前じゃない場所で、
　疲れた人が
　ここに来る」

この国では、
出発は
“挑戦”ではない。

“散歩”だ。
