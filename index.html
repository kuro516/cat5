  {num:230,title:"『はじめから信じない国』",body:`その国では、人と人のあいだに、見えない線が引かれていた。
近づきすぎないための線。
期待しすぎないための線。
そして、裏切られないための線。

人々は挨拶を交わすが、目は合わせない。
言葉は丁寧だが、心は置いてこない。
信じないことが、礼儀になっていた。

黒猫が低く言う。

「ここではね、
　信じないことが、身を守る知恵なんだ。」

◆

旅人は、街角の喫茶店に入った。
席は空いているのに、
人々は一席ずつ間を空けて座っている。

隣に座ろうとすると、
女性が小さく身を引いた。

「ごめんなさい。
　悪意があるとは思っていません。」

彼女は急いで言葉を足す。

「でも、
　善意があるとも思えないだけです。」

旅人は言葉に詰まった。

その考えは冷たいが、
どこか誠実でもあった。

◆

広場には、白と黒の石畳が敷かれていた。
白は「信じられる」。
黒は「信じられない」。

人々は踏み外さないように、
慎重に歩いている。

旅人は気づく。
この国では、
人も出来事も、
最初から色分けされている。

黒猫が言った。

「白黒に分けると、
　迷わなくてすむ。
　でもね……」

◆

青年が石畳の端で立ち尽くしていた。
足元には、白と黒の境目がある。

「踏み出せないんです。」

青年は呟いた。

「白だと信じすぎてしまう。
　黒だと、最初から拒んでしまう。」

青年の胸の中では、
期待と恐れが同時に揺れていた。
どちらも正しく、どちらも苦しい。

旅人は青年の隣に立つ。

「灰色は、ないの？」

青年は首を振った。

「この国では、
　“どちらでもない”は、
　無責任だと言われます。」

黒猫が一歩、境目に足を置いた。

◆

黒猫の足元で、
白と黒が、ゆっくりと混ざり始めた。

「信じるってね、
　賭けることじゃない。」

黒猫は静かに言う。

「少しだけ預けること。」

◆

旅人は、
白の石に片足を、
黒の石に片足を置いた。

不安は消えない。
裏切られた記憶も消えない。

それでも、
完全に切り捨てるより、
完全に委ねるより、
息がしやすかった。

◆

夜、街の灯りがともると、
石畳は色を失った。

白も黒も見えない。
ただの道になる。

人々は歩きやすそうに進んだ。

誰かの善意も、
誰かの無関心も、
すぐには判断できない。

それでよかった。

◆

国を出るとき、旅人は振り返った。
昼間よりも、
人々の距離が少し近い。

黒猫が言う。

「白黒をやめるとね、
　信じるかどうかじゃなくて、
　関わり続けるかどうかが残る。」

旅人はうなずいた。

信じる前に距離を取る癖は、
すぐには消えない。

それでも、
一歩だけ、
灰色の地面に立つことはできた。

それが、この国での
小さな変化だった。`},
  {num:229,title:"『弱さの名前をつける国』",body:`その国では、人々が小さな札を胸に下げて歩いていた。
札には文字が書かれている。
「怖れ」「焦り」「自信のなさ」「期待しすぎ」「諦めぐせ」。

どれも、完璧な言葉ではなかった。
少し歪で、少し照れくさい名前ばかりだ。

◆

旅人は、広場で立ち尽くす青年に出会った。
青年の胸の札には、
「よくわからない不安」と書かれている。

「変な名前でしょう。」

青年は苦笑いした。

「前は、胸の中がぐちゃぐちゃで、
　何が怖いのかも分からなかった。
　でも、名前をつけたら、
　“ああ、君か”って思えるようになった。」

旅人は札を見つめた。

「それで、楽になった？」

青年は少し考えた。

「消えたわけじゃない。
　でも、話しかけられる。」

◆

細い路地では、年配の女性がベンチに座っていた。
札には「置いていかれる感じ」と書かれている。

「昔は、“弱い自分”ってまとめて嫌ってた。」

女性は言う。

「でも、名前をつけたらね、
　今日はこの人が前に出てきてるな、って分かる。
　無理に元気なふりをしなくて済む。」

黒猫は足元に座り、
札を見上げて静かに言った。

「名前は、
　閉じ込めるためじゃなくて、
　距離を取るためにある。」

◆

市場では、札を付け替える人がいた。
「失敗が怖い」を外し、
「期待に応えすぎ」を付ける。

旅人は尋ねた。

「変えていいんですか？」

その人はうなずいた。

「弱さは、日替わりだから。」

◆

夕方、旅人は自分の胸元を見た。
そこには、何も下がっていない。

けれど、何もないわけじゃない。
言葉になる前の、
ざわざわした感覚が確かにあった。

黒猫が旅人を見上げる。

「つけてみる？」

旅人は小さく息を吐いた。

「……『比べすぎ』かな。」

黒猫は首を傾げる。

「悪くない。」

旅人は札を下げて歩き出した。
すると、不思議なことに、
足取りが少し軽くなった。

◆

夜、国の端で、人々は札を外して休む。
弱さは、眠る前には静かに棚に置かれる。

旅人は思った。
弱さは、消すものでも、
克服するものでもない。

名前を呼んで、
一緒に暮らすものなのだと。

◆

旅立つとき、旅人は札を置いていった。
持って帰らなかった。

黒猫が言う。

「名前をつけられた弱さは、
　もう君を支配しない。」

旅人はうなずいた。

胸の奥には、
曖昧な不安がまだあった。

でもそれは、
手の届く距離にある、
小さな存在になっていた。`},
  {num:228,title:"『比べられる国』",body:`その国では、人々の足元に二つの影があった。
一つは、太陽がつくる普通の影。
もう一つは、少し遅れて動く、濃い影だった。

旅人は気づく。
人が立ち止まっても、その影は止まらない。
誰かを見た瞬間、影は伸び、形を変え、
ときに本人よりも大きく膨らんだ。

黒猫が言った。

「ここはね、
　比べた瞬間に影が生まれる国だ。」

◆

通りを歩く青年は、何度も後ろを振り返っていた。
そこに誰かがいるわけではない。
彼自身の影が、常に少し後ろから迫ってくるだけだ。

影は、別の人の姿を映している。
同じ年頃の誰か。
同じ仕事をしている誰か。
もう少しうまく笑えている誰か。

青年の胸の内では、声が重なっていた。

――あの人はできている。
――自分は遅れている。
――このままでいいはずがない。

旅人が声をかけると、青年は苦笑した。

「比べたくないんです。
　でも、気づくと、もう影ができてる。」

黒猫は静かに言う。

「比べること自体は、
　悪いことじゃない。」

青年は目を見開いた。

「でも、こんなに苦しい。」

「苦しいのはね、
　影を“自分”だと思ってしまうから。」

◆

広場では、女性が鏡の前に立っていた。
鏡には彼女だけが映っている。
けれど、足元の影には、
何人もの“他人”が重なっている。

成功した友人。
認められている同僚。
幸せそうな誰か。

女性は唇を噛んだ。

「私は、何も足りてない。」

旅人は、彼女の声の震えに気づいた。
それは嫉妬よりも、
置いていかれる不安だった。

黒猫が影に向かって言う。

「君は、彼女を守ろうとしてるんだね。」

影は、わずかに揺れた。

「追いつけって言ってるんじゃない。
　置いていかれないように、
　必死で知らせてるだけ。」

女性の肩から、力が抜けた。

◆

夜、国の外れで、旅人は影の話を聞いた。
この国では、影を消そうとすると、
かえって大きくなるという。

比べないようにする。
気にしないふりをする。
見ないように目をそらす。

すると影は、背中に張りつき、
ささやきを強める。

――あの人は、もっと先にいる。
――君は、足りない。

黒猫は言った。

「影から逃げると、
　影は“正体不明の不安”になる。」

◆

旅人は、ひとつ試みをした。
影を踏みつけるのではなく、
振り返って、正面から見た。

影は、他人の姿をしていたが、
声は旅人自身のものだった。

――認められたい。
――遅れたくない。
――無価値だと思われたくない。

旅人は、ゆっくり言葉を選んだ。

「比べてるんじゃない。
　怖がっているだけだ。」

影は、その言葉で、少し輪郭を失った。

◆

黒猫が足元に寄り添う。

「影はね、
　君が何を大切にしているかを、
　歪んだ形で教えてくれる。」

「じゃあ、解放されるには？」

「影を消す必要はない。
　影より前に、自分が進めばいい。」

◆

翌朝、人々の影は消えていなかった。
けれど、影に引きずられて歩く人は減っていた。

影を連れて歩く人。
影と距離を保つ人。
影に向かって、時々声をかける人。

旅人は国を出る前、振り返った。

比べられる国は、
比較がなくなったわけではない。
ただ、人々が知ったのだ。

影は、
他人ではなく、
自分の不安が形になったものだということを。

黒猫は最後に言った。

「比べる苦しさから自由になるって、
　比べないことじゃない。」

旅人はうなずく。

「影に、人生の舵を渡さないこと。」

二人は歩き出した。
影はついてきたが、
もう、進む方向を決めることはなかった。`},
  {num:227,title:"『繰り返しの国』",body:`その国では、朝の鐘がいつも同じ音で鳴っていた。
同じ高さ、同じ間隔、同じ余韻。
旅人は三日目の朝、思わず空を見上げた。

昨日と、ほとんど変わらない空だった。

道を行く人々も、同じ時間に家を出て、
同じ角で立ち止まり、同じ店の前を通り過ぎる。
会話も、挨拶も、まるで前日と写し取ったようだった。

黒猫が言う。

「ここはね、
　変わっていないように見える国だ。」

◆

市場の端で、パンを焼く女性に旅人は話しかけた。

「毎日、同じことをしていて、飽きませんか？」

女性は一瞬、手を止めた。

「同じ、に見えるだけよ。」

彼女は焼き色の違うパンを並べる。

「今日は火が少し強かった。
　昨日より香りが立ってる。
　それに、今朝は少しだけ、気分が軽い。」

旅人はパンの匂いを吸い込んだ。
確かに、昨日とは違っていた。

◆

川辺では、少年が石を投げていた。
水面に跳ねる回数は、毎回ほとんど同じ。

旅人が尋ねる。

「また同じ遊び？」

少年はうなずいた。

「でも今日は、
　投げる前に深呼吸した。」

「それで何か変わる？」

少年は石が沈むのを見つめた。

「回数は同じ。
　でも、気持ちは違う。」

黒猫は小さく尻尾を振った。

◆

宿屋の主人は、帳簿をつけながら語った。

「ここでは、大きな変化は起きない。
　でも、起きないこと自体が、
　昨日とは少し違う意味を持つ。」

旅人は首をかしげる。

「どういう意味ですか？」

「昨日は“退屈”だった。
　今日は“続いている”と感じる。」

◆

夜、旅人は同じ宿の同じ部屋に泊まった。
同じ椅子、同じ窓、同じ月。

それでも、胸の奥には、
言葉にできない違和感があった。

黒猫が窓辺で言う。

「繰り返しってね、
　止まっていることじゃない。」

旅人は問い返す。

「じゃあ、何？」

「変化が小さすぎて、
　比べることをやめただけ。」

◆

翌朝、また鐘が鳴った。
同じ音だった。

けれど旅人は気づいた。
昨日よりも、その音が少し遠く感じる。

国を出るとき、旅人は振り返らなかった。
振り返らなくても、
自分が少し前に進んでいることが、わかったから。

黒猫は旅人の足元を歩きながら言った。

「続けることは、
　目に見えない一歩を、
　毎日置いていくことなんだ。」

その国では今日も、
同じ日が、少しだけ違う形で、始まっていた。`},
  {num:226,title:"『行動にやさしい国』",body:`その国では、転ぶ音がよく響いていた。
石につまずく音、足を滑らせる音、何かにぶつかる音。
けれど、誰もそれを笑わなかった。

旅人は不思議そうに辺りを見回した。

人々は歩きながら、走りながら、ときどき立ち止まりながら、
何度も挑戦していた。
歌う人、絵を描く人、知らない道へ踏み出す人。
失敗は、日常の一部として空気に溶けている。

黒猫が静かに言った。

「ここはね、
　行動にだけ、やさしい国だ。」

◆

広場の中央に、低い台があった。
表彰台のように見えたが、順位は書かれていない。

旅人が近くの女性に尋ねた。

「何の台？」

女性は少し考えてから答えた。

「挑戦した人が、いったん立つ場所。」

「成功した人じゃなくて？」

「ええ。
　成功した人は、また次へ行くから。」

彼女は笑った。

「ここは、“やってみた”を置いていく場所なの。」

◆

路地裏では、少年が紙飛行機を何度も投げていた。
風に乗らず、すぐに落ちる。

旅人が声をかける。

「うまく飛ばないね。」

少年は肩をすくめた。

「でも、今日はもう五回目。」

「それは、結果としては失敗じゃない？」

少年は首を振る。

「結果は、あとで勝手についてくる。
　今は、投げたって事実があるだけ。」

黒猫は小さく頷いた。

◆

夕方、旅人は年配の男性と話した。
男性は長い間、何かを始めようとして、やめてきたという。

「ここに来て、
　失敗してもいいって言われて、
　逆に怖くなったよ。」

旅人は黙って聞いていた。

「結果が出ないと、
　自分が何者でもない気がしてね。」

黒猫が言葉を差し出す。

「結果は、
　他人が測りやすい形だからね。」

男性は静かに息を吐いた。

「挑戦は？」

「挑戦は、
　自分だけが知っている変化だ。」

◆

夜、国の端で、小さな焚き火が灯った。
人々は一人ずつ、火のそばに座り、
今日やったことを短く語る。

「途中でやめました。」
「怖かったです。」
「一歩だけ進みました。」

拍手はない。
評価もない。
ただ、聞かれているという事実だけがあった。

旅人は気づく。
ここでは、挑戦は称えられるものではなく、
受け取られるものなのだと。

◆

旅立つ前、旅人は黒猫に尋ねた。

「大事なのは、挑戦すること？ それとも結果？」

黒猫は少し考えてから答えた。

「結果は、世界に残る。
　挑戦は、君に残る。」

旅人はその言葉を胸にしまった。

国を出るとき、また転ぶ音がした。
でも、その音は、
世界がまだ動いている証のように聞こえた。

旅人は足を止めずに歩いた。
結果が見えなくても、
一歩踏み出した感触が、確かにそこにあった。


『余白が足りない国』


その国に入った瞬間、旅人は息が詰まるような感覚を覚えた。
空はある。道もある。人も行き交っている。
けれど、どこにも“間”がなかった。

人々の歩幅は揃いすぎていて、立ち止まる者はいない。
会話は途切れず、沈黙は不安としてすぐに埋められる。
予定、配慮、心配事が、隙間なく重なっていた。

黒猫は小さく前足を止めた。

「ここはね、
　余白が怖くなった国だ。」

◆

広場には巨大な掲示板が立っていた。
今日の予定、明日の予定、誰かの気分、誰かの期待。
紙は何層にも貼り重なり、下の文字はもう読めない。

旅人は掲示板を見上げたまま言った。

「全部大事そうだね。」

近くにいた女性が、早口で答える。

「ええ、大事。
　忘れたらいけないし、遅れたら迷惑だし、
　考え続けていないと不安になる。」

彼女は笑おうとしたが、口角は少し引きつっていた。

「休む時間は？」

女性は一瞬、言葉に詰まった。

「……空いている時間はあるけど、
　何かを考えない時間は、ないわ。」

黒猫が静かに言った。

「それはね、
　余白じゃなくて空席だ。」

◆

細い路地では、青年が壁に背をつけて立っていた。
目は閉じているのに、眉は強く寄っている。

旅人が声をかけると、青年は答えた。

「何もしてないと、
　何か忘れてる気がして落ち着かないんです。」

「本当に忘れているのかな？」

青年は首を振る。

「わからない。
　でも、考えていないと、
　“怠けている”って自分に言われる。」

黒猫は青年の足元に座り、言った。

「余白はね、
　怠けじゃない。
　心が呼吸する場所なんだ。」

青年の肩が、ほんの少し下がった。

◆

旅人と黒猫は、国の中央に小さな空き地を見つけた。
誰も使っていないのに、誰も近づかない場所。

旅人はそこに腰を下ろした。
黒猫も隣に丸くなる。

最初、人々は不安そうに遠巻きに見ていた。

「何か始めるの？」
「次の予定は？」
「目的は？」

旅人は首を横に振った。

「何もしない。」

その言葉に、ざわめきが走った。

黒猫が付け加える。

「何もしない時間を、ここに置くだけ。」

◆

しばらくすると、子どもが一人、空き地に座った。
次に、年配の男性が立ち止まり、空を見上げた。
誰かが深呼吸をした。
誰かが、黙ったまま涙をこぼした。

その場には、説明も、結論もなかった。
ただ、沈黙があった。

旅人は気づいた。
沈黙は、空白ではない。
たくさんの感情が、言葉になる前に休んでいる場所だ。

◆

日が傾くころ、掲示板の紙が一枚、風で剥がれ落ちた。
誰も拾わなかった。

黒猫は言った。

「余白は、奪い返すものじゃない。
　許すものなんだ。」

旅人はうなずいた。

「自分に、何も考えなくていい時間を。」

◆

国を出るとき、旅人は振り返った。
人々はまだ忙しそうだったが、
歩幅の中に、わずかな“揺れ”が生まれていた。

止まる人がいる。
黙る人がいる。
何も生まれない時間を、大切そうに抱える人がいる。

黒猫が静かに言う。

「余白ができるとね、
　世界は少し、入り込めるようになる。」

旅人は深く息を吸った。
胸の中に、言葉にならない静けさが広がっていた。

それは不安ではなく、
次の一歩が生まれる前の、
やさしい“間”だった。`},
  {num:225,title:"『期待を手放す国』",body:`その国に入ったとき、旅人は最初、音が減ったように感じた。
人の声も、足音もある。けれど、胸の奥を圧すような“ざわめき”がない。

黒猫は一度、立ち止まって耳を澄ませた。

「ここはね、
　期待が重さを失う国なんだ。」

旅人は不思議そうに周囲を見回した。
人々は歩いている。働いている。笑ってもいる。
だが、どこか肩の力が抜けている。

◆

広場の中央に、大きな秤が置かれていた。
皿の上には何も載っていない。

旅人が近くにいた女性に尋ねる。

「この秤は、何を量るんですか？」

女性は少し考えてから答えた。

「昔はね、“期待”を量っていたの。
　親の期待、周りの期待、自分で自分に向けた期待。」

旅人は秤を見つめた。

「今は？」

「もう、何も載らないわ。
　期待をここに置いていく人が、いなくなったから。」

黒猫が静かに言った。

「正確には、
　置いていってもいいって気づいたんだよ。」

◆

路地裏では、少年が壁に耳を当てていた。
旅人が声をかけると、少年は少し照れたように笑う。

「ここに来る前は、
　“こうなってほしい”って声が、ずっと聞こえてたんだ。」

「誰の声？」

「みんなの。
　先生の声、家族の声、
　それから……“ちゃんとしろ”っていう自分の声。」

少年は壁から離れ、胸に手を当てた。

「でも、この国ではね、
　期待が静かになると、
　別の声が聞こえてくるんだ。」

旅人は尋ねた。

「どんな声？」

少年は小さく答えた。

「……“どうしたい？”って声。」

黒猫の尾が、ゆっくり揺れた。

◆

川辺では、年配の男が紙船を流していた。
紙船には文字が書いてある。

ちゃんと成功する
失敗しない
期待に応える

旅人が見つめていると、男は言った。

「どれも悪い言葉じゃない。
　でもね、
　それを抱えたままじゃ、
　自分の足音が聞こえなくなってしまった。」

男は川を見つめる。

「期待を手放すって、
　何も目指さなくなることじゃない。
　誰の声で歩くかを選び直すことなんだ。」

旅人は、胸の奥で何かがほどけるのを感じた。

◆

夕暮れ、旅人と黒猫は丘に腰を下ろした。
風が静かに草を揺らす。

旅人は言った。

「期待がなくなると、
　空っぽになる気がしてた。」

黒猫は首を振る。

「逆だよ。
　期待が静かになると、
　自分の声が、やっと聞こえる。」

旅人は目を閉じた。
誰かの“こうあるべき”ではない、
小さく、頼りないけれど確かな声が、
胸の奥から聞こえた気がした。

◆

国を出る前、旅人は振り返った。

この国の人々は、
期待を捨てたわけではない。
期待に“縛られる必要はない”と知っただけだ。

黒猫が言う。

「期待を手放すって、
　自分を諦めることじゃない。」

旅人はうなずいた。

「……自分を引き受けること、なんだね。」

ふたりは歩き出す。
少し軽くなった足取りで。

その先で、
誰のものでもない“自分の声”が、
きっとまた聞こえてくると信じながら。`},
  {num:224,title:"『失ってから気づく国』",body:`旅人と黒猫がその国に足を踏み入れた瞬間、
ふたりは妙な静けさに包まれた。

街並みは穏やかで、
人々の表情はどこか“考えごとをしている顔”をしている。

黒猫が尻尾を揺らしながら言った。

「ここはね、
　“失ってから気づくもの”が集まってる国なんだよ。」

旅人は眉をひそめた。

「失う……？」

黒猫は頷いた。

「うん。でも、なくなったわけじゃない。
　ここに“集まっている”だけ。」

◆

広場には、不思議な展示が並んでいた。

・壊れたはずの“目覚まし時計の音”
・もう聞けないと思っていた“ただいまの声”
・昔あった“肩を叩く癖”の感触
・当たり前のようにあった“朝ごはんの匂い”

しかしどれも、物としてそこにあるわけではない。

旅人が近づくと、
まるで胸の奥で小さく鳴りだすように“思い出される”のだ。

旅人は立ち止まり、
小さな木箱に手を触れた。

するとほんの一瞬、
子どもの頃の“誰かに呼ばれた声”が耳元によみがえる。

旅人は息を呑んだ。

「……これ、もう戻らないと思ってた。」

黒猫はそっと言った。

「戻らないよ。でも、
　あったことを忘れないために、
　この国はこうやって残してるんだ。」

◆

路地裏では、老人がひとつの椅子を磨いていた。

旅人が声をかける。

「その椅子……誰かのものですか？」

老人はうなずいた。

「妻が座っていた椅子さ。
　彼女が亡くなって、急に部屋が広くなった。
　そんな単純なことにも気づかなかったよ。」

旅人は静かに耳を傾ける。

老人は続けた。

「いつもそこにあったぬくもりは、
　“当たり前”の顔をしてたからね。
　失って初めて……
　あれは“奇跡のような毎日”だったんだと気づいた。」

黒猫は小さく目を閉じた。

旅人は胸の奥がじんとするのを感じた。

◆

川沿いの道では、
少女が透明な瓶を流していた。

瓶の中には、
小さな紙切れのような光が揺れている。

旅人が尋ねる。

「それは何？」

少女は言った。

「“もう少しだけ一緒にいたい”って思った時間。
　ぜんぶ当たり前だと思って……
　そのまま流れていっちゃった時間。」

少女は瓶をそっと水に置いた。

「だから、こうして川に返すの。
　失くしたくなかったって、
　ちゃんと気づくために。」

旅人は胸の奥がざわついた。

──僕にも、
　当たり前だと思って見過ごしたものはあるだろうか。

◆

その夜、
旅人と黒猫は国の丘で休んだ。

星が静かに瞬いている。

旅人はぽつりと言った。

「僕……気づかないまま通りすぎた時間、
　たくさんあった気がする。」

黒猫は横に座り、尾をくるりと巻いた。

「誰だってそうだよ。
　でも、“気づいた”ってことは、
　その時間は無駄じゃなかったってこと。」

旅人は小さく笑った。

「失ってから気づくのは、
　ちょっと悲しいね。」

黒猫は言った。

「でもね……
　気づけるってことは、
　その人をちゃんと大切に思っていた証だよ。」

旅人の胸が、じんと温かくなった。

◆

国を離れる道すがら、
旅人はふと思った。

当たり前は、
いつも“奇跡のふり”をしているだけなのかもしれない。

黒猫が言った。

「今日気づいた当たり前は、
　明日を優しくしてくれるよ。」

旅人は深く息を吸い込み、
静かにうなずいて歩き出した。

ふたりの影が長く伸び、
その“当たり前”さえ、
今はとても愛おしく見えた。`},
  {num:223,title:"『ときどき弱くなる国』",body:`旅人と黒猫がその国に入った瞬間、
空気のやわらかさに驚いた。

町の人々はみな、肩の力を抜いて歩いている。
表情も、声の調子も、仕草も、どこか“ほどけて”いる。

旅人は思わず黒猫に尋ねた。

「ここ……なんだか安心してる人が多いね。」

黒猫はこともなげに言った。

「ここはね。
　“ときどき弱くなること”が当たり前の国なんだよ。」

◆

広場のベンチには、
仕事帰りの男がぐったり座り込んでいた。

男は旅人たちを見つけると、
苦笑しながら言った。

「今日はもう……だめだ。
　大人だけど、もう無理。」

その言葉を聞いた瞬間、
旅人は胸の奥がきゅっとした。

周囲の人々は、男に冷たい視線を向けない。
近くに座っていた女性が、
温かいお茶のカップを差し出しただけ。

「無理なら、無理でいいよ。
　今日は弱ってて当然の日でしょ。」

男は受け取りながら、ふっと息を吐いた。
その姿は、むしろ少し誇らしげにすら見えた。

黒猫が旅人の肩でつぶやく。

「ここではね、“強がり”こそ隠すものなんだよ。
　弱さを言えるほうが自然だから。」

旅人は思った。

──こんな場所、僕の世界にはなかった。

◆

町を歩くと、
いろんな“弱さ”が自然に見える。

涙をこらえずに泣いている人。
「今日は何もできない」と言って横になっている人。
緊張して震えている手を、
隣の人がそっと握ってあげている光景。

どれも“特別”ではなく、
日常の一部としてそこにあった。

旅人は黒猫に問いかけた。

「弱さって……こんなに普通のものなんだね。」

黒猫は頷いた。

「うん。
　強さは“見せたいときだけ”で十分。
　でも弱さは、“見せなきゃ生きていけない時”がある。」

旅人は胸があたたかく、
そして少し重くなるのを感じた。

◆

町の片隅で、
ひとりの少女がひざを抱えて泣いていた。

旅人はそっと隣に座った。

「大丈夫？」

少女は涙をぬぐいながら言った。

「わたし……ずっと、しっかりしなきゃいけない人だったの。
　泣いたら迷惑をかけると思ってた。」

黒猫が少女の足元にすり寄る。

「じゃあ、もうしっかりしなくていいよ。
　泣くことは、生きることの一部だよ。」

少女は驚いたように目を見開いた。

旅人は、小さな声で続けた。

「僕もね、
　強がってばかりのときがあったよ。
　でも……弱さを出せる場所があると、
　呼吸がしやすくなる。」

少女は泣きながら笑った。

「……ここに来てよかった。」

◆

夜になると、
町ではひとつの習慣があった。

人々がそれぞれの家の前にランプを灯す。

その灯りは、
「今日、弱さを見せた人がいたよ」
という合図だった。

灯りが多いほど、
その日が豊かだったという証拠らしい。

旅人は驚いた。

「弱さが多いほど、いい日だったってことになるの……？」

黒猫は言った。

「その人が“そのままでいてくれた”っていう証だからね。
　本当の自分を隠さずにいられた日なんだよ。」

旅人はそっと空を見上げた。

「僕も……
　強くなろうとしすぎて、
　自分を見失ってたのかもしれない。」

黒猫は旅人の膝に乗る。

「君は弱いよ。
　でも、それでいいんだ。」

旅人は笑った。

「うん……それでいいんだね。」

◆

国を離れるとき、
旅人の胸にふっと温かさが広がった。

“弱くなること”は、
負けることでも、逃げることでもない。

自分という存在を、
ぎゅっと抱きしめなおす時間なのだ。

黒猫が言った。

「ときどき弱くなるっていうのはね、
　自分らしい生き方の始まりだよ。」

旅人は深く息を吸い込んだ。

力を入れるのでもなく、
抜きすぎるのでもない。

その中間にある
“ちょうどいい自分”を探しながら、
ふたりは次の国へ歩き出した。


『大切にしすぎる国』


旅人と黒猫がその国に入ったとき、
まず目に入ったのは──
町じゅうに並ぶ、奇妙な「箱」だった。

窓辺にも、道端にも、家の前にも。
どの箱も丁寧に布で包まれ、
埃ひとつついていない。

旅人が首をかしげる。

「これは……何を入れる箱なんだろう？」

黒猫はひとつの箱に鼻先を寄せて言った。

「“大切なもの”を保管する箱だよ。
　でも、この国ではね──
　大切にしすぎて、誰も触れられないものばかりが増えていくんだ。」

旅人は胸の奥がざわついた。

◆

町の中央に、小さな博物館があった。
入口にはこう刻まれている。

『壊したくないものの館』

中に入ると、
透明なケースに無数の品々が並んでいた。

擦り切れた本。
弦の張られていないバイオリン。
古い靴。
色あせた手紙。

旅人は思わずつぶやく。

「どれも、使われていない……。」

黒猫が小さく言う。

「ここでは、
　“壊れるくらいなら使わない”
　“失うくらいなら触れない”
　そうやって保管されたものが、この館に集まるんだ。」

旅人の足が止まった。

「でも……使われないままなら、
　本当に大切にしたことになるのかな。」

◆

館の奥で、ひとりの青年が椅子に座り、
ガラス越しにひとつのケースを見つめていた。

中にあるのは──
白いスケッチブック。

旅人が聞いた。

「絵を描くもの……だよね？」

青年は頷いた。

「昔、毎日描いていました。
　でも、ある日“大切な人”から言われたんです。
　『あなたの絵は宝物だから、汚さないでほしい』って。」

旅人は目を細めた。

「それで……描けなくなった？」

青年は苦笑した。

「ええ。
　“壊したくない”って気持ちが大きくなって。
　描けば紙は減るし、いつかボロボロになる。
　だから触れなくなったんです。」

黒猫が青年の足元でくるんと丸くなる。

「ねえ、それって本当に“守ってる”って言えるのかな。」

青年は息を飲んだ。

旅人は続けた。

「大切にしすぎて触れられなくなるなら……
　それはもう、大切なものじゃなくて“傷つけたくない恐怖”なんじゃないかな。」

青年は長い沈黙のあと、ぽつりと言った。

「……本当は、描きたかったんです。」

◆

館の裏庭で、旅人はひとつの看板を見つけた。

『使われたものだけが、物語を持つ』

その言葉を読んだとき、
旅人の胸の奥で何かがほどけた。

黒猫が静かに言う。

「守ることと、使うことは対立しないんだよ。
　使うからこそ守れるものもある。
　傷がつくから、思い出になるものもある。」

旅人は頷いた。

「壊れるのが怖いから触れないって……
　生きるのを怖がって動かないのと同じだね。」

◆

夕暮れ、青年がスケッチブックを抱えて走ってきた。

「……描いてみます。」

旅人は微笑んだ。

青年は地面に腰を下ろし、
白い紙を開き、
震える手で鉛筆を走らせた。

一筆目が紙に触れた瞬間、
紙に薄い傷がつく。

だがその傷は──
たしかに“生きている線”だった。

青年は涙ぐみながら言った。

「傷つけてしまった……。
　でも……嬉しい。」

黒猫が言った。

「“壊れるかもしれないもの”を使うのは、勇気なんだよ。
　そして、傷つくことを許した瞬間に、
　ものは初めて本当に誰かのものになる。」

青年は静かに頷いた。

◆

旅立つ前、旅人は道端の箱をそっと撫でた。

「僕も……大切にしすぎて触れられなくなったものが、
　たくさんあった気がする。」

黒猫が言う。

「だから、君にも“使ってほしいもの”があるんだよ。
　君の心も、旅も。
　傷つけながら育っていくものなんだ。」

旅人は空を見上げる。

「壊れるのを怖がるより、
　生きて触れて、使って、
　その痕が残るほうが──
　きっと、優しいんだね。」

黒猫は満足そうにしっぽを揺らした。

ふたりは、
“壊れることを許された世界”の方へ歩きだした。

静かに、けれど確かに。`},
  {num:222,title:"『理由のいらない国』",body:`旅人と黒猫がその国に足を踏み入れた瞬間、
旅人は思わず立ち止まった。

道の真ん中で踊っている人。
丘の上で空に向かって紙飛行機を飛ばし続ける老人。
川辺で靴だけ並べて裸足で歩く子ども。

黒猫が言った。

「ここではね……何をしても“理由”を求められないんだよ。」

旅人は目を瞬いた。

「どうして？」

黒猫は肩をすくめるように尻尾を揺らした。

「ほら、もう“理由を求めてる”。」

旅人は言葉を飲んだ。

◆

町を歩くと、あちらこちらで自由すぎる光景が広がっていた。

縁側でずっと空を眺める人。
ノートに丸だけを延々と描いている女性。
市場の真ん中で、ただ風を感じて目を閉じている少年。

旅人は不安になった。

「……なんだか、怖いな。
　理由のない行動って、落ち着かない。」

黒猫は旅人の足元をくるりと回る。

「理由がないって、“支えがない”ってことだからね。
　自由にも、支えがなくなる怖さがある。」

旅人は小さく息を吐いた。

「僕は……いつも理由に寄りかかってるんだな。」

◆

広場で、旅人と黒猫はひとりの少女に出会った。
少女は、風船をゆっくり膨らませたり萎ませたりして遊んでいる。

旅人が声をかけた。

「どうして風船を？」

少女は、少し考える素振りをしたが……

「わかんない。
　だって、理由はいらないもん。」

と、あっけらかんと言った。

旅人は戸惑った。

少女は風船を空に飛ばしながら言う。

「でもね。
　理由がいらない世界って、ちょっと不安でもあるんだよ。」

旅人は耳を傾ける。

少女は続けた。

「だって、“何かをやりたい気持ち”が、
　本物なのかどうかわからなくなるから。」

旅人は胸の奥がざわつくのを感じた。

黒猫が少女に問いかける。

「じゃあ、君はどうしてこの国に住んでるの？」

少女は風船を追いかけるように走りながら答えた。

「理由はないよ。
　でも……理由がないと、自分が何を大事にしてるかが浮き出てくるんだ。」

旅人はその言葉に、思わず足を止めた。

◆

夕暮れ、旅人は町外れの丘に座った。

黒猫は隣で静かに尻尾を揺らしている。

旅人は呟いた。

「何をしても理由を求められないって……
　自由みたいで、でも寂しいな。」

黒猫は横目で旅人を見た。

「理由ってね、
　“誰かに説明するため”だけじゃなくて、
　自分の心を繋ぎ止める縄みたいなものなんだよ。」

旅人は空を見上げる。

「じゃあ……理由のいらない国にいると、
　縄がほどけちゃうってこと？」

「うん。
　だから、この国の人たちはみんな不安なんだ。
　でも同時に、
　縄がほどけたからこそ“本当の自分”が見えることもある。」

旅人はしばらく黙り込んだあと、小さく笑った。

「僕は……“なぜ旅を続けてるのか”なんてずっと考えてたけど、
　もしかしたら理由なんて最初からいらなかったのかも。」

黒猫は旅人の足に頭を軽くこすりつけた。

「理由がなくても、君は歩けるよ。
　歩きたいと思う気持ちが、本物なら。」

◆

夜、国を出るころ。
旅人はふと、自分の胸が軽くなっているのに気づいた。

「なんだか……怖いけれど、悪くない気分だ。」

黒猫が言う。

「理由がないっていうのはね、
　“自分自身に責任が返ってくる”ってこと。
　だから自由で、不安なんだ。」

旅人は頷いた。

「でもその不安の中に、
　僕が本当に大切にしてるものが隠れてる気がする。」

黒猫は笑った。

「じゃあ、次はその気持ちを探しに行こうか。」

旅人と黒猫は、
理由のいらない夜道を
自分の足で静かに歩き出した。

理由はなくても、
その一歩だけは確かだった。`},
  {num:221,title:"『傷つく勇気の国』",body:`国に足を踏み入れた瞬間、旅人は気づいた。
人々がまるで、薄いガラスの中に閉じ込められたように
そろりそろりと歩いていた。

転ばないように。
ぶつからないように。
誰にも近づきすぎないように。

黒猫が小声でつぶやく。

「ここではね……傷つくことを恐れすぎて、誰も動けなくなったんだ。」

旅人は周りを見渡した。
市場では、商品に手を伸ばす人が途中で止まり、
言葉をかけようとした人が声を飲み込む。

「なんだか……息が詰まりそうだ。」

黒猫は静かに尻尾を振った。

「でもね、傷つくって本当は“怖いだけのもの”じゃないんだよ。」

◆

旅人たちは、町外れのベンチに座る若い女性に出会った。

彼女の周りの空気は、他の人よりずっと固く、
触れたら砕けてしまいそうだった。

旅人が声をかけると、
女性は驚いたように体を震わせた。

「ごめんなさい……近づかないで。
　誰かと関わると、また傷つけるかもしれないから。」

旅人は首を振る。

「誰かを傷つけたことがあるから、動けないの？」

女性はゆっくりと頷いた。

「私……人を傷つけたこともあるし、
　人から傷つけられたこともあります。
　もうどちらも怖くて……
　だったら“何もしない”方が安全だって……。」

黒猫がそっと近づき、
女性の足元で座った。

「ねえ。
　動かないでいると、たしかに傷つかない。
　でもね──同時に、誰とも出会えない。
　誰にも優しくなれない。
　誰にも優しくされない。」

女性は目を伏せた。

旅人は静かに続けた。

「傷つくのは、欠陥じゃないよ。
　“持っているからこそ、人に触れられる場所”なんだ。」

女性は顔を上げる。

「……触れられる場所？」

「うん。
　心が柔らかいから、ひっかかる。
　柔らかいもの同士だから、重なり合える。」

黒猫が言った。

「痛いのは、
　そこに“大切なもの”があった証だよ。」

◆

その夜、旅人と黒猫は
灯りのほとんどない小さな広場に辿りついた。

広場では、
人々の胸に小さなランタンがぶら下がっていた。

が……
ほとんどのランタンが、消えている。

旅人の隣で黒猫が言った。

「このランタンはね、
　“傷ついても誰かに近づいたとき”に灯るんだ。」

旅人は息を呑んだ。

「じゃあ……今は誰も近づいていない？」

黒猫は首を振る。

「近づきたいんだよ。
　本当はみんな。
　でもそのたびに、昔の傷が疼く。
　踏み出す足が、どうしてもすくむ。」

そのとき、
昼に会った女性が広場に姿を見せた。

旅人を見ると、
一瞬立ち止まった。

そして、深呼吸をひとつ──
恐る恐る、一歩だけ近づいた。

その瞬間、
女性の胸のランタンに、
ふっと小さな光が灯った。

「……あったかい。」

女性は驚いたように呟いた。

旅人も微笑む。

「傷つくのは、間違いじゃない。
　踏み出した証なんだね。」

◆

女性の光に気づいたのか、
町のあちこちで人々がそっと一歩ずつ動き始めた。

誰かに声をかける人。
誰かに近づく人。
誰かの手を取ろうとする人。

弱々しい一歩。
泣きそうな一歩。
震えながらの一歩。

でもそのすべてが、
静かな灯りへと変わっていく。

黒猫が旅人の肩に乗り、低く言った。

「傷つく勇気っていうのはね──
　“痛みを避けないこと”じゃなくて、
　大切なもののために歩く勇気のことなんだよ。」

旅人は空に揺れる灯りを見つめながら言った。

「きっと……
　僕もまだ、傷つくのが怖いままなんだろうな。」

黒猫は優しく答える。

「うん。君も。誰もが。
　でもね、怖いっていう気持ちの奥には、
　“まだ信じたいものがある”って証拠が隠れてる。」

広場の灯りが、
星空にそっと溶けていった。

◆

国を離れるとき、
旅人は自分の胸元を見下ろした。

そこにも、
ほんのりと小さな光が灯っていた。

黒猫が言った。

「傷つかない生き方より、
　傷ついても誰かに歩み寄ろうとした生き方の方が、
　きっと君を前に進めるよ。」

旅人は黒猫を抱き上げ、静かに頷いた。

「僕も……
　また一歩、踏み出してみるよ。」

ふたりは、
光のように弱く、
けれど確かな勇気とともに、
次の国へ歩き始めた。`},
  {num:220,title:"『孤独が暮らす国』",body:`旅人と黒猫がその国に足を踏み入れたとき、
町は静かで、どこか広すぎるように感じられた。

家々の隙間に、長い影がひとつずつ座っている。

黒猫が小さく呟いた。

「ここではね……孤独が、人と同じように暮らしているんだよ。」

旅人は歩みを止めた。

「人じゃなくて……孤独が？」

黒猫は頷く。

「うん。ここでは、どの人にも“つきそいの孤独”がいて、
　まるで友だちみたいに一緒に過ごしてる。」

◆

町の広場に、
ひとりの青年が腰かけていた。

青年の隣には、
影のようなものが寄り添っている。

旅人がそっと近づく。

青年は旅人に気づくと、
影に視線を向けた。

「……これが、僕の孤独です。」

影は、人の形をしているのに輪郭が曖昧で、
風が吹くたび少しだけ揺れた。

旅人は問いかけた。

「孤独と……話せるの？」

青年は小さく笑った。

「最初は話すなんて思わなかった。
　ただ重くて、苦しくて、いたくない存在だった。」

影は、青年の足元で静かに縮む。

「でもある日、気づいたんです。
　こいつは僕と一緒にいてくれた唯一の存在なんだって。」

旅人は黒猫と目を合わせた。

黒猫が静かに言う。

「孤独はね、誰かを閉じ込めるためにいるんじゃない。
　心が“痛みを抱えたまま倒れないように”
　寄り添ってくれる影なんだよ。」

青年は影に手を伸ばした。
そして、自分で驚いたように笑った。

「触れることはできないけど……
　触れようとするだけで、少し軽くなるんです。」

◆

旅人と黒猫は、
さまざまな孤独たちに出会った。

泣きそうな人の隣で、静かに雨の匂いをまとっている孤独。

大勢の中にいる人のそばで、
薄く透けながらも離れない孤独。

まるで子どものように、
持ち主に抱きついている孤独。

それぞれが“ひとつの生き物”のようだった。

旅人はつぶやいた。

「孤独は……いつも人の後ろにいたんだね。
　ここでは、それがちゃんと見えるだけなんだ。」

黒猫が尻尾を揺らす。

「見えるからって、なくなるわけじゃない。
　でも、見えると仲良くなれるんだよ。」

◆

夕暮れ時、
町外れの丘にひとりの少女が座っていた。

少女の隣にも、静かな孤独がいた。

旅人が声をかけると、
少女はかすかに微笑んだ。

「みんな、孤独を怖がるけど……
　私は少しだけ、好きなんです。」

旅人は驚いて聞いた。

「どうして？」

少女は空を見上げながら答えた。

「だって孤独は、
　“本当の私”を一番知ってるから。」

黒猫は少女の孤独に近づき、
その影を静かに通り抜けた。

すると影が、ほんの少しだけ光を帯びたように見えた。

旅人が息を呑む。

少女は言った。

「寂しいのを全部消したいわけじゃないの。
　ただ、孤独が私を責めないでいてくれたら、
　それでいいんです。」

◆

夜、旅人と黒猫が国を離れようとしたとき、
旅人の背中にも影が寄り添っているのに気づいた。

黒猫が言う。

「ずっとそこにいたよ。
　気づいてなかっただけ。」

旅人は影をじっと見つめた。

その影は、
自分と同じ歩幅で、
自分と同じ方向を向いていた。

「……ついてきてくれるんだね。」

黒猫はやわらかく笑った。

「孤独はね、敵じゃなくて旅の相棒なんだよ。
　ひとりでいた時間の証だから。」

旅人は影に、小さくうなずいた。

「ありがとう。
　これからも一緒に歩こう。」

影は言葉を持たないけれど、
確かにうなずいたように見えた。

ふたりと一つの影は、
静かな夜道を進んでいく。

孤独は、
いつのまにか
“重荷”ではなく
“灯りのない場所を照らす小さな影”になっていた。`},
  {num:219,title:"『気づいてほしい国』",body:`この国に吹く風は、どこか不思議だった。
やさしいのに、どこか切なくて、
耳元を通ると一瞬だけ胸がきゅっとなる。

旅人は風にそっと触れながら言った。

「……この風、泣いてるみたいだ。」

黒猫は目を細めて、風の流れを読むように空を見上げた。

「ここではね、
　誰かに届かなかった気持ちが、ぜんぶ風になるんだよ。」

◆

町の道を歩いていると、
すれ違うたびに、ささやくような風が旅人の耳に触れた。

「ほんとは褒めたかった」
「ごめんねが言えなかった」
「気づいてほしかっただけなのに」

声ではない、
でも声のようなものが、
風の中でかすかに揺れていた。

旅人は思わず足を止めた。

「こんなにたくさん……？」
「うん、誰もが“届けたかった想い”を持ってるからね。」

黒猫は静かに、大きくしっぽを揺らした。

◆

広場に、小さな少女がひとり座っていた。
膝を抱えて、じっと風を見つめている。

旅人が声をかける。

「どうしたの？」

少女は風をすくうように手を伸ばし、
ひとつの風を胸に抱え込んだ。

「……お母さんに言いたかった言葉、
　風になってしまったの。」

旅人は隣にゆっくり腰を下ろした。

「言えばよかった、と？」

少女は首を振った。

「言えなかったんじゃなくて……
　言わなかったの。
　怖かったから。
　気づいてほしいって思ってる自分が、
　わがままに思えたから。」

黒猫がそっと近づき、
少女の手に鼻先を寄せた。

「気づいてほしいって、
　本当は“好き”の反対じゃない。
　好きの証だよ。」

少女は驚いたように黒猫を見た。

「わがままじゃないの？」

「わがままだよ。
　でも、愛ってだいたい少しはわがままなんだ。」

旅人は微笑みながら言った。

「だからこそ、
　人は誰かを求めるんだろうね。」

少女の目に、
少しだけ涙がたまった。

◆

町を歩くうちに、
旅人は至るところで“風”を見るようになった。

恋人に届かなかった言葉の風。
友人に誤解されたままの風。
家族に伝えそびれた優しさの風。

そのどれもが、
哀しいのに、どこか温かい。

旅人はふと黒猫に聞いた。

「ねえ……
　これって、誰かが気づいてあげたら、消えるの？」

黒猫は首をかしげた。

「消えるんじゃなくて、
　ほどけるんだよ。」

「ほどける？」

「誰かの心に触れた瞬間、
　風は“ただの空気”に戻る。
　その想いが、もう孤独じゃなくなるから。」

旅人は胸に手を当てた。

「じゃあ……僕が触れた風も、ほどけた？」

黒猫は旅人を見る。
その瞳は、いつになく柔らかい。

「うん。
　君はいつも、誰かの風に耳を澄ませるから。」

◆

夕暮れ時、
少女が旅人と黒猫のところへ走ってきた。

「ねえ、聞いて。
　お母さんに、“ありがとう”って言えたの。」

少女の周りの風は、
どれも暖かい色をしていた。

「そしたらね、
　お母さんも“ごめんね”って言ったの。
　風が……少しだけ静かになったよ。」

旅人は少女の頭に手を置いた。

「気づいてほしい気持ちは、
　ちゃんと誰かに届いたんだね。」

少女は照れくさそうに笑った。

「うん。
　でも……きっと、まだ風はたくさんあるんだと思う。」

黒猫は目を細めた。

「だから、風はずっと吹くんだよ。
　人が生きている限り。」

◆

夜、町を去るとき、
旅人の頬をひとつの風がかすめた。

「ありがとう、気づいてくれて。」

幻聴かもしれない。
けれど旅人は、小さく頷いた。

黒猫が言った。

「気づくって、誰かを救うことじゃない。
　ただ……孤独を少しだけ軽くするだけ。」

旅人は空を見上げる。

「でも、それだけで十分だよね。」

ふたりは風の吹く道を歩いていく。
背中を押すように、
引き止めるように──
優しい風がついてきた。

そして旅人はそっと呟く。

「僕も、誰かの風に気づける人でいたいな。」

黒猫は静かに頷いた。

「その気持ちがある限り、
　君はきっと大丈夫だよ。」

風がやわらかくふたりを包む。
それは、
“誰かの気づいてほしかった想い”が
温度を持った瞬間だった。`},
  {num:218,title:"『休むことを忘れた国』",body:`この国の朝は、異様なほど静かだった。
人々が眠っているわけではない。
ただ──誰も立ち止まらない。

家の前を通る人は皆、決まった速度で歩き続けている。
早歩きの人、ゆっくり歩く人はいるのに、
誰も速度を変えない。
変えてはいけない空気が町中に漂っていた。

旅人は眉をひそめた。

「……歩く音だけが聞こえる国だね。」

黒猫は旅人の足元を見上げる。

「たぶん、止まるのが“怖い”んだと思う。」

◆

広場に着くと、
大勢の人が円を描くように歩いていた。
ぐるり、ぐるりと、同じ速さで。

旅人が声をかけると、
ひとりの若い男が足を止めかけ──
すぐにまた歩き出した。

「止まっちゃだめなんだ。」
彼は視線を前に固定したまま言った。

「どうして？」と旅人。

「止まったら……置いていかれる。
　『頑張ってない人』だと思われる。
　そう思われると、みんな離れてしまうから。」

黒猫が旅人の肩に乗り、小さく耳を伏せた。

「置いていかれるのが怖いから、休めないんだね。」

男は頷く代わりに、歩幅を少し狭めた。
だが、隣の人の視線を感じると、
また元の速度に戻ってしまった。

◆

さらに町の奥へ行くと、
足を引きずるように歩く女性がいた。

足元には傷があり、
痛みに顔をゆがめながら、
それでも前へ前へと歩いていた。

旅人はそっと横に並ぶ。

「無理してるよ。」

女性は曖昧に笑った。

「わかってる。でも……みんな頑張ってるから。
　わたしだけ休むのは……怖い。」

黒猫が言った。

「みんなが頑張ってるから、
　あなたも苦しいまま歩くんだね。」

女性は少しだけ足を止めかけた。
だが隣を歩いていた男が、
怪訝そうな目でこちらを見た瞬間、
また歩き出した。

その目は責めているわけではない。
けれど──「止まるなよ」と言っているように見えた。

旅人は胸が締めつけられた。

◆

日が落ちるころ、
旅人と黒猫は丘の上に座って
町を見下ろしていた。

夜なのに、
人々はまだ歩いている。

「……誰も休んでない。」

黒猫は小さくため息をついた。

「休むって、
　自分の歩幅を思い出すことなのにね。」

旅人はその言葉に目を伏せる。

少しして、ぽつりと呟いた。

「僕もさ……
　どこかで“休んだら終わってしまう”気がして、
　無理に歩いてきたことが何度もある。」

黒猫は旅人の肩に額を寄せた。

「終わらないよ。
　止まったところからまた歩けばいいんだ。
　歩幅は、誰にも決められない。」

旅人はゆっくり息を吐き、
自分の手を胸の前でぎゅっと握った。

「……そうだね。」

◆

翌朝、旅人は町に戻った。

広場の真ん中に立つと、
ゆっくり──本当にゆっくり歩き出した。

見ている人がざわめく。

「遅い……」
「そんな歩き方、誰が許すの？」

それでも旅人は止めなかった。

黒猫も、旅人の隣を
のんびりした足取りで歩く。

最初は冷たい視線が突き刺さった。
だが、旅人が歩幅を変えないまま歩き続けるうちに、

ひとり、またひとりと、
歩く速さを緩める人が出てきた。

足を痛めていた女性は涙を浮かべながら、
初めて立ち止まった。

「……こんなに、痛かったんだ。」

若い男は、旅人の歩幅に合わせながらつぶやく。

「止まってもいいんだ……？」

旅人は微笑んだ。

「歩く速さは、
　誰かが決めるものじゃない。
　君の足が決めていいんだよ。」

◆

その日、
国に初めて“休む人”が生まれた。

誰も責めなかった。
責める余裕が、
もう誰にも残っていなかった。

やがて町は、
それぞれの歩幅でゆっくり流れ始めた。

早い人も、遅い人も、
途中で立ち止まる人もいる。

黒猫は旅人の横でしっぽを揺らした。

「これが、みんなのほんとうの歩き方だね。」

旅人は空を見上げた。

「うん。
　休むことを思い出したら、
　きっと前より遠くまで行ける。」

そしてふたりは、
静かに活気を取り戻した国をあとにした。

その背中は、
無理をしない“ちょうどいい歩幅”で進んでいた。`},
  {num:217,title:"『叶わない願いの国』",body:`この国は、風がほとんど吹かない。
町全体が、なにかをそっと包み込むように、静かに息をしていた。

道の両脇には、小さな家が並んでいる。
けれど、その家々には人は住んでいない。
代わりにそこにいるのは──叶わなかった願いたちだった。

旅人と黒猫は、薄い靄のかかった大通りをゆっくり歩いていた。

黒猫が首をかしげる。

「ここにいるのは、人じゃないんだね。」

「うん。」旅人は答える。「でも、たぶん誰より“人らしい”のかもしれない。」

◆

最初に出会ったのは、
玄関先で膝を抱えて座っている、
薄い光のような少女だった。

少女の胸には、しぼんだ花がひとつ抱えられている。

「何を待っているの？」旅人がしゃがんで声をかけた。

少女は、ゆっくり顔を上げた。

「……『もう一度だけ会いたい』って願い。
　もう叶わないってわかってるのに、
　それでも、待つのをやめられなかったの。」

旅人は胸が痛くなった。
黒猫は静かに少女の足元に寄り添い、尾をそっと当てた。

その瞬間、しぼんだ花がわずかに揺れた。

少女の願いは、旅人と黒猫を見つめ、
あたたかく微笑むと、ふわりと空気に溶けていった。

「ありがとう。」
声だけが残響のように耳に触れた。

◆

次に出会ったのは、薄い影の背中だった。
影はベンチに座り、膝の上に積み上げた紙切れを見つめている。

旅人はそっと覗き込んだ。
紙には「言えなかったごめんなさい」と書かれていた。

影はうつむいたまま呟く。

「遅すぎたんだ。
　ごめんって言うべき時を逃した。
　それからずっと、この紙が手放せなくなった。」

黒猫は、その紙の束にそっと前足を触れた。
紙はゆっくり光を帯び、ほどけるように消えていった。

影は旅人たちに頭を下げ、
どこか軽くなったような足取りで歩き去っていった。

◆

国の奥に行くほど、願いは静かになっていった。
誰かの胸からふり落ちた、
小さくて弱くて、でも確かだった願いたち。

祈りにもならず、言葉にもならず、
ただ「叶わなかった」というかたちのまま、
ここで暮らしている。

旅人は言った。

「叶わない願いって、どうして生まれるんだろう。」

黒猫は少し考えてから答えた。

「きっと……誰かを大切にしたことの証じゃないかな。
　大事に思ったから願ったんだよ。
　だから叶わなくても、その優しさは消えない。」

旅人は、胸が少し締めつけられながらも、
どこか救われるような気持ちで頷いた。

◆

国の出口に向かうとき、
ひとつだけ、旅人の足が止まった。

そこに、
旅人自身の叶わなかった願いが、
ひとりで座っていたからだ。

小さな男の子の姿をしていた。
まだ幼い影のようで、
でも旅人と同じ目をしていた。

「……君は。」

男の子は旅人を見上げ、ささやいた。

「いつか、家族みたいに笑い合える日が来るって……
　僕は、そう願っていたんだよ。」

旅人の喉が震えた。

黒猫がそっと旅人の足に身体を寄せた。

旅人はゆっくり息を吸い、
男の子に向かって膝をついた。

「……叶わなかったね。」

男の子は微笑んだ。

「うん。でもね、願ったから、君はここまで来られたんだよ。」

男の子は光となり、旅人の胸に静かに吸い込まれた。

まるで、
「失われた願いではなく、
　いまの自分を支える根っこなんだ」と
語りかけるように。

◆

国を出るとき、黒猫が囁いた。

「願いって、叶うかどうかより……
　その人が一度ちゃんと“望んだ”ってことが、
　本当はいちばん大事なのかもしれないね。」

旅人は空を見上げた。
胸の中に、あの男の子のぬくもりがまだ残っている。

「……うん。
　叶わなかった願いが、僕をここまで連れてきた。」

そしてふたりは、
やさしい喪失の国を後にし、
次の旅へと歩き出した。

静かな風が、初めてその国に流れた。`},
  {num:216,title:"『忘れられた優しさの国』",body:`旅人と黒猫が霧の坂を下ると、
不思議な町が姿を現した。

道には、
星のかけらのように淡く光る“落とし物”が
そこかしこに転がっている。

黒猫がひらりとそのひとつに近づいた。

「ここは“忘れられた優しさの国”。
　誰かが昔もらったのに、
　もう覚えていない小さな優しさが落ちている場所だよ。」

旅人はしゃがみ込み、
光の粒に触れてみた。

ふわりと、胸の奥が温かくなる。

──幼い日の雨の帰り道、
　知らない誰かが傘を半分差し出してくれた。
　名前も顔も覚えていない。

旅人は息をのんだ。

「……こんな優しさ、忘れていた。」

黒猫は旅人の足に寄り添う。

「忘れるのが悪いんじゃないよ。
　優しさは、覚えていなくてもちゃんと残るんだ。」

◆

町の中央には“優しさ拾得所”があった。
棚には光の粒が並び、
それぞれが誰かの人生のどこかで
静かに灯った瞬間だった。

案内人の老人が旅人たちに気づき、
ゆっくり微笑んだ。

「優しさはね、思い出されなくて当たり前なんだよ。
　でも、思い出されなくても人を守ってくれる。
　そういう働きをする。」

旅人は棚のひとつをそっと取り上げた。

触れた瞬間、淡い景色が胸に広がった。

──ある冬の朝。
　雪の日に、手袋をなくしてしまった少年の僕に、
　隣の席の子が片方の手袋を黙って差し出した。
　「両方はあげられないけど」と言いながら。
　その子の手は凍えるほど冷たかった。

旅人は息をのむ。

「……こんなこと、まるで覚えてなかったのに。」

黒猫が横で尻尾を揺らす。

「相手はたぶん、当たり前のつもりでやったんだよ。
　だからこそ、君の中に静かに沈んで、
　忘れられた優しさになった。」

旅人は光を胸の前に抱きしめるように包んだ。

◆

広場で、旅人はひとりの女性に出会った。
彼女は落ちている光を拾っては、
静かに両手で包んでいる。

「思い出せないんです」
女性は泣き笑いのような表情で言った。

「これが誰の優しさなのか、
　どんな場面だったのか、
　何も思い出せない。
　でも……胸が痛いほど温かいんです。」

旅人は頷いた。

「僕もそうです。
　忘れていたはずなのに、
　こんなに守られていたなんて。」

女性の手の中の光が、
ふっと大きく揺れた。

それは“思い出す”代わりに、
“伝わる”ように震えていた。

黒猫がやさしく言う。

「優しさはね、
　“覚えているかどうか”じゃなくて
　“確かに誰かが君に向けた温度”が本質なんだよ。」

◆

夕暮れ。
旅人は町の外れに立ち、
自分の足元へ転がってきたひとつの光を拾った。

とても小さく、
すぐに消えてしまいそうな光だった。

触れた瞬間、
旅人の胸がきゅっと締めつけられた。

──幼い日の夜。
　泣いて眠れなかった自分の背中を、
　誰かがそっと撫でてくれた記憶。

旅人は静かに目を閉じた。

「……誰だったんだろう。」

黒猫が旅人の肩に飛び乗り、小さく言う。

「思い出せなくていいよ。
　大事なのはね、
　その優しさが今も旅人を支えてるってこと。」

旅人は光を両手で包んだ。
そのぬくもりは、
どこか懐かしいようで、
どこよりも安心する感触だった。

◆

旅人と黒猫が国を出ようとすると、
風が町に散らばる光を揺らした。

それらは
決して大きくはない。
名も残らない。
覚えてももらえない。

でも確かに、
人を前へ、今日へ、生きる方へと
そっと押してくれていた。

旅人は歩きながら呟いた。

「僕は……
　たくさんの小さな優しさに守られて
　ここまで来たんだね。」

黒猫は満足そうに尻尾を揺らした。

「うん。
　優しさはね、思い出されなくても

旅人は胸の奥がじんわり温かくなっていくのを感じた。

そしてふたりは、
手の中に残る“忘れられた優しさ”の
かすかな光を道しるべに
静かに歩き出した。`},
  {num:215,title:"『言い訳の国』",body:`旅人と黒猫がその国に入った瞬間、
ふたりの視界に奇妙な光景が飛び込んできた。

人の背丈ほどの白い影が、
町じゅうを歩き回っているのだ。

形は人のようで、
しかし顔はぼんやり滲んでいて、
輪郭は風に揺れている。

旅人が小声でつぶやく。

「……あれは何？」

黒猫は尻尾を揺らしながら答える。

「ここでは、人が過去についた“言い訳”が実体化して歩くんだ。」

「言い訳が……？」

「うん。
　ごまかした本音、飲み込んだ気持ち、
　避けるために使った言葉。
　そういう“理由の影”が姿を持つんだよ。」

旅人は思わず身を固くした。

◆

広場には、
たくさんの言い訳たちが歩いていた。

「忙しかったから。」
「本気じゃなかった。」
「仕方なかったんだ。」
「誰だってそうする。」
「タイミングが悪かった。」

どの影も主を探すように、
ゆっくり町を漂っている。

旅人がひとりの青年に話しかけた。

「この影……あなたの言い訳ですか？」

青年はため息をつき、
少しうしろを指さした。

「ええ。
　あれは僕が学生の頃についた嘘です。
　本当は怖くて挑戦できなかったのに、
　“興味がなかっただけ”って言ったんです。」

青年の“言い訳”は
青年と同じ背丈で、
ただ黙ってついてきていた。

黒猫が静かに言う。

「本音を隠せば隠すほど、言い訳は大きくなるんだよ。」

青年は苦笑した。

「まったくその通りです。
　この国では、自分の言い訳が
　“どれだけ自分に影響していたか”がわかるんです。」

旅人は青年の後ろを歩く影に目を向けた。

影は、つかず離れず青年のあとを追っている。
まるで「まだ整理してないよね」と言いたげに。

◆

町のはずれに“理由の森”と呼ばれる場所があると聞き、
旅人と黒猫は向かった。

森の入口には、
ひときわ大きな影がしゃがみ込んでいた。

旅人が声をかけた。

「あなたの影……ですか？」

しゃがんでいた女性は、
ゆっくり立ち上がった。

「はい。
　これは“泣かなかった理由”です。」

その影は、
まるで巨大な空洞のようだった。
手を触れるとスカスカとしていて、
中にたくさんの空気だけが詰まっている。

女性は静かに語り始めた。

「本当は、あの日泣きたかった。
　泣けば楽になるってわかっていた。
　でも……“大丈夫だから”と繰り返して、
　涙を無かったことにした。
　その言い訳が、ずっと大きく膨らんでしまったんです。」

旅人は言葉を失う。

黒猫がそっと女性の足元に寄り添った。

「……この影はね、
　本当のあなたを守るために生まれたんだよ。
　弱さをごまかすためでも、
　誰かを騙すためでもなく。」

女性は目を伏せた。

「……守るため。」

黒猫は続けた。

「言い訳は、本当は“傷のカバー”なんだ。
　だから責めるものじゃない。
　でも向き合うとね、
　影は少しずつ薄くなるよ。」

女性は影に触れた。

影はかすかに揺れ、
すこし、小さくなった。

旅人は静かに息をついた。

◆

夜、旅人は街の高台に立っていた。

足もとには、自分の影がのびている。
その影の端が
わずかに白く揺れているのに気づいた。

黒猫が横に立ち、言う。

「旅人……君にもひとつ、いるね。」

旅人はうなずいた。

「“時間がなかったから”って、
　本当はただ勇気がなかっただけなのに……
　あの時、ごまかした僕の言葉だ。」

黒猫は旅人の影にそっと足を乗せる。

「言い訳は、悪者じゃない。
　けれど本音を見つけるまで、
　その影はついてくる。」

旅人は小さく笑った。

「……じゃあ、歩きながら
　本音を探してみるよ。」

黒猫は満足そうに喉を鳴らした。

「うん。それでいい。
　言い訳の影は、
　本音が見つかった瞬間に
　ちゃんと自分で帰っていくから。」

ふたりは歩き出した。
夜風に揺れる言い訳たちを横目に見ながら。

影は、
責めるためではなく
気づくために存在しているのだと
旅人はしずかに理解しはじめていた。


『心の温度を測る国』


旅人と黒猫が国境をくぐると、
ふたりの周りの空気がふっと揺れた。

町を歩く人々は、
胸のあたりに小さな数字の灯りを灯している。
０℃に近い人もいれば、
春の日差しのように暖かな人もいる。

黒猫が尻尾をふわりと揺らした。

「ここではね、人との距離が“温度”になるんだよ。」

旅人は驚いて、
行き交う人々の温度を見つめる。

冷えきった数字を抱えた人は、
肩をすぼめ、誰とも目を合わせない。
逆にぬくもりのある温度の人は、
周りとゆっくり会話をしながら歩いていた。

◆

広場のベンチに、
ひとりの青年が座っていた。

胸には“4℃”と小さく灯っている。
春には遠く、冬を抜けきれない温度。

旅人はそっと声をかけた。

「大丈夫ですか？」

青年は弱く笑った。

「ええ……でも、僕は人と話すとすぐ温度が下がるんです。
　悪気はないのに、距離をとられてしまって。」

黒猫が青年の足元に座る。

「それは、冷たさじゃなくて“防衛”なんだよ。」

青年は目を瞬いた。

「防衛……？」

旅人は優しい声で言う。

「傷つきたくないとき、
　心は自分を守ろうとして冷えることがあるよ。
　それは、あなたが冷たいからじゃない。」

青年は胸の温度を見つめた。

「……なら、どうすれば温かくなれるんでしょう？」

黒猫が答える。

「あなたが“温かさに触れていい”って思えるまで、
　ゆっくりでいいんだよ。」

青年の温度が、
ほんの少しだけ――“5℃”に上がった。

◆

町を歩いていると、
旅人はひとりの女性とすれ違った。

彼女の胸の温度は“38℃”。
隠しきれないほどあたたかい。

だがその背中は疲れていた。

旅人は思わず声をかけた。

「あなたは、とても温かいんですね。」

女性は少し困ったように笑う。

「ええ、でも……
　あたたかすぎると、すぐ人が寄ってくるんです。
　頼られすぎて、溶けそうになってしまう。
　ときどき自分がどこにいるのか、わからなくなるくらい。」

旅人は胸がちくりと痛む。

黒猫はぽつりと言った。

「ぬくもりにも、限界があるんだよ。」

女性の温度がわずかに“37℃”へ下がった。

「……たまには冷たい風に当たりに行くのも、
　きっと悪くないですよ。」

女性は肩の力を抜き、
静かに旅人に頭を下げた。

◆

夕暮れ。
旅人は川辺に腰をおろした。

水面には、
自分の胸に灯る小さな数字が映っていた。

“18℃”

温かいわけでも、冷たいわけでもない。
どこか曖昧で、揺れている温度。

黒猫が隣で座り、旅人の数字を見つめた。

「ねえ旅人。
　人の温度ってね、ひとつじゃないんだよ。」

「……え？」

黒猫は穏やかに続けた。

「場所によって、相手によって、
　日によって、季節によって、
　心の温度は変わる。
　それを恥じる必要なんてない。」

旅人はゆっくり呼吸し、
自分の温度を見つめながら呟いた。

「……僕も、人に近づきたいときがあるし、
　距離を取りたいときもある。
　それも責めなくていいんだね。」

黒猫は喉を鳴らした。

「うん。
　距離には、“快適な温度”っていうものがあるんだよ。」

◆

夜の帳が下りる頃、
町の光がふんわりと灯りはじめた。

温かさと冷たさが混じり合った灯りは、
まるで人の心そのもののようだった。

旅人は再び歩き出す。

「心の温度って……
　本当は、人と共に生きてきた証なんだね。」

黒猫は旅人の足元に寄り添い、

「うん。
　冷たくなるのも、あたたかくなるのも、
　全部、生きている証拠だよ。」

ふたりの影が夜道をのびていった。

その影の温度は、
確かに少しだけ――
温かかった。`},
  {num:214,title:"『たった一度だけの国』",body:`旅人と黒猫がその国に足を踏み入れた瞬間、
空気がふっと震えた。

町中に散らばる小さな光が、
まるで誰かの記憶のかけらのように漂っている。

黒猫が目を細めた。

「ここは、“たった一度だけの国”。
　人生で一度しか起きない瞬間が、
　この国では形になって残るんだよ。」

旅人は思わず息をのむ。

光のひとつに触れると、
かすかな情景が指先に伝わってきた。

──初めて自転車に乗れた日の震え。
──子どもの頃に拾った四つ葉の感触。
──失恋して初めて本気で泣いた夜の風。

どれも一度きり。
二度と同じ形では訪れない。

旅人は静かに言った。

「……一度しかないって、
　こんなにあたたかいんだね。」

◆

町の中央には、“再会広場”があった。
そこには、
二度とは会えなかった誰かとの“一度だけ”が
淡い影となって揺れている。

旅人はその中に、
ひときわ透明度の高い影を見つけた。

影には若い男が立っている。
その表情には喜びと寂しさが同時にあった。

旅人は声をかけた。

「あなたは……ここで誰と？」

男は少し驚いたように旅人を見る。

「昔、一度だけ出会った人がいるんです。
　旅の途中で出会って……
　ほんの数時間だけだったのに、
　あれほど心に残った人はいなくて。」

黒猫が静かに問いかける。

「どうして、その人とは会えなかったの？」

男は空を見上げた。

「……僕が、選ばなかったからです。
　その人と一緒に行くこともできた。
　でも僕は自分の道を選んだ。
　あの一度きりの出会いが、
　僕の人生を変えてしまうのが怖かったんです。」

旅人の胸が少し痛む。

「それでも……忘れられなかったんですね。」

男は苦笑した。

「はい。でも今なら思える。
　“一度きり”だからこそ、
　僕はその人に救われたんだと。」

男の影は風に揺れ、
やがて光の粒になって消えた。

黒猫はつぶやいた。

「一度きりの人ほど、心に長く残るんだよ。」

旅人は黙ってうなずいた。

◆

夕刻、旅人は丘の上の“瞬間の森”へ向かった。

そこには、人々の
“たった一度だけ踏んだ失敗”
“たった一度だけ見た光景”
“たった一度だけ言えた本音”
が木の形になって揺れている。

旅人は、
寂しげにしおれた一本の木の前で立ち止まる。

木にはこんな札がかかっていた。

──「たった一度だけ、許せなかった日」

旅人は黒猫に目を向ける。

「僕にもあるよ。
　一度だけだったのに、
　ずっと悔やんでいることが。」

黒猫は旅人の影に寄り添うように座った。

「一度だけだからこそ、
　心の深くに根づくんだよ。」

旅人はそっと木に触れた。
木はかすかに震え、
柔らかな光をこぼした。

「……許せなかった“一度”も、
　きっと僕をつくっているんだね。」

◆

夜、街灯がともり、
町全体がやさしい輝きに包まれる。

旅人は空を見上げた。

空には、人々の
“初めて笑った瞬間”
“名前を呼ばれた瞬間”
“誰かを好きになった瞬間”
が星のように光っていた。

黒猫は旅人の肩へ飛び乗った。

「ねえ、旅人。
　日常も実は、“たった一度の連続”なんだよ。」

旅人は目を細める。

「……わかる気がする。
　今日の僕も、たった一度きり。
　明日もきっと、もう二度と同じじゃない。」

黒猫は喉を鳴らした。

「そう。
　一度きりだからこそ大切なんだよ。」

旅人は静かに笑った。

「なら……
　明日の“一度”もちゃんと受け取りたいな。」

ふたりはいつもよりゆっくり歩き出した。
足元には、数えきれない“一度だけ”の光が照らされていた。

それらは、
失われたものではなく、
確かにあった人生のかけらとして
静かに夜空へ溶けていった。`},
  {num:213,title:"『無かったことにする国』",body:`旅人と黒猫がその国へ足を踏み入れた瞬間、
空気が妙にひんやりとした。
風景は静かで何の問題もないように見えるのに、
なぜか胸の奥がざわつく。

街の地面には、ところどころ薄い層のような模様が走っていた。
まるで大昔の地層のように、
何かが積み重なっている。

「……ここは、“無かったことにする国”。」

黒猫が小さく呟いた。

「見たくなかった出来事、
　見なかったことにした痛み、
　言わなかった言葉……
　そういうものが全部、地面の下に積もっている。」

旅人はその言葉に、
無意識に足元を見つめた。

◆

町の広場で、老人が風の音を聞いていた。
旅人が尋ねる。

「ここでは、何を“無かったこと”にしたんですか？」

老人は苦い表情を浮かべた。

「この国の人間はね、
　重い気持ちを抱えたまま生きるのがつらくて、
　都合の悪い出来事を土の下に沈めてしまうんだよ。
　忘れたつもりで、
　無かったことにしたつもりでね。」

老人の足元には、
薄く光る層が見えた。

「ここには“言わなかった謝罪”、
　“見なかった暴力”、
　“飲み込んだ悲鳴”が何層にも重なっとる。」

旅人は息をのんだ。

黒猫は地面に鼻を近づけ、
かすかな匂いを嗅いだ。

「たくさんの“痛みの化石”だね。」

◆

町を歩いていくと、
ひとりの若い女性が地面をじっと見つめていた。

旅人が声をかける。

「そこに……何か埋まっているんですか？」

女性はうつむいたまま答えた。

「“もう泣かない”って決めた日のことです。
　本当は泣きたかったけど、
　誰にも気づかれたくなくて……
　その気持ちを、ここに沈めてしまいました。」

旅人は少し胸が痛んだ。

「無かったことにしても、消えはしないんですね。」

女性は静かに言った。

「ええ。
　むしろ重くなって、
　歩くたびに足を引っぱるんです。
　見なければ軽くなると思っていたのに……
　逆だった。」

黒猫は女性の足に寄り添い、
まるで彼女の影に入り込むように座った。

「無かったことにした想いほど、
　心の深くに残るんだよ。」

◆

夕暮れの街は、
まるで地面がかすかに光っているようだった。

旅人はふと疑問を口にした。

「……じゃあ、どうすればいいんでしょう？
　深く埋まった“痛みの層”は、
　もう掘り出せないんじゃ？」

黒猫は旅人を見上げた。

「掘り出す必要はないよ。
　“そこにある”って認めるだけでいい。」

旅人は目を瞬いた。

「認めるだけで？」

「うん。
　無かったことにされた出来事は、
　存在を思い出してもらえるのをずっと待ってる。
　掘り返さなくていい。
　ただ――
　“確かにあった”と心の中で触れてあげるだけで、
　少しずつ軽くなる。」

旅人は、
地層のように積もった光を見つめた。

自分にも、
見なかったふりをした出来事がある。
無かったことにしてしまった痛みがある。

旅人はそっと胸に手を置いた。

「……僕も、今日ひとつだけ認めよう。
　“あったのに、無かったことにしたこと”を。」

黒猫は満足そうに尻尾を揺らした。

◆

国を出る頃、夜風が吹き抜けた。

地面の下で眠っていた光が
ほのかに揺れ、
まるで誰かの気持ちが
ゆっくりと息をしはじめたようだった。

旅人がつぶやく。

「無かったことにした出来事も、
　本当は僕たちをつくっているんだね。」

黒猫が応える。

「うん。
　忘れたふりの奥には、
　いつも本当の声があるんだ。」

ふたりは静かに歩き出した。
足元の「地層」を踏みしめながら。

それは、
痛みを受け入れた人だけが持つ
柔らかい強さへの、一歩だった。`},
  {num:212,title:"『手紙が届かない国』",body:`旅人と黒猫がその国に入った瞬間、
ふたりの頭上を、白い紙片のようなものがひらひらと舞った。

よく見ると、それは封のされていない手紙だった。

「……紙、じゃないね。」
黒猫がつぶやく。

旅人が指先で受け取ると、紙片はかすかに温度を帯びていた。
誰かがついさっきまで握りしめていたような温もり。

「ここではね」
道端に座っていた老人が言った。
「届かなかった手紙が空を漂っているんだよ。」

◆

町は静かだったが、空だけは賑やかだった。
光を反射する白い手紙たちが風に揺れ、
鳥のように、雲のように、街路樹の上を漂っている。

旅人が尋ねた。

「どうして届かなかったんですか？」

老人はしばらく考え、
言葉を選ぶように答えた。

「宛先が変わってしまったのかもしれない。
　送る勇気が足りなかったのかもしれない。
　あるいは……
　本当は届けるつもりがなかったのかもしれない。」

言葉が重く、しかし優しく響いた。

黒猫がふわりと紙片に近づいた。

「どれも“未送信の想い”なんだね。」

◆

町を歩いていると、
一人の若い女性が橋の欄干にもたれていた。

風上から手紙が何枚も流れてくる。
彼女はその中からひとつをそっと掴んだ。

それは彼女自身の手紙だった。

旅人は声をかけてみた。

「その手紙、誰宛ですか？」

女性は苦笑して答えた。

「……昔、大切だった人です。
　でも、渡す勇気がなくて。
　もう、どこにいるのかも知らないし……
　だから、この空を漂ってるんでしょうね。」

黒猫はじっと女性を見上げた。

「渡せなかったのは、怖かったから？」

「ええ……
　嫌われるのが怖くて、
　受け取ってもらえないのが怖くて、
　なにより、この“気持ち”が壊れてしまうのが怖くて。」

女性は手紙を胸に抱きしめた。

「伝えなかったままのほうが、
　大切に思えてしまったんです。」

旅人は、その言葉に少しだけ心が痛んだ。

「……伝えなかったからこそ、
　守られている想いもあるんですね。」

女性は小さく頷いた。

「ええ。でも……
　伝えられなかった自分の弱さは、
　ずっと胸に残ったままです。」

◆

黒猫はふいに、風の流れに逆らって歩き始めた。

旅人が追いかけると、
空に浮かぶ紙片が一枚、黒猫の前にふわりと降りてきた。

「……これ、旅人のだよ。」

旅人の胸が跳ねた。

黒猫が差し出したのは、
旅人が昔、出せなかった手紙だった。

──宛先は、旅の前に別れた誰か。
──書かれているのは、言えなかった本音。

旅人は震える指で紙を開いた。

そこには、あの日の自分よりも
ずっと幼く、ずっと正直な言葉が並んでいた。

「黒猫……こんなの、もう届かないよ。」

黒猫は静かに言った。

「うん。でも、
　“届かないからこそ残っている”想いもあるんだよ。」

旅人はしばらく手紙を見つめ、
そのまま空へふっと放した。

手紙は上昇気流に乗り、
ゆっくりと空の一部になっていった。

旅人は穏やかに笑った。

「……大丈夫。
　もう、この手紙に縛られない気がする。」

黒猫は満足そうに尻尾を揺らした。

◆

夕暮れの国境で、旅人は振り返った。

空には無数の“届かなかった想い”が漂っている。
しかしそれは陰ではなく、
どこか淡い、優しい光を放っていた。

「届かなかった手紙は、
　届かなかったぶんだけ、誰かの心に優しく残るんだね。」

黒猫が答えた。

「うん。
　未完成の想いって、
　時には人を支えるから。」

旅人は小さく頷き、歩き出した。

ふたりの背後で、
一枚の手紙が風に乗って揺れた。

今度こそ、誰かに届くように。
あるいは、届かなくてもいいまま、
そっと空を漂い続けるように。


『望まなかった願いの国』


旅人と黒猫がその国に足を踏み入れた瞬間、
空気が微かにざわめいた。

誰もいないはずの道の片隅で、
見えない誰かがそっと息をしたような感覚。

旅人は眉を寄せた。

「……この国、何かが“叶っていく”匂いがする。」

黒猫は尻尾を揺らしながら答える。

「うん。
　ここではね、
　人が望んだつもりのない願いが、ふいに実現するんだ。」

旅人は首をかしげる。

「望んでない……願い？」

黒猫は少しだけ笑った。

「うん。
　“望んじゃいけない”と心が押し込めた願いほど、
　黙って浮かび上がるんだ。」

◆

最初に出会ったのは、
川のほとりでひとり座る青年だった。

彼の周囲だけ、
まるで柔らかな光が漂っている。

旅人が声をかけると、青年は言った。

「……不思議なんです。
　誰にも言ってないのに、
　私が昔、ほんの一度だけ思った願いが叶ってしまったんです。」

黒猫が青年の膝に飛び乗る。

「どんな願い？」

青年は少し迷いながら話し始めた。

「ずっと前に、
　“誰かに優しくされたい”と思ったことがあって。
　でも、それを望むのは弱い気がして……
　すぐに心の奥へ押し込めたんです。」

旅人は静かに聞いていた。

青年は続ける。

「でも最近、
　町の人たちがみんな妙に優しいんです。
　私のことなんて知らない人まで。
　まるで……私が望んだ優しさだけが、
　この世界に滲んでしまったみたいで。」

黒猫はそっと言った。

「それは“望まなかった願い”じゃない。
　本当は望んでいたけど、
　自分に許せなかった願いなんだよ。」

青年は驚いた顔をした。

「……許せ、なかった？」

「うん。
　弱さだと思って否定した願いほど、
　この国では勝手に芽を出す。」

青年は目を伏せ、
やがて小さく笑った。

「そうか……
　あれは、弱さじゃなかったんですね。」

彼の頭上に漂う光が、
ゆっくりとひとつに集まって消えた。

願いが回収されたように。

◆

町の中央にある広場では、
少女がひとり、宙を見つめていた。

その周りだけ、
淡い“影”のようなものが漂っている。

旅人が近づくと、
少女はぽつりと言った。

「願ってないのに、
　“さよならを言う場面”ばっかりが起きるんです。」

黒猫が目を細める。

「さよなら？」

少女は唇を噛むようにして答えた。

「本当は……
　ずっと前に、友だちにちゃんと別れを言えなかったんです。
　怖くて。
　そのせいで、
　“さよならを言いたい願い”が残ったままだったみたいで……
　この国に来たら、
　毎日のように誰かと別れる出来事が起きるんです。」

旅人は察した。

「叶ってしまうんだね。
　言えなかった“最後の言葉”が。」

少女は涙をにじませた。

「望んでないのに……
　こんなの、いらないのに……。」

黒猫は少女の影にそっと入り込んだ。
気づいた少女は目を見開く。

「なんで……そこに入れるの？」

黒猫は低く答えた。

「きみが本当は望んでたのは、
　“きちんと終わらせること”。
　『さよなら』を言わなかった自分を、
　許してあげることなんだ。」

少女の頬を涙が伝う。

影のような願いは、
その涙に触れると静かに溶けていった。

◆

夕暮れ。

旅人と黒猫は、
丘の上から国全体を見渡していた。

どこかで願いが生まれ、
どこかで願いが叶い、
どこかでまた願いが消えていく。

旅人が静かに言った。

「望んでない願いなんて、
　本当はないのかもしれないね。」

黒猫は隣で体を横たえながら言う。

「うん。
　“望まないふりをした願い”が、
　一番強く残ることがある。」

旅人は自分の胸に手を当てた。

その瞬間、
胸の奥で何かが小さく揺れたような気がした。

黒猫が気づいたように顔を上げる。

「……旅人にも、あるんだね。」

「僕にも？」

「望まないふりをしてきた願い。」

旅人は言葉に詰まり、
ただ夕日に照らされた道を見つめた。

黒猫は旅人の横に並び、
同じ方向を見る。

「願いはね、
　叶えるためだけにあるんじゃないよ。
　自分の心が“何に触れたのか”を
　教えてくれるためにあるんだ。」

旅人は静かに息を吐いた。

彼の足元に、
小さな光の粒がひとつ落ちていた。

それは──
旅人自身が気づいていなかった願いのかけら。

拾うには、
まだ少し勇気が必要そうだった。

旅人と黒猫は、
その小さな光をそっと残したまま、
夜の道を歩き出した。

願いが生まれ、
叶い、
消えていく不思議な国をあとにして。


『望まなかった願いの国 ―続編―』


前の国を出てから、
旅人の足取りはいつもよりゆっくりだった。

黒猫は何も言わず、
ただ旅人の横を歩いていた。

ふたりにとって、その沈黙は
“何かがまだ終わっていない”合図だった。

◆

その日の夕方、
ふたりは国境近くの小さな森へ入った。

森は静かで、
まるで外界の時間が止まったようだった。

旅人は足を止めた。

「……黒猫。」

黒猫は旅人を見上げる。

「うん。」

旅人は少し迷って、
やっと口を開いた。

「僕……気づいてしまったんだ。
　あの国で落ちていた“光の粒”……
　あれは、僕の願いなんだろう？」

黒猫はゆっくりと頷いた。

「うん。
　きみが“望まなかったふり”をしてきた願いだよ。」

旅人は木に寄りかかり、
目を閉じた。

「僕は……
　旅を始めた理由を忘れたかったんだ。」

黒猫の耳がピクリと動いた。

「忘れたかった？」

旅人は、言葉を絞り出すように続けた。

「旅に出たのは……
　何かを探すためじゃなかった。
　ただ、置いてきたものを見ないため。
　あの場所に戻らないで済むように、
　前へ前へって歩き続けただけなんだ。」

黒猫は黙って聞いていた。

旅人は苦笑した。

「そんなの……
　“旅”じゃないよね。」

黒猫は、旅人の影にそっと触れた。

「ううん。
　それでも旅だよ。
　逃げるように始めた旅でも、
　道の上でちゃんと心が動いてきたのなら。」

旅人はうつむいた。

「でも僕の願いは……
　本当は“帰りたくない”だったんだ。
　本当は望んでないのに……
　望んだことにして押し込めた願い。」

黒猫は目を細めた。

「それを“望まなかった願い”と言うんだよ。」

◆

森の奥に、
小さな古びた祠があった。

黒猫が旅人の袖をひっぱる。

「行こう。
　あの祠はね、
　“本音が近づく場所”なんだ。」

旅人はゆっくりと歩き、
祠の前に立った。

不意に、胸の奥が熱くなる。

黒猫が囁く。

「ここなら見えるよ。
　きみが本当に望まなかった願いが。」

祠の前の空気が揺らぎ、
光の粒が浮かび上がる。

それは、昼間拾わずに残してきた
あの“光”と同じ色をしていた。

旅人の胸がずきりと痛む。

光の粒が、
旅人の目の前にふわりと降りてきた。

旅人はかすれた声で呟いた。

「……帰りたい。」

黒猫は旅人の手に頭を寄せた。

「うん。
　それがきみの本当の願い。」

「でも、帰ったら……
　あの頃の僕とは違う。」

「違っていいよ。
　“変わった自分で帰りたい”ってのも、
　願いのひとつだから。」

旅人は小さく震えた。

黒猫は言葉を続ける。

「きみは“帰りたくない”と願ったんじゃない。
　本当は“帰りたい”と願っていた。
　でも、帰る自分が足りない気がして……
　その願いを否定した。」

旅人は光の粒にそっと触れた。

その瞬間、
光は旅人の胸に溶けるように吸い込まれた。

沈んでいくような痛みと、
浮かび上がるような温かさが同時に胸を満たした。

旅人は深く息を吸い込んだ。

「……僕は、帰るよ。
　でも、今じゃない。
　まだ少し、この旅で知りたいことがあるから。」

黒猫は嬉しそうに目を細めた。

「そう言うと思った。」

旅人はふっと笑った。

「僕の望まなかった願いは……
　“帰りたい”だったんだね。」

黒猫は頷く。

「そして、それを認めるのが……
　一番怖い願いだった。」

◆

夜、森を抜ける道で
旅人は言った。

「黒猫。
　僕がその願いに気づけたのは、
　君がいたからだよ。」

黒猫は照れたように尻尾をふる。

「うん。
　でも最後に願いを受け入れたのは、きみだよ。」

旅人は空を見上げた。

星の光が、
“まだ続く道”を照らしていた。

旅人と黒猫は再び歩き始めた。

帰りたい願いを胸の奥に抱えながら。
いつか帰るために、
今日も旅を続けるために。`},
  {num:211,title:"『心の天気予報の国』",body:`旅人と黒猫が国境を越えたとき、
空は一面のモザイク模様になっていた。

青空の部分もあれば、
隣には急な夕立が降っており、
もっと奥では虹がゆっくり回転している。

旅人は息をのんだ。

「……天気がバラバラだ。」

黒猫は当たり前のように言った。

「ここではね、
　人の心の天気が空に映るんだよ。」

歩くたびに、頭上の天気が少しずつ変わる。
曇りの通り、
雨粒が震える小路、
ふわふわした朝靄の広場。

すべてが、
誰かの“今の気持ち”の形だった。

◆

最初に出会ったのは、
小さな図書館の前で雨宿りしていた青年だった。

青年の頭上だけ、
やわらかな霧雨が降り続いている。

旅人が声をかけると、
青年は苦笑いを浮かべた。

「ずっとこの天気なんです。
　気持ちが落ち着くようで、沈むようで……
　なかなか晴れてくれなくて。」

黒猫が青年の靴先に座る。

「霧雨はね、
　**“考えすぎの天気”**なんだよ。」

青年ははっとした顔をした。

「……考えすぎ？」

「うん。
　正しくあろうとすると、霧が出る。
　間違えたくないと、雨が降る。」

青年は青空を遠くに眺めるように、
ぽつりと言った。

「本当は……誰かに話したいんです。
　でも、気持ちを言葉にするのが怖くて。」

その瞬間、霧雨が少し薄くなった。
黒猫が旅人をちらりと見上げる。

旅人は微笑み、
ただ「聞くよ」と静かに言った。

それだけで、
青年の頭上の空が音もなく明るくなる。

霧雨の雲がほどけ、
ほんのわずかに光が差し込んだ。

◆

町の中心には、
大きな公園があった。

そこには、
自分の天気を眺めるための
“気象観測台”がそびえていた。

階段を登ると──
少女が一人、空を見上げていた。

頭上には大きな虹。
けれど虹の端は、どこか割れて揺れている。

旅人が近づくと、
少女は静かに呟いた。

「本当は……晴れているように見せたいんです。
　でも、少し無理してるから虹が欠けるんですよね。」

黒猫は少女のそばに座り、
虹の欠けた部分を見つめた。

「虹は、
　**“泣いたあとに生まれる天気”**なんだよ。」

少女は驚いた顔で黒猫を見た。

「泣いた……あと？」

「うん。
　涙が光に当たると虹になる。
　だから、無理に笑うと虹はうそをつく。
　本当に泣いた分だけ、本物の虹になる。」

少女は息を飲んだ。

そして、ぽつりとつぶやく。

「……少し、泣きました。
　でも、誰にも言えなくて。」

旅人は優しく言った。

「虹は、
　“泣いてもいいって自分に言えた証拠”なんだよ。」

少女はゆっくり頷き、
虹のきらめきを確かめるように空を見上げた。

その瞬間──
虹の欠けていた部分がふわりと色を取り戻した。

少女は目を丸くした。

「……直った。」

黒猫はしっぽを揺らす。

「うん。
　心の天気は素直だからね。」

◆

夕暮れ。
旅人と黒猫は、
丘の上から町の空を眺めていた。

晴れ、雨、曇り、虹、霧、嵐──
人の数だけ空があり、
それぞれが違って、
それぞれが確かに美しかった。

旅人はそっと言った。

「みんな、自分の天気と
　うまく付き合いながら生きているんだね。」

黒猫が応える。

「天気は変わる。
　心も変わる。
　晴れの日だけが正解でも、
　曇りの日が悪いわけでもない。」

旅人は、
ふと自分の頭上を見上げた。

そこには──
うすい金色の雲が流れていた。

黒猫がくすっと笑う。

「“歩きながら考えてるときの天気”だね。」

旅人も笑った。

「ああ、確かに。
　僕の天気は行ったり来たりしてる。」

黒猫は空を見上げながら、低い声で言った。

「でも、旅人の天気はね……
　一度も止まったことがないんだ。」

旅人は驚いた。

黒猫は続ける。

「止まらない天気は、
　“まだ生きたいって思ってる空”なんだよ。」

旅人はしばらく黙って空を眺めた。

風が旅人の髪を揺らし、
空はゆっくりと次の色へと変わっていく。

旅人と黒猫はそのまま歩き出す。
それぞれの頭上に流れる、
それぞれの心の天気とともに。`},
  {num:210,title:"『悩みが形になる国』",body:`旅人と黒猫が入ったその国は、
どことなくざわざわと騒がしかった。

けれど、人の声はほとんど聞こえない。
代わりに──
足元から、道の陰から、屋根の上から、
小さな動物たちがつぶやく声 が聞こえた。

「どうしよう……」
「失敗したら……」
「ちゃんとできてるのかな……」
「やめたい……でも……」

旅人は思わず立ち止まる。

「黒猫……この国、なんだか変だよ。」

黒猫は耳をひくつかせて、
しゃがみ込んでいた小さな生き物を鼻先でつつく。

それは、
灰色のうさぎのような──

黒猫は静かに言う。

「ここではね、

町の広場では、
いろんな悩みが動き回っていた。

・丸まって震える“迷いのハリネズミ”
・鳴き声の小さな“自信のない子狐”
・ずっと同じ場所をぐるぐる回る“心配ぐま”
・しっぽが分裂していく“選べない猫”

どれも愛らしいのに、どこか切ない。

旅人は、
ひとりの少女がベンチに座っているのを見つけた。
足元には、小さな黒い鳥がいる。

少女は黒猫に気づき、小さく微笑む。

「これ……私の“後悔”なんです。」

鳥は、少女の影に寄り添うようにして震えていた。

少女は続ける。

「見たくなくて、追い払おうとしたんですけど……
　逃がしても逃がしても、戻ってきちゃう。
　だから、もう一緒に座ってる。」

旅人は静かに言う。

「無理に捨てることはできないんだね。」

少女はうなずいた。

「うん。でも……

　私がゆっくり息をすると、この子も落ち着くんです。」

黒猫は鳥をじっと見る。

その姿は、
嫌われたいわけでも、
責めたいわけでもなく、
ただ“理解されたい”と願っているようだった。

◆

町を歩いていくと、
ひときわ大きな悩みの動物が道をふさいでいた。

巨大な犬のような影。
全身がゆらゆら揺れ、
目はどこか疲れきっている。

旅人はつぶやく。

「これは……？」

黒猫が答える。

「“ずっと誰にも言えなかった悩み”だよ。」

近くには青年が立っていた。
犬と目を合わせることもできず、うつむいている。

旅人が声をかける。

「怖いの？」

青年は力なく笑った。

「はい。
　この子は……僕がずっと見ないようにしていた悩みで。

黒猫が、巨大な悩み犬に近づく。
猫と犬なのに、犬は黒猫を襲わない。
ただ、疲れたように目を伏せた。

黒猫はそっと囁く。

「君が大きくなったのは、

犬は、弱々しく尾を振った。
