<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅人と黒猫</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #f7f6f3; color: #2c2c2a; }
header { background: #fff; border-bottom: 0.5px solid #ddd; padding: 1.5rem 2rem; }
header h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
header p { font-size: 13px; color: #888; }
.container { max-width: 800px; margin: 0 auto; padding: 1.5rem 1rem; }
.search-row input { width: 100%; font-size: 14px; padding: 8px 12px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #2c2c2a; outline: none; margin-bottom: 1rem; }
.search-row input:focus { border-color: #888; }
.count { font-size: 13px; color: #888; margin-bottom: 0.75rem; }
.story-list { display: flex; flex-direction: column; gap: 6px; }
.story-card { background: #fff; border: 0.5px solid #e0deda; border-radius: 10px; padding: 0.85rem 1.1rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; transition: border-color 0.15s; }
.story-card:hover { border-color: #aaa; }
.story-num { font-size: 12px; color: #aaa; min-width: 28px; text-align: right; flex-shrink: 0; }
.story-title { font-size: 15px; color: #2c2c2a; flex: 1; }
.empty { text-align: center; padding: 3rem; color: #aaa; font-size: 14px; }
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; }
.modal-bg.open { display: flex; }
.modal { background: #fff; border-radius: 14px; padding: 2rem 2.5rem; max-width: 640px; width: 100%; position: relative; margin: auto; }
.modal-close { position: absolute; top: 1rem; right: 1.2rem; background: none; border: none; font-size: 22px; color: #aaa; cursor: pointer; line-height: 1; }
.modal-close:hover { color: #555; }
.modal-num { font-size: 13px; color: #aaa; margin-bottom: 4px; }
.modal-title { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 0.5px solid #eee; }
.modal-body { font-size: 15px; line-height: 2; color: #2c2c2a; white-space: pre-wrap; }
.modal-nav { display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 1rem; border-top: 0.5px solid #eee; }
.modal-nav button { font-size: 13px; padding: 6px 16px; border-radius: 6px; border: 0.5px solid #ccc; background: #fff; color: #555; cursor: pointer; }
.modal-nav button:hover { background: #f0ede8; }
.modal-nav button:disabled { opacity: 0.3; cursor: default; }
</style>
</head>
<body>

<header>
  <h1>旅人と黒猫</h1>
  <p>一話完結の物語シリーズ</p>
</header>

<div class="container">
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="タイトルや話数で検索…" oninput="render()" />
  </div>
  <p class="count" id="countLabel"></p>
  <div class="story-list" id="storyList"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-num" id="modalNum"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-nav">
      <button id="btnPrev" onclick="navigate(-1)">← 前の話</button>
      <button id="btnNext" onclick="navigate(1)">次の話 →</button>
    </div>
  </div>
</div>

<script src="stories.js"></script>
<script>
let filtered = [...stories];
let currentIdx = null;

function render() {
  const q = document.getElementById('searchInput').value;
  filtered = stories.filter(s =>
    !q || s.title.includes(q) || String(s.num).includes(q)
  );
  document.getElementById('countLabel').textContent = filtered.length + ' 件';
  if (filtered.length === 0) {
    document.getElementById('storyList').innerHTML = '<div class="empty">該当する物語がありません</div>';
    return;
  }
  document.getElementById('storyList').innerHTML = filtered.map((s, i) =>
    `<div class="story-card" onclick="openModal(${i})">
      <span class="story-num">${s.num}</span>
      <span class="story-title">${s.title}</span>
    </div>`
  ).join('');
}

function openModal(idx) {
  currentIdx = idx;
  const s = filtered[idx];
  document.getElementById('modalNum').textContent = `第 ${s.num} 話`;
  document.getElementById('modalTitle').textContent = s.title;
  document.getElementById('modalBody').textContent = s.body;
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === filtered.length - 1;
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('modalBg').scrollTop = 0;
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
}

function navigate(dir) {
  const next = currentIdx + dir;
  if (next >= 0 && next < filtered.length) openModal(next);
}

document.getElementById('modalBg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

render();
</script>
</body>
</html>
